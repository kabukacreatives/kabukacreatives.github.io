<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1c3a1c">
<title>Recipes · Our Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Roca+Two&family=Work+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f2;--bg2:#f2ede4;--bg3:#eee8de;
  --card:#ffffff;--card2:#f5f0e8;
  --gold:#b87800;--gold2:#d4a020;--goldp:#fef3dc;
  --terra:#c4380a;--terrap:#fdf0ea;
  --cream:#1a1a1a;--cream2:#2a2a2a;
  --green:#2a7a2a;--greenl:#3a8a1a;--greenp:#eaf4e0;
  --ink:#1a1a1a;--mu:#5a6a58;--border:#d8e8d0;
  --pu:#6d28d9;--pup:#f5f0ff;
  --nv:#2a5a9a;--nvp:#eef2fc;
  --red:#b91c1c;--redp:#fff5f5;
  --saffron:#c47800;--saffronp:#fef8ec;
  --nav-h:68px;--top-h:56px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:'Work Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.65;padding-top:var(--top-h);padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px);min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--top-h);background:#1c3a1c;border-bottom:1px solid #2a5a2a;display:flex;align-items:center;gap:12px;padding:0 16px}
.back-btn{width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.15);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.topbar-title{font-family:'Roca Two',serif;font-size:20px;color:#fff;flex:1}
.topbar-title em{color:var(--gold);font-style:italic}
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--border);height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);display:flex}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--mu);font-family:'Work Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.04em;padding:8px 4px 4px;text-decoration:none;text-transform:uppercase}
.nav-item.active{color:#2a7a2a}
.nav-item .ni{font-size:24px;line-height:1}
#pageIndex{padding:16px 14px 0}
.search-wrap{position:relative;margin-bottom:14px}
.search-input{width:100%;padding:12px 16px 12px 42px;background:#fff;border:1.5px solid var(--border);border-radius:14px;color:var(--ink);font-family:'Work Sans',sans-serif;font-size:14px;outline:none;transition:border .2s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.search-input:focus{border-color:var(--green)}
.search-input::placeholder{color:var(--mu)}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;margin-bottom:16px}
.filter-row::-webkit-scrollbar{display:none}
.filter-pill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--mu);font-family:'Work Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.filter-pill.active{color:var(--bg);border-color:transparent}
.filter-pill.active.all,.filter-pill.active.kootu{background:var(--gold)}
.filter-pill.active.curry{background:var(--terra)}
.filter-pill.active.gravy{background:var(--green)}
.filter-pill.active.kids{background:var(--pu)}
.filter-pill.active.base{background:var(--nv)}
.filter-pill.active.special{background:var(--saffron)}
.filter-pill.active.family{background:#7a4a9a}
.filter-pill.active.salad{background:#1d9e75}
.rt-cat.salad{background:#04342c;color:#5dcaa5}
.rt-cat.family{background:#1e0e2a;color:#b888e8}
.family-note{background:#f5f0ff;border-left:3px solid #7c3aed;border-radius:0 10px 10px 0;padding:10px 13px;margin:10px 0}
.family-note-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#b888e8;margin-bottom:4px}
.family-note-txt{font-size:13px;color:#4c1d95;line-height:1.6}
.key-tips{background:#fdf0ea;border:1.5px solid #f0a880;border-radius:12px;padding:12px 14px;margin:12px 0}
.key-tips-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--terra);margin-bottom:8px}
.key-tip-row{display:flex;gap:8px;font-size:13px;color:#7a3010;padding:4px 0}
.goes-well{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.gw-chip{font-size:12px;background:#f0f7ec;border:1.5px solid #c0d8a8;color:var(--mu);padding:3px 10px;border-radius:8px}
.macro-chip.f{background:rgba(90,140,212,.15);color:var(--nv)}
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:8px}
.recipe-thumb{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.recipe-thumb:active{transform:scale(.97)}
.recipe-thumb:hover{border-color:var(--green);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.rt-header{padding:14px 13px 10px;border-bottom:1px solid var(--border);min-height:80px;display:flex;flex-direction:column;justify-content:space-between}
.rt-cat{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border-radius:6px;margin-bottom:6px}
.rt-cat.kootu{background:var(--goldp);color:var(--gold)}
.rt-cat.curry{background:var(--terrap);color:var(--terra)}
.rt-cat.gravy{background:var(--greenp);color:var(--greenl)}
.rt-cat.kids{background:var(--pup);color:var(--pu)}
.rt-cat.base{background:var(--nvp);color:var(--nv)}
.rt-cat.special{background:var(--saffronp);color:var(--saffron)}
.rt-en{font-family:'Roca Two',serif;font-size:15px;color:var(--cream);line-height:1.3;margin-bottom:3px}
.rt-ta{font-size:11px;color:var(--mu)}
.rt-footer{padding:8px 13px;display:flex;justify-content:space-between;align-items:center}
.rt-time{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace}
.rt-macros{display:flex;gap:5px}
.macro-chip{font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px}
.macro-chip.c{background:rgba(212,168,67,.15);color:var(--gold)}
.macro-chip.p{background:rgba(74,154,90,.15);color:var(--greenl)}
#pageDetail{display:none;padding:0}
.detail-hero{padding:22px 18px 18px;background:linear-gradient(160deg,#e8f4e0 0%,#faf7f2 100%);border-bottom:1.5px solid var(--border)}
.dh-cat{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px}
.dh-ta{font-size:13px;color:var(--mu);margin-bottom:8px;font-style:italic}
.dh-en{font-family:'Roca Two',serif;font-size:30px;color:var(--cream);line-height:1.2;margin-bottom:4px}
.dh-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.dh-meta-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--mu)}
.dh-meta-item strong{color:var(--ink);font-weight:700}
.appears-in{display:flex;gap:6px;flex-wrap:wrap;padding:12px 18px;border-bottom:1.5px solid var(--border);background:#f0f7ec}
.ai-lbl{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mu);width:100%;margin-bottom:3px}
.ai-chip{font-size:12px;background:#fff;border:1.5px solid var(--border);color:var(--mu);padding:4px 10px;border-radius:8px}
.nut-panel{padding:16px 18px;border-bottom:1.5px solid var(--border);background:#1c3a1c}
.np-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:12px}
.np-main{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.npm-item{text-align:center}
.npm-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--cream);line-height:1}
.npm-unit{font-size:10px;color:var(--mu);margin-top:1px}
.npm-lbl{font-size:10px;color:var(--mu);margin-top:3px;letter-spacing:.04em;text-transform:uppercase}
.np-fat{background:rgba(255,255,255,.12);border-radius:10px;padding:10px 12px}
.np-fat-row{display:flex;justify-content:space-between;font-size:13px;color:var(--mu);padding:2px 0}
.np-fat-row span:last-child{color:var(--ink);font-weight:700;font-family:'DM Mono',monospace}
.np-fat-lbl{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.det-section{padding:16px 18px;border-bottom:1.5px solid var(--border);background:#faf7f2}
.det-section-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.det-section-title.gold{color:var(--gold)}
.det-section-title.green{color:var(--greenl)}
.det-section-title.terra{color:var(--terra)}
.ing-table{width:100%;border-collapse:collapse}
.ing-row{border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-row td{padding:8px 0;vertical-align:top}
.ing-amount{font-family:'DM Mono',monospace;font-size:14px;color:var(--gold);font-weight:500;width:86px;padding-right:12px}
.ing-name{font-size:15px;color:var(--cream);font-weight:400}
.ing-note{font-size:12px;color:var(--mu);margin-top:2px}
.chef-note{background:#fef8e8;border-left:3px solid #c49010;border-radius:0 10px 10px 0;padding:10px 13px;margin:10px 0}
.chef-note-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.chef-note-txt{font-size:13px;color:#5a4010;line-height:1.6}
/* 40-MIN CHOP ALERT */
.chop-alert{background:#eaf4e0;border:1.5px solid #a0c880;border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.chop-alert .ca-ico{font-size:22px;flex-shrink:0}
.chop-alert .ca-title{font-size:12px;font-weight:700;color:var(--greenl);letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.chop-alert .ca-txt{font-size:13px;color:#1e4a1e;line-height:1.6}
/* SAFFRON BADGE */
.saffron-note{background:var(--saffronp);border-left:3px solid var(--saffron);border-radius:0 10px 10px 0;padding:9px 12px;margin:8px 0}
.saffron-note-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--saffron);margin-bottom:3px}
.saffron-note-txt{font-size:12px;color:#7a4800;line-height:1.5}
.beginner-note{background:#f5f0ff;border-left:3px solid #7c3aed;border-radius:0 10px 10px 0;padding:9px 12px;margin:8px 0;display:none}
.beginner-note.show{display:block}
.bn-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pu);margin-bottom:3px}
.bn-txt{font-size:13px;color:#4c1d95;line-height:1.6}
.step-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.step-item:last-child{border-bottom:none}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;flex-shrink:0;margin-top:1px;background:#e8f0e4;color:#3a6a3a;border:1.5px solid #c0d8b0}
.step-num.critical{background:#fef3dc;color:#9a6000;border-color:#e0c060}
.step-body{flex:1}
.step-text{font-size:15px;color:var(--ink);line-height:1.65}
.step-flag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-right:5px;margin-bottom:3px;vertical-align:middle}
.step-flag.kalonji{background:#2a1a4a;color:#d8c8ff;border:1px solid #4a3a7a}
.step-flag.omam{background:#4a4010;color:#f0e890;border:1px solid #8a7a30}
.step-flag.amla{background:#1a4010;color:#90d870;border:1px solid #3a7020}
.step-flag.flax{background:#3a2010;color:#e8c880;border:1px solid #7a5030}
.step-flag.critical{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}
.step-timer-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:5px 11px;border-radius:8px;border:none;background:#d8f0d0;color:#1a5a1a;font-family:'Work Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.04em}
.science-card{background:#eaf4e0;border:1.5px solid #b0d890;border-radius:12px;padding:13px 15px}
.sc-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--greenl);margin-bottom:6px}
.sc-txt{font-size:13px;color:#1e4a1e;line-height:1.7}
.action-bar{position:sticky;bottom:calc(var(--nav-h) + var(--safe-b));left:0;right:0;z-index:200;padding:10px 14px;background:rgba(250,247,242,.97);backdrop-filter:blur(12px);border-top:1.5px solid var(--border);display:flex;gap:10px}
.cook-btn{flex:1;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),var(--greenl));color:#fff;font-family:'Work Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.03em}
.beginner-toggle{padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--pu);font-family:'Work Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.beginner-toggle.on{background:rgba(155,110,232,.15);border-color:rgba(155,110,232,.4)}
#cookMode{display:none;position:fixed;inset:0;z-index:500;background:#0e1a0e;flex-direction:column}
#cookMode.active{display:flex}
.cm-top{background:#152016;border-bottom:1px solid #263624;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top))}
.cm-close{width:36px;height:36px;border-radius:10px;border:1px solid #3a5438;background:#1e3020;color:#c0e0b8;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cm-recipe-name{font-family:'Roca Two',serif;font-size:18px;color:#f0ece4;flex:1;text-align:center;padding:0 8px}
.cm-body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:20px 20px 8px}
.cm-progress{display:flex;gap:4px;margin-bottom:20px;flex-shrink:0}
.cm-prog-dot{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .3s}
.cm-prog-dot.done{background:var(--green)}
.cm-prog-dot.current{background:var(--gold)}
.cm-step-num{font-family:'DM Mono',monospace;font-size:13px;color:#8aaa88;text-align:center;margin-bottom:8px;flex-shrink:0;letter-spacing:.1em;text-transform:uppercase}
.cm-step-main{flex:1;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
.cm-step-flags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cm-step-text{font-family:'Roca Two',serif;font-size:clamp(22px,5vw,30px);color:#f0ece4;line-height:1.45;flex:1}
.cm-step-bignote{background:#2a2010;border-left:3px solid #c8a030;border-radius:0 10px 10px 0;padding:12px 14px;margin-top:14px;font-size:14px;color:#d4c090;line-height:1.5}
.cm-step-bignote .cn-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#c8a030;margin-bottom:4px}
.cm-timer{flex-shrink:0;display:none;align-items:center;justify-content:center;flex-direction:column;margin:16px 0}
.cm-timer.show{display:flex}
.timer-ring{position:relative;width:90px;height:90px}
.timer-ring svg{width:90px;height:90px;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:4;stroke-linecap:round}
.tr-bg{stroke:#2a4028}
.tr-fill{stroke:var(--gold);transition:stroke-dashoffset .9s linear}
.timer-display{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:#e0b030}
.timer-btns{display:flex;gap:8px;margin-top:8px}
.tbtn{padding:7px 16px;border-radius:10px;border:1px solid #3a5438;background:#1e3020;color:#90c088;font-family:'Work Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.04em}
.tbtn.start-t{background:rgba(58,138,26,.3);color:#7ec63b;border-color:rgba(58,138,26,.4)}
.cm-nav{flex-shrink:0;display:flex;gap:10px;padding:12px 0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.cm-prev{width:56px;height:56px;border-radius:16px;border:1px solid #3a5438;background:#1e3020;color:#c0e0b8;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cm-prev:disabled{opacity:.3}
.cm-next{flex:1;height:56px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--green),var(--greenl));color:#fff;font-family:'Work Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.cm-next.finish{background:linear-gradient(135deg,var(--gold),#f0c060);color:var(--bg)}
.cm-screen-on{font-size:10px;color:#6a8a68;text-align:center;padding:6px 0 0;flex-shrink:0;letter-spacing:.06em;text-transform:uppercase}
.empty-state{text-align:center;padding:50px 20px;color:var(--mu)}
.empty-state .es-ico{font-size:44px;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.6}

/* ── PAIRS WELL WITH SECTION ─────────────────────────────── */
.pairs-section{padding:14px 18px;border-bottom:1.5px solid var(--border);background:#f8fcf5}
.pairs-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#1e5a1e;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.pair-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #d0e8c8;align-items:flex-start}
.pair-item:last-child{border-bottom:none}
.pair-badge{flex-shrink:0;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;margin-top:2px}
.pair-badge.gravy{background:var(--greenp);color:#1e5a1e}
.pair-badge.curry{background:var(--terrap);color:var(--terra)}
.pair-badge.kootu{background:var(--goldp);color:#8a5a00}
.pair-body{flex:1;min-width:0}
.pair-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
.pair-why{font-size:12px;color:#2a4a28;line-height:1.55}
.pair-icons{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.pair-icon{font-size:10px;padding:1px 6px;border-radius:4px;background:#e0f0d8;color:#2a5a2a;font-weight:600;border:1px solid #b0d8a0}


/* ── AVOID PAIRING SECTION ──────────────────────────────────── */
.avoid-section{padding:14px 18px;border-bottom:1.5px solid var(--border);background:#fff8f5}
.avoid-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#a03010;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.avoid-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f0d8d0;align-items:flex-start}
.avoid-item:last-child{border-bottom:none}
.avoid-sev{flex-shrink:0;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;margin-top:2px}
.avoid-sev.high{background:#fcebeb;color:#9a1c1c;border:1px solid #f0b0b0}
.avoid-sev.med{background:#fef3dc;color:#9a5500;border:1px solid #f0d090}
.avoid-sev.caution{background:#fef8ec;color:#7a5a00;border:1px solid #e8d890}
.avoid-body{flex:1;min-width:0}
.avoid-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px}
.avoid-why{font-size:12px;color:#5a2a20;line-height:1.55}

@media(min-width:480px){.recipe-grid{grid-template-columns:repeat(3,1fr)}#pageIndex{max-width:520px;margin:0 auto}}
</style>
</head>
<body>

<div class="topbar" id="topbar">

  {t:'Boil carrot batons in lightly salted water until just tender — 8 minutes. Should bend slightly under pressure but not snap.',timer:480,flags:['crit'],note:'Batons rather than rounds = more surface area for the tadka to coat. They look beautiful too — like little logs stacked in the kootu.'},
  {t:'Dry kadai, 60 seconds high heat.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30},
  {t:'Add avocado oil. Add urad dal first — stir until pale gold.',timer:30,flags:['crit'],note:'Urad dal in the tadka becomes small, crunchy, nutty pieces. Do not let it turn brown — pale gold is perfect.'},
  {t:'Add mustard seeds, curry leaves. Full pop.',timer:20},
  {t:'Add carrot batons. Add cracked black pepper. Toss — 2 minutes.',timer:120},
  {t:'Add toor dal and sesame paste. Stir. Add dal water for consistency.',},
  {t:'Taste and adjust salt. Simmer 3 minutes.',timer:180},
  {t:'Off heat. 30 seconds.',timer:30},
  {t:F.flax+'Ground flaxseed in. Stir.',flags:['flax']},
 ],
 goesWith:[
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'The single most important pairing for this kootu. Piperine dramatically increases beta-carotene absorption from carrots — beta-carotene is fat-soluble and piperine inhibits P-glycoprotein efflux pumps, keeping carotenoids in the intestinal cell longer for conversion. Avocado oil provides the fat needed for absorption.',tags:['Beta-carotene↑↑','VitA↑','Piperine+']},
  {n:'Murungakkai Sambar',cat:'gravy',why:'Double beta-carotene source: drumstick leaves are also rich in carotenoids, and drumstick vitamin C critically enhances non-heme iron absorption from toor dal. Toor is the richest dal for folate — moringa folate stacks with it.',tags:['Beta-carotene↑','Iron↑','Folate+']},
  {n:'Avarakkai (Broad Beans) Fry',cat:'curry',why:'Complementary amino acid profiles — toor + broad beans together form the highest combined essential amino acid score of any kootu-curry pairing. Broad beans L-DOPA precursor + toor folate supports the full dopamine synthesis pathway.',tags:['Protein complete','Amino acid↑','L-DOPA']},
  {n:'Beetroot Fry',cat:'curry',why:'Folate in toor dal + dietary nitrates in beetroot = dual cardiovascular protection. Folate lowers homocysteine (cardiovascular risk marker) and nitrates lower blood pressure — two independent mechanisms protecting the same organ.',tags:['Folate↑','Nitrate↑','BP↓','Homocys↓']},
 ],
 avoidWith:[{n:'Eating without fat — skipping avocado oil',why:'Beta-carotene from carrots is fat-soluble. Without dietary fat in the same meal, beta-carotene absorption drops by 90%. The avocado oil in the tadka is not optional for this recipe — it is the delivery mechanism for the primary nutrient.',sev:'high'},{n:'Coffee or chai within 1 hour',why:'Tannins in tea and coffee bind iron and folate from toor dal — toor is the richest dal for folate, which is one of its primary benefits. Drinking chai or coffee within 1 hour neutralises a meaningful portion of the folate benefit.',sev:'med'}],
 science:'Carrots provide 8285 mcg beta-carotene per 100g raw — fat-soluble, meaning the avocado oil significantly increases its absorption. Toor dal is the richest source of folate among all dals.',
 begNotes:{'My toor dal is very watery':'Cook it uncovered on medium heat for 3–4 minutes before adding to the kootu.'}
},

{id:'curry-vendakkai',cat:'curry',en:'Vendakkai (Okra) Fry',ta:'வெண்டைக்காய் வறுவல்',
 time:'25 min (+ dry time)',serves:'4',
 appears:['W1 Mon','W2 Mon','W3 Tue','W4 Mon'],
 nut:{c:7,p:2,f:5,kcal:78,fibre:3},
 fat:{total:5,sat:0.7,mufa:3.6,pufa:0.5},chop40:false,
 ing:[
  {a:'500g',n:'Okra (vendakkai)',note:'Wash the NIGHT BEFORE and air dry on a clean towel. Morning: completely dry.'},
  {a:'2 tbsp',n:'Avocado oil',note:'More than usual — okra absorbs oil. Do not reduce.'},
  {a:'¼ tsp',n:'Kalonji',flag:'kalonji'},{a:'½ tsp',n:'Mustard seeds'},
  {a:'1 sprig',n:'Curry leaves'},{a:'¼ tsp',n:'Turmeric'},{a:'½ tsp',n:'Red chilli powder'},
  {a:'¾ tsp',n:'Salt',note:'Add LAST — salt draws moisture which creates steam'},
  {a:'½ tsp',n:'Amchur (dry mango powder)',note:'Added at the end — brightness without moisture'},
 ],
 steps:[
  {t:'THE NIGHT BEFORE: Wash okra thoroughly. Spread in a single layer on a clean kitchen towel. Leave uncovered at room temperature overnight.',flags:['crit'],note:'Moisture is the enemy of crisp okra. Any water on the surface turns to steam and creates sliminess. Bone-dry okra = no slime, just caramelization.'},
  {t:'Cut dry okra into 1.5cm rounds immediately before cooking — do not let cut okra sit.',flags:['crit']},
  {t:'Heat your widest heavy-bottomed pan on high heat — 90 seconds minimum.',timer:90,flags:['crit'],note:'Most home cooks use too small a pan and too low heat. Okra needs space and high heat to fry rather than steam.'},
  {t:F.kalonji+'Add kalonji seeds to the dry hot pan. No oil yet. 30 seconds.',timer:30,flags:['crit']},
  {t:'Add avocado oil. Add mustard seeds. Wait for full pop.',timer:20},
  {t:'Add curry leaves.',timer:10},
  {t:'Add all okra AT ONCE in a single layer. Add turmeric and chilli powder. DO NOT STIR for 3 full minutes.',timer:180,flags:['crit'],note:'This is where most people go wrong. Stirring too early prevents the Maillard reaction. Leave it completely alone.'},
  {t:'After 3 minutes, stir from the bottom — you should see golden-brown patches. Spread again. Wait 2 more minutes.',timer:120},
  {t:'Continue cooking, stirring every 2 minutes, for another 8–10 minutes total.',timer:480},
  {t:'LAST STEP: Add salt and amchur together. Toss well. Cook 1 more minute. Serve immediately.',timer:60,flags:['crit'],note:'Salt added early releases moisture and creates steam. Added at the very end, it seasons without damage to texture.'},
 ],
 goesWith:[
  {n:'Murungakkai Sambar',cat:'gravy',why:'Drumstick has 7× the vitamin C of oranges — this directly maximises non-heme iron absorption from okra. Drumstick isothiocyanates and okra flavonoids (quercetin, kaempferol) are complementary antioxidants. Moringa isothiocyanates specifically inhibit LDL oxidation.',tags:['Iron↑↑','VitC max','LDL-ox↓']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Okra mucilage + moong soluble fiber = dual bile acid binding. This is the most potent single LDL-lowering meal combination available in the 28-day plan when measured by total bile acid binding capacity.',tags:['LDL↓↓','Bile↓↓','Cholest↓']},
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'Horse gram tannins + okra mucilage = the double cholesterol mechanism. Tannins bind bile acids in the upper intestine; okra mucilage catches them again in the lower intestine. Vitamin C in rasam also enhances okra iron. The Saturday pairing is particularly powerful.',tags:['LDL↓↓','Dual mech','Sat benefit']},
  {n:'Spinach Kootu',cat:'kootu',why:'Spinach iron + okra folate + combined vitamin C (if served with tamarind gravy) = one of the most micronutrient-dense meal combinations. Okra and spinach are both high in quercetin, amplifying anti-inflammatory load.',tags:['Iron+','Folate+','Quercetin²']},
 ],
 avoidWith:[{n:'Dairy at the same meal',why:'Calcium in dairy partially displaces the bile acid binding activity of okra mucilage — calcium forms insoluble calcium soaps with fatty acids, competing for the same binding sites in the gut. The LDL-lowering effect of okra mucilage is measurably reduced when calcium is present.',sev:'med'},{n:'More than 1 tbsp of oil for cooking',why:'Okra absorbs oil readily. The mucilage coating that performs the bile acid binding action is disrupted by oil saturation. More than 1 tbsp of oil for this dish reduces its therapeutic value.',sev:'med'}],
 science:'Okra soluble fibre binds bile acids and forces the liver to convert more cholesterol to bile. Regular okra consumption reduces LDL by 8–14% in 8-week studies. Contains quercetin (22.5mg/100g) and kaempferol — powerful anti-inflammatory flavonoids.',
 begNotes:{'How do I know the pan is hot enough?':'Flick water drops — they should instantly skitter and evaporate within 1–2 seconds.','My okra is still slimy':'Wet okra, stirred too early, or too small a pan. All three causes the same problem: steam instead of fry.','Can I use non-stick?':'For okra, no. Non-stick doesn\'t get hot enough for the Maillard browning.'}
},
{id:'curry-kathrikkai',cat:'curry',en:'Kathrikkai (Brinjal) Fry',ta:'கத்திரிக்காய் வறுவல்',
 time:'30 min',serves:'4',
 appears:['W1 Tue','W2 Thu','W3 Sat','W4 Thu'],
 nut:{c:6,p:2,f:6,kcal:82,fibre:3},
 fat:{total:6,sat:0.8,mufa:4.2,pufa:0.6},chop40:false,
 ing:[
  {a:'500g',n:'Brinjal (kathrikkai)',note:'Medium-large, firm, shiny skin. Purple or striped variety.'},
  {a:'2 tbsp',n:'Avocado oil'},{a:'¼ tsp',n:'Kalonji',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},{a:'1 sprig',n:'Curry leaves'},
  {a:'1½ tsp',n:'Sambar powder',note:'Good quality — doing a lot of work here'},
  {a:'1 tsp',n:'Tamarind paste (thick)',note:'Very thick — extract from a small ball soaked in 2 tbsp warm water'},
  {a:'¼ tsp',n:'Turmeric'},{a:'½ tsp',n:'Salt'},
  {a:'½ tsp',n:'Jaggery or date paste',note:'A tiny amount — rounds the tamarind acid'},
 ],
 steps:[
  {t:'Cut brinjal into 1cm rounds. Sprinkle ¼ tsp salt over both sides. Rest 8 minutes.',timer:480,flags:['crit'],note:'Salt draws out excess moisture and the natural bitterness. After 8 minutes you will see small droplets on the surface.'},
  {t:'Pat every round aggressively dry with kitchen paper — both sides. Press firmly.',flags:['crit'],note:'Moisture on the surface creates steam, not browning.'},
  {t:'Mix tamarind paste + jaggery together. This is your glaze.',note:'Jaggery rounds tamarind acid without adding detectable sweetness. Think of it as a volume knob.'},
  {t:'Heat your widest pan on medium-high — 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30},
  {t:'Add avocado oil. Mustard seeds, curry leaves. Full pop.',timer:20},
  {t:'Lay brinjal rounds in a SINGLE LAYER. Add turmeric. DO NOT TOUCH for 4 full minutes.',timer:240,flags:['crit'],note:'Four minutes undisturbed on medium-high creates a dark, fragrant crust — mahogany brown is perfect.'},
  {t:'Carefully flip each round. Sprinkle sambar powder. Drizzle the tamarind-jaggery glaze.',timer:60,flags:['crit']},
  {t:'Cook 4 more minutes without stirring.',timer:240},
  {t:'Turn heat to low. Stir gently. Cook 2 more minutes. Taste and adjust salt.',timer:120},
 ],
 goesWith:[
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'Piperine in Milagu sambar enhances chlorogenic acid absorption from brinjal by approximately 2×. Chlorogenic acid is one of the most potent inhibitors of LDL oxidation — keeping it in your system longer directly reduces vascular inflammation.',tags:['Chlorogenic↑','LDL-ox↓','Piperine+']},
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'Horse gram tannins + brinjal nasunin (anthocyanin) = double LDL oxidation prevention via two independent mechanisms. Tannins intercept bile-transported LDL; nasunin protects cell membranes from oxidative LDL damage. Flavor: the earthy astringency of kollu rasam complements brinjal beautifully.',tags:['LDL-ox↓','Nasunin+','Tannin+']},
  {n:'Chana Dal & Ridge Gourd Kootu',cat:'kootu',why:'Chana dal GI 8 + brinjal = one of the lowest-glycaemic combinations in this plan. Brinjals natural compounds also reduce post-meal glucose by inhibiting glucosidase enzymes. Combined glycaemic impact is very significantly blunted — excellent for days when kids are eating white rice.',tags:['GI↓↓','Glucose↓','Insulin blunt']},
  {n:'Vetha Kuzhambu',cat:'gravy',why:'Tamarind vitamin C enhances chlorogenic acid bioavailability from brinjal. Shallot quercetin in VK + brinjal nasunin = complementary flavonoid layers. Flavor harmony: the deep sourness of VK and the slight bitterness of brinjal are a classic Tamil pairing.',tags:['Chlorogenic↑','Quercetin+','Tamil classic']},
 ],
 avoidWith:[{n:'Eating without any vitamin C source in the meal',why:'Brinjal chlorogenic acid and nasunin (the key LDL-oxidation inhibitors) have significantly better bioavailability when consumed alongside vitamin C. Without a tamarind gravy or amla in the meal, the therapeutic compounds are less well absorbed.',sev:'med'},{n:'Overcooking to a very soft mush',why:'Nasunin (brinjal anthocyanin) degrades significantly with extended high-heat cooking. Brinjal cooked completely soft has lost most of its nasunin content. Cook until just tender.',sev:'med'}],
 science:'Brinjal contains nasunin — a rare anthocyanin in the purple skin that protects lipids in brain cell membranes. Nasunin is fat-soluble — the avocado oil significantly increases its absorption. Tamarind provides hydroxycitric acid, which inhibits ATP-citrate lyase — an enzyme involved in fat synthesis.',
 begNotes:{'Why is my brinjal absorbing all the oil?':'Brinjal is a sponge. The salt-and-rest step reduces this. Do not add more oil.','The sambar powder burned':'Your heat was too high after flipping. The brinjal rounds should be slightly moist on the uncooked side.'}
},
{id:'curry-cauliflower',cat:'curry',en:'Cauliflower Curry',ta:'காலிஃப்ளவர் கறி',
 time:'20 min',serves:'4',
 appears:['W1 Wed','W2 Tue','W3 Wed','W4 Tue'],
 nut:{c:9,p:3,f:5,kcal:88,fibre:3},
 fat:{total:5,sat:0.6,mufa:3.6,pufa:0.5},chop40:true,
 ing:[
  {a:'500g',n:'Cauliflower',note:'Cut into small florets max 3cm. Chop 40 minutes before cooking.'},
  {a:'1 tbsp',n:'Avocado oil'},{a:'¼ tsp',n:'Kalonji',flag:'kalonji'},
  {a:'½ tsp',n:'Cumin seeds'},{a:'1 tsp',n:'Coriander powder'},
  {a:'½ tsp',n:'Cumin powder'},{a:'¼ tsp',n:'Turmeric'},
  {a:'½ tsp',n:'Red chilli powder'},{a:'½ tsp',n:'Black pepper, coarsely cracked'},
  {a:'¾ tsp',n:'Salt'},{a:'1 tbsp',n:'Lemon juice',note:'Squeezed at the very end, off heat'},
 ],
 steps:[
  {t:'Toss cauliflower florets in a dry iron kadai on high heat for 2 minutes — no oil. Stir constantly.',timer:120,flags:['crit'],note:'Dry-searing cauliflower before adding oil is a restaurant technique. Evaporates surface moisture and starts browning before oil is introduced.'},
  {t:F.kalonji+'Push florets to one side. In the cleared space, add kalonji. 30 seconds dry.',timer:30},
  {t:'Add avocado oil to the kalonji space. Add cumin seeds. Wait for sizzle.',timer:15},
  {t:'Toss everything together. Add all dry spices at once. Toss to coat every floret.',note:'All spices at once — they toast in the residual oil simultaneously. Staggering them at this stage creates uneven, muddy flavour.'},
  {t:'Cover with lid. Medium heat. 3 minutes — the florets will steam-fry in their own moisture.',timer:180,flags:['crit']},
  {t:'Remove lid. High heat. Add salt. Cook uncovered 5–8 minutes until edges turn deep golden.',timer:420,flags:['crit'],note:'This uncovered high-heat finish is everything. The char on the tips provides bitterness that balances the sweetness of cauliflower. Pale yellow curry is sad. Golden-tipped curry is joyful.'},
  {t:'Off heat. Squeeze lemon juice over. Toss once. Serve.',note:'Lemon juice at the end lifts all the flavours. It does not make the dish sour — it makes every other flavour brighter.'},
 ],
 goesWith:[
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'THE critical pairing for cauliflower. Piperine specifically inhibits glucosidase enzymes that would otherwise compete with myrosinase for the same glucosinolate substrate — this increases sulforaphane yield from cauliflower by a meaningful margin. Milagu sambar is the single most important thing you can pair with the 40-minute-chopped cauliflower.',tags:['Sulforaphane↑↑','Piperine crit','NRF2↑']},
  {n:'Horse Gram & White Pumpkin Kootu',cat:'kootu',why:'Sulforaphane from cauliflower + horse gram isoflavones = synergistic Phase II enzyme induction. These two compounds activate different receptor sites on the same NRF2 gene pathway, creating an amplified effect. This is the most powerful detoxification + anti-cancer meal in the 28-day plan.',tags:['Phase II↑','NRF2 synerg','Anti-cancer↑']},
  {n:'Toor Dal & Carrot Kootu',cat:'kootu',why:'Sulforaphane\'s HDAC inhibition (epigenetic mechanism) + toor folate = double epigenetic protection. Sulforaphane silences cancer-associated genes while folate supports correct DNA methylation — two complementary epigenetic interventions in one meal.',tags:['Epigenetic','HDAC inhib','Methylation+']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Light moong kootu lets cauliflower\'s nutrition dominate. Moong zinc + cauliflower sulforaphane supports the thyroid T4→T3 conversion pathway (selenium-zinc-sulforaphane axis). Particularly relevant given your Free T3 result.',tags:['Thyroid↑','Zinc+','T3 convert']},
 ],
 avoidWith:[{n:'Any meal without black pepper (piperine)',why:'Without piperine in the same meal, sulforaphane yield from the 40-minute-chopped cauliflower is reduced. Always pair cauliflower with Milagu Sambar or ensure black pepper appears in a gravy.',sev:'high'},{n:'Eating cauliflower without the 40-minute pre-chop',why:'If cauliflower is chopped and immediately cooked, heat destroys myrosinase before sulforaphane can form. The dish becomes nutritionally equivalent to any ordinary vegetable. The 40-minute wait is not aesthetic.',sev:'high'},{n:'Very frequent raw consumption alongside iodine-marginal diet',why:'Cooking largely eliminates the goitrogenic concern. However, if iodine intake is consistently marginal and cauliflower is eaten very frequently, glucosinolates can mildly reduce thyroid iodine uptake. Ensure iodized salt is used in cooking.',sev:'caution'}],
 science:'Cauliflower glucosinolates activate NRF2 pathways — the body\'s master antioxidant switch. Consuming cauliflower 4+ times weekly is associated with 40% reduced risk of certain cancers. The 40-minute chop rule maximises sulforaphane formation.',
 begNotes:{'How small should the florets be?':'Roughly the size of a large grape. Too large = outside burns before inside cooks. Too small = mushy.'}
},
{id:'curry-beetroot',cat:'curry',en:'Beetroot Fry',ta:'பீட்ரூட் வறுவல்',
 time:'25 min',serves:'4',
 appears:['W1 Sat','W3 Fri','W4 Sat'],
 nut:{c:11,p:2,f:4,kcal:86,fibre:2},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'Beetroot',note:'Peeled. Cut into 5mm dice (brunoise) — the chef\'s secret'},
  {a:'1 tbsp',n:'Avocado oil'},{a:'¼ tsp',n:'Kalonji',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},{a:'10',n:'Curry leaves'},
  {a:'¼ tsp',n:'Turmeric'},{a:'½ tsp',n:'Cumin seeds'},
  {a:'¾ tsp',n:'Salt'},{a:'½ tsp',n:'Black pepper, cracked'},
 ],
 steps:[
  {t:'Cut beetroot into 5mm dice (brunoise). The small dice dramatically increases surface area, allowing faster caramelization of beet sugars.',flags:['crit'],note:'Large beet pieces taste like boiled beet. Small dice, caramelized at high heat, taste like something else entirely — almost candy-like with dark edges.'},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30},
  {t:'Add avocado oil. Cumin seeds, mustard seeds. Full pop. Curry leaves.',timer:25},
  {t:'Add beet dice. Add turmeric. Stir to coat. Spread in an even layer.',},
  {t:'Medium heat. Cook UNCOVERED for 15–18 minutes, stirring every 3 minutes.',timer:900,flags:['crit'],note:'Patience here is rewarded. The beet sugars need time to caramelise. Medium heat, slow and steady, creates deeply sweet beet with slightly dark, almost jammy edges.'},
  {t:'Add salt and cracked pepper in the last 2 minutes.',timer:120,flags:['crit']},
  {t:'Ready when beet pieces have shrunken by ~30% and edges are slightly dark. Deglaze with 1 tbsp water, scrape up the sticky residue — it is flavour gold.',flags:['crit']},
 ],
 goesWith:[
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'Vitamin C from tamarind + tomato in kollu rasam is the key that unlocks beetroot iron — non-heme iron is poorly absorbed without vitamin C. Horse gram polyphenols also enhance Bifidobacterium that produce short-chain fatty acids feeding colonic cells. Betalains + kollu polyphenols = combined gut microbiome support.',tags:['Iron↑↑','VitC key','Bifido+']},
  {n:'Chana Dal & Ridge Gourd Kootu',cat:'kootu',why:'Chana dal has the lowest GI of any legume at 8. Beetroot has a moderate GI of 64. Pairing them blunts the beetroot glucose response significantly — critical on white rice days for the kids. Ridge gourd cucurbitacins + betalains = double anti-inflammatory.',tags:['GI blunt↑','Glucose↓','Anti-inflam²']},
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'Piperine enhances betalain absorption from beetroot — betalains are water-soluble pigments but are poorly transported across intestinal membranes without absorption enhancers. Piperine activates SGLT1 transporters that carry betalains into systemic circulation.',tags:['Betalain↑','Piperine+','Bioavail↑']},
  {n:'Toor Dal & Carrot Kootu',cat:'kootu',why:'Folate from toor dal + dietary nitrates from beetroot = dual cardiovascular protection via two distinct pathways. Folate reduces homocysteine (independent cardiovascular risk factor); nitrates lower blood pressure via NO synthesis. Both are particularly important given your hs-CRP of 4.7.',tags:['Folate↑','Nitrate↑','BP↓','Homocys↓']},
 ],
 avoidWith:[{n:'Iron supplements on the same day',why:'Beetroot oxalates can interfere with iron supplement absorption. Take iron supplements well separated from a beet-heavy meal. Beetroot betalains also temporarily colour urine pink (beeturia) which is harmless.',sev:'caution'},{n:'High-oxalate foods at the same meal',why:'Beetroot is moderately high in oxalates. Given the trace protein finding in the February urinalysis, combining beetroot with other high-oxalate foods (spinach, nuts, chocolate) at the same meal is worth monitoring.',sev:'caution'},{n:'Eating without a fat source',why:'Betalains have better cellular uptake when fat is present. The avocado oil tadka in this recipe is correctly positioned — do not omit it.',sev:'med'}],
 science:'Beetroot contains betalains — pigments that inhibit LDL oxidation. Dietary nitrates convert to nitric oxide, dilating blood vessels and reducing blood pressure (demonstrated 10–15 mmHg reduction in meta-analyses). Caramelization increases bioavailability of betalains compared to boiling.',
 begNotes:{'How to cut brunoise without cutting fingers':'Cut the beet into slabs first, then into sticks, then across into tiny cubes. Work slowly.'}
},
{id:'curry-broad-beans',cat:'curry',en:'Avarakkai (Broad Beans) Fry',ta:'அவரைக்காய் வறுவல்',
 time:'20 min',serves:'4',
 appears:['W1 Thu','W2 Wed','W3 Thu','W4 Wed'],
 nut:{c:10,p:5,f:4,kcal:93,fibre:5},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'Avarakkai (broad beans / flat beans)',note:'String removed. Cut into 3cm pieces diagonally.'},
  {a:'1 tbsp',n:'Avocado oil'},{a:'¼ tsp',n:'Kalonji',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},{a:'1 tsp',n:'Urad dal'},
  {a:'1 sprig',n:'Curry leaves'},{a:'¼ tsp',n:'Turmeric'},
  {a:'½ tsp',n:'Chilli powder'},{a:'¾ tsp',n:'Salt'},{a:'¼ tsp',n:'Black pepper'},
 ],
 steps:[
  {t:'String both edges of the beans. Cut diagonally into 3cm pieces.',},
  {t:'Dry kadai, high heat.',timer:60},
  {t:F.kalonji+'Kalonji dry, 30 sec.',timer:30},
  {t:'Oil, urad dal first — stir until pale gold.',timer:25,flags:['crit'],note:'Urad dal must go before mustard seeds — it takes longer to colour.'},
  {t:'Mustard seeds, curry leaves. Full pop.',timer:20},
  {t:'Add beans. Toss with spices. Medium-high heat.',},
  {t:'Cover. Cook 5 minutes.',timer:300},
  {t:'Remove lid. Add salt + chilli powder + pepper. High heat. Cook uncovered 5–6 minutes, stirring every 90 seconds.',timer:330,flags:['crit'],note:'The uncovered high-heat finish blisters and chars the beans — these caramelized spots are where all the flavour lives.'},
 ],
 goesWith:[
  {n:'Vetha Kuzhambu',cat:'gravy',why:'THE critical pairing for avarakkai. Tamarind is rich in tartaric acid and vitamin C — both dramatically enhance non-heme iron absorption from broad beans. Broad beans have meaningful iron content but it is almost entirely non-heme and requires acid/vitamin C. VKs thick tamarind provides both in high concentration.',tags:['Iron↑↑↑','VitC crit','Tamarind+']},
  {n:'Murungakkai Sambar',cat:'gravy',why:'Drumstick vitamin C (7× oranges) + avarakkai iron = maximum iron absorption. Moringa compounds and broad bean compounds are both in the leguminous family — their combined anti-inflammatory and lipid-modifying effects are additive. Double leguminous meal with the highest combined anti-inflammatory load.',tags:['Iron↑↑','Inflam↓²','Double legume']},
  {n:'Toor Dal & Carrot Kootu',cat:'kootu',why:'Complementary amino acid profiles between toor and avarakkai — together they form a complete protein superior to either alone. Avarakkai L-DOPA + toor folate = the dopamine synthesis pathway from B-vitamin support through neurotransmitter precursor. Relevant to mood and motivation.',tags:['Protein complete','L-DOPA','Dopamine path']},
 ],
 avoidWith:[{n:'Dairy or calcium-rich foods at the same meal',why:'Calcium competes with the non-heme iron in avarakkai for intestinal absorption. Avarakkai iron is meaningful (1.4mg per 100g) but poorly absorbed without vitamin C and blocked by calcium.',sev:'high'},{n:'Coffee or chai within 1 hour',why:'Tannins bind avarakkai iron and folate — avarakkai is one of the highest-folate vegetables in this plan. Tea consumed within 1 hour neutralises a significant portion of the folate absorption benefit.',sev:'high'},{n:'MAO inhibitor medications',why:'Raw or undercooked broad beans contain L-DOPA and trace tyramine. If anyone in the family is on MAO inhibitor medication, broad beans should be fully cooked and consumed in moderate quantities only. Consult a doctor.',sev:'caution'}],
 science:'Broad beans are rich in L-DOPA, a dopamine precursor. Provide 7g protein per 100g. The soluble fibre specifically binds bile acids, reducing cholesterol reabsorption.',
 begNotes:{'How do I know they are cooked?':'Pierce one with a fork — should go through with light pressure, not pop.'}
},
{id:'curry-sweet-potato',cat:'curry',en:'Sweet Potato Curry',ta:'சர்க்கரைவள்ளிக்கிழங்கு கறி',
 time:'25 min',serves:'4',
 appears:['W1 Fri','W2 Fri','W3 Sun','W4 Sun'],

 ],
 steps:[
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},

  {t:'Remove lid. High heat. Cook 6–8 minutes, stirring every 2 minutes, until moisture evaporated and edges golden.',timer:420,flags:['crit'],note:'Sweet potato caramelises at lower temperatures because of its high natural sugar. Watch carefully — goes from golden to burnt in 60 seconds.'},
  {t:'Add salt last 2 minutes. Off heat, lime juice. Toss.',timer:120},
 ],
 goesWith:[
  {n:'Horse Gram & White Pumpkin Kootu',cat:'kootu',why:'This is the most important glycaemic pairing in the plan. Horse gram soluble fiber physically slows gastric emptying and starch digestion — in clinical trials, horse gram reduces post-meal glucose by up to 40% when eaten with a starchy food. Sweet potatos moderate GI is significantly blunted by kollu soluble fiber. Critical for insulin stability.',tags:['GI↓↓','Insulin↓','Glucose↓ 40%']},
  {n:'Chana Dal & Ridge Gourd Kootu',cat:'kootu',why:'Chana dal GI 8 + sweet potato = meaningful glycaemic buffering. The soluble fibre in chana slows starch digestion from sweet potato. On kids white rice days this combination reduces the overall meal GI substantially. Ridge gourd zinc + sweet potato beta-carotene = complementary micronutrients.',tags:['GI buffer','Kids optimal','Zinc+Beta-car']},
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'Piperine dramatically enhances beta-carotene (provitamin A) absorption from sweet potato — sweet potato is the highest beta-carotene curry in this plan, and piperine specifically increases the conversion of beta-carotene to active vitamin A in the intestinal cell. This meal has the highest vitamin A yield of any combination in the 28-day plan.',tags:['Beta-car↑↑','VitA↑↑','Piperine+']},
 ],
 avoidWith:[{n:'Eating without fat — omitting avocado oil',why:'Beta-carotene in sweet potato is fat-soluble. Without fat, absorption drops dramatically. The avocado oil in the tadka is the delivery vehicle for the primary nutrient. Do not make a fat-free version of this curry.',sev:'high'},{n:'Pairing with potato, vazhakkai, senai kilangu, or biryani at the same meal',why:'Sweet potato at 18g net carbs per serving + another high-starch dish creates a high glycaemic load meal. For adults this matters for ApoB management; for kids on white rice this creates a triple-starch plate.',sev:'high'},{n:'Serving without a high-fibre counterpart',why:'Sweet potato has a moderate glycaemic index (54). Without a fibre-rich dal or gravy alongside, the glucose response is steeper. Always serve with a kootu or horse gram rasam.',sev:'med'}],
 science:'Sweet potato provides 941 mcg beta-carotene per 100g — one of the richest food sources available. Glycaemic index of 54 vs white potato\'s 78. As roasted veg in adult dinner, a ½ cup serving is only 13g net carbs with 2g fibre.',
 begNotes:{'The sweet potato is burning before cooked through':'Cubes too large or heat too high. Reduce to medium and add 2 more tbsp water, cover again 3 minutes.'}
},

{id:'gravy-kollu-rasam',cat:'gravy',en:'Kollu (Horse Gram) Rasam',ta:'கொள்ளு ரசம்',
 time:'30 min (+ soak)',serves:'4',
 appears:['W1 Sat','W2 Sat','W3 Tue','W4 Sat'],
 nut:{c:8,p:5,f:2,kcal:68,fibre:3},
 fat:{total:2,sat:0.3,mufa:1.2,pufa:0.3},chop40:false,
 ing:[
  {a:'100g',n:'Horse gram (kollu)',note:'Soaked overnight. Not optional.'},
  {a:'2',n:'Tomatoes (medium)',note:'Roughly chopped. Add LATE.'},
  {a:'1 tsp',n:'Black peppercorns (whole)',note:'Coarsely cracked in a mortar — not fine powder'},
  {a:'1 tsp',n:'Cumin seeds (whole)',note:'Coarsely cracked with pepper'},
  {a:'¼ tsp',n:'Omam seeds (ajwain / carom)',flag:'omam'},
  {a:'½ tsp',n:'Amla powder',flag:'amla'},
  {a:'2',n:'Dried red chilli'},{a:'1 sprig',n:'Curry leaves'},
  {a:'1 tsp',n:'Avocado oil'},{a:'¼ tsp',n:'Turmeric'},{a:'¾ tsp',n:'Salt'},
  {a:'1 tsp',n:'Tamarind paste (thin)',note:'Optional — just a small amount for depth'},
 ],
 steps:[
  {t:'Drain and pressure cook soaked horse gram with 600ml water — 3 whistles. Open when pressure drops naturally.',timer:720,flags:['crit'],note:'NEVER discard this cooking water. It is deep reddish-brown, intensely flavoured, and contains every cholesterol-fighting compound kollu offers.'},
  {t:'Strain out whole horse gram kernels (save for another use). Keep ONLY the red cooking water. Add turmeric + thin tamarind paste if using.',},
  {t:'In a mortar, coarsely crack black peppercorns and cumin seeds together. Uneven pieces — some fine dust, some larger fragments.',flags:['crit'],note:'Fine-ground pepper tastes flat and hot. Coarsely cracked gives you initial heat then more heat as you chew — more nuanced.'},
  {t:'Bring horse gram water to simmer. Add chopped tomatoes. Cook 5 minutes.',timer:300,note:'Tomatoes go in LATE — they retain bright acidity that contrasts the deep earthiness of the kollu base.'},
  {t:'Add the cracked pepper-cumin mixture. Stir. Simmer 5 more minutes.',timer:300},
  {t:'Taste. Season with salt. The rasam should be thin, fragrant, with layers of heat.',},
  {t:'Tempering: heat a small pan until very hot.',},
  {t:F.omam+'Add omam seeds first to the dry hot pan — exactly 10 seconds.',timer:10,flags:['crit'],note:'Omam burns in 12 seconds on high heat. At exactly 10 seconds — golden, aromatic — it tastes like a sophisticated herbal bloom.'},
  {t:'Add avocado oil. Dried red chilies. Curry leaves. Pour tempering over rasam. Cover IMMEDIATELY.',timer:15},
  {t:'Wait 2 minutes covered.',timer:120},
  {t:'Turn off heat. Wait 30 full seconds.',timer:30},
  {t:F.amla+'Add amla powder. Stir well.',flags:['amla'],note:'Amla must not boil. Patience — 30 seconds off heat drops below the destruction temperature of its polyphenols.'},
 ],
 goesWith:[
  {n:'Spinach Kootu (Ramya)',cat:'kootu',why:'Tamarind vitamin C in this rasam is critical for spinach iron absorption. Kollu tannins also bind oxalate from spinach, reducing the competition between oxalate and iron for absorption sites. The most important therapeutic pairing for the iron-deficiency risk inherent in a plant-based diet.',tags:['Iron↑↑↑','Oxalate↓','VitC crit']},
  {n:'Vendakkai (Okra) Fry',cat:'curry',why:'Horse gram tannins + okra mucilage = the double LDL mechanism. Used on Saturday (kollu rasam day), pairing with okra curry makes Saturday the highest LDL-intervention day of the week. This combination alone can reduce LDL meaningfully over 4 weeks.',tags:['LDL↓↓','Bile↓²','Saturday max']},
  {n:'Beetroot Fry',cat:'curry',why:'Vitamin C from tamarind + tomato enhances beetroot iron absorption. Betalains (beetroot) + kollu polyphenols both feed beneficial gut bacteria including Bifidobacterium. Combined effect on gut microbiome diversity is additive.',tags:['Iron↑','Bifido+','Gut diversity']},
  {n:'Turnip Kootu',cat:'kootu',why:'Vitamin C in rasam boosts glucosinolate bioavailability in turnip. Kollu tannins partially offset coconut sat fat in turnip kootu (family version). Mild flavor profile of turnip kootu complements the assertive flavor of kollu rasam harmoniously.',tags:['Glucosin↑','VitC','Sat fat↓','Flavor']},
 ],
 avoidWith:[{n:'Iron or mineral supplements at the same meal',why:'Kollu is exceptionally high in tannins — among the highest of any common food. Supplemental iron forms insoluble tannate complexes with horse gram tannins, rendering the supplement almost completely unabsorbable. Take supplements at least 2 hours from this rasam.',sev:'high'},{n:'Coffee or chai immediately before or after',why:'Tannins in kollu + tannins in tea = compounded iron-binding and polyphenol-degrading effect. Space the coffee at least 30 minutes from this rasam.',sev:'high'},{n:'Blood thinning medications (warfarin, aspirin)',why:'Horse gram saponins and polyphenols have mild antiplatelet activity. This is generally beneficial but may interact additively with anticoagulant medications.',sev:'caution'}],
 science:'Kollu rasam is the most LDL-reducing item in this entire plan. Horse gram water contains polyphenols, tannins, and saponins — shown in controlled trials to reduce LDL by up to 52 mg/dL in 3 weeks. Black pepper enhances turmeric curcumin absorption by 2000%. Omam thymol has demonstrated bile-acid sequestrant properties.',
 begNotes:{'The rasam smells too strong of horse gram':'This is correct. It is a robust, earthy rasam. Tamarind and amla balance it. Drink it like a broth.'}
},
{id:'gravy-vetha-kuzhambu',cat:'gravy',en:'Vetha Kuzhambu',ta:'வேத குழம்பு',
 time:'35 min',serves:'4',
 appears:['Every Thursday — weekly feature'],
 nut:{c:10,p:2,f:3,kcal:73,fibre:2},
 fat:{total:3,sat:0.4,mufa:2.2,pufa:0.3},chop40:false,
 ing:[
  {a:'2 tbsp',n:'Tamarind paste (thick)',note:'From a good-sized ball soaked in ½ cup warm water'},
  {a:'400ml',n:'Water'},
  {a:'15',n:'Small onions (shallots)',note:'Peeled but kept whole — they slowly caramelise'},
  {a:'2 tsp',n:'Sambar powder'},{a:'¼ tsp',n:'Omam seeds',flag:'omam'},
  {a:'½ tsp',n:'Amla powder',flag:'amla'},
  {a:'1 tbsp',n:'Sundried brinjal pieces (yathal)',note:'Or sundried mango (vathal) — these are the "vetha" (dried things)'},
  {a:'½ tsp',n:'Mustard seeds'},{a:'10',n:'Curry leaves'},
  {a:'1 tbsp',n:'Avocado oil'},{a:'¼ tsp',n:'Turmeric'},
  {a:'¼ tsp',n:'Jaggery (optional)'},{a:'1 tsp',n:'Salt'},
 ],
 steps:[
  {t:'Heat avocado oil in a heavy-bottomed kadai on medium heat.',},
  {t:'Add sundried brinjal/vathal pieces first — 2 minutes to puff and darken in the oil. Stir continuously.',timer:120,flags:['crit'],note:'The vathal frying in oil is the defining flavour note of vetha kuzhambu. They release deeply concentrated, almost smoky flavour. Rush this step and the dish loses its identity.'},
  {t:F.omam+'Add omam to the hot oil. 8 seconds only.',timer:8,flags:['crit']},
  {t:'Add mustard seeds and curry leaves. Full pop.',timer:20},
  {t:'Add whole shallots. Cook 4 minutes until golden at edges and softened.',timer:240,note:'Whole shallots become almost jammy and sweet as they caramelise in the tamarind gravy.'},
  {t:'Add sambar powder + turmeric. Stir with the oil and shallots — toast 30 seconds.',timer:30,flags:['crit'],note:'Toasting sambar powder in oil before adding liquid transforms the raw spice smell into rounded, deep flavour.'},
  {t:'Pour in tamarind water. Mix well. Bring to boil. Reduce to medium-low.',},
  {t:'Simmer uncovered for 15–20 minutes, stirring every 3 minutes. Reduce to about 60% of its volume.',timer:1080,flags:['crit'],note:'Consistency test: spoon drip should flow in a steady thick stream — not water-thin, not syrup-thick.'},
  {t:'Add tiny pinch of jaggery if using. Adjust salt. Add more tamarind if needed.',},
  {t:'Turn off heat. Wait 30 seconds.',timer:30},
  {t:F.amla+'Add amla powder. Stir gently.',flags:['amla']},
 ],
 goesWith:[
  {n:'Spinach Kootu (Ramya)',cat:'kootu',why:'The most important flavor and nutritional pairing for Vetha Kuzhambu. Tamarind provides vitamin C that critically enhances non-heme iron from spinach. The sharp sourness of VK provides a counterpoint to the earthy richness of spinach kootu — this is why these two appear together in traditional Tamil Brahmin menus.',tags:['Iron↑↑↑','VitC max','Traditional']},
  {n:'Kathrikkai (Brinjal) Fry',cat:'curry',why:'Tamarind vitamin C enhances chlorogenic acid bioavailability from brinjal. VKs shallot quercetin + brinjal nasunin = layered flavonoid protection. This is the classic Tamil pairing — the sustained sourness of VK and the slight bitterness of brinjal are designed for each other.',tags:['Chlorogenic↑','Quercetin+','Classic Tamil']},
  {n:'Avarakkai (Broad Beans) Fry',cat:'curry',why:'Tamarind vitamin C is critical for broad beans non-heme iron — this is the #1 iron-absorption pairing for avarakkai. Flavor: the slight bitterness of broad beans against the sour-sweet VK creates excellent contrast.',tags:['Iron↑↑','VitC crit','Flavor+']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Mild moong kootu provides necessary protein and soluble fiber without competing with VKs strong flavor profile. The tamarind in VK enhances iron absorption from moong. This pairing respects the principle of not serving two strong-flavored dishes together.',tags:['Balance','Iron↑','Mild+Strong']},
 ],
 avoidWith:[{n:'Another high-tamarind dish on the same day',why:'Excess tamarind (tartaric acid) over a single day is mildly demineralising to tooth enamel with prolonged daily exposure and can cause acid reflux in sensitive individuals. One tamarind-based dish per day is the practical limit.',sev:'med'},{n:'NSAIDs (ibuprofen, aspirin) at the same meal',why:'Tamarind hydroxycitric acid can enhance absorption of some medications including NSAIDs, potentially increasing GI exposure. Take pain medications well separated from tamarind-heavy meals.',sev:'caution'}],
 science:'Vetha kuzhambu contains tamarind (hydroxycitric acid — inhibits lipogenesis), shallots (quercetin — anti-inflammatory), and concentrated vathal. Omam thymol increases digestive enzyme secretion by up to 70%.',
 begNotes:{'My kuzhambu is too sour':'Add more water and cook 5 more minutes. A pinch more jaggery also helps.','The vathal — where do I buy them?':'Indian grocery stores carry sun-dried brinjal, drumstick, and other vathals in small packets. Keep for months in airtight container.'}
},
{id:'gravy-murungakkai-sambar',cat:'gravy',en:'Murungakkai Sambar',ta:'முருங்கைக்காய் சாம்பார்',
 time:'35 min',serves:'4',
 appears:['W1 Mon','W1 Sun','W3 Mon','W3 Sun','W4 Mon','W4 Fri'],
 nut:{c:12,p:6,f:2,kcal:88,fibre:4},
 fat:{total:2,sat:0.3,mufa:1.2,pufa:0.3},chop40:false,
 ing:[
  {a:'100g',n:'Toor dal',note:'Rinsed'},
  {a:'3',n:'Drumstick (murungakkai)',note:'Cut into 5cm pieces. This is the star — do not reduce.'},
  {a:'1',n:'Tomato (medium)',note:'Quartered'},
  {a:'2 tbsp',n:'Tamarind paste (medium-thick)'},
  {a:'600ml',n:'Water'},{a:'2 tsp',n:'Sambar powder'},
  {a:'¼ tsp',n:'Omam seeds',flag:'omam'},{a:'½ tsp',n:'Amla powder',flag:'amla'},
  {a:'½ tsp',n:'Mustard seeds'},{a:'1 tsp',n:'Cumin seeds'},
  {a:'10',n:'Curry leaves'},{a:'2',n:'Dried red chilli'},
  {a:'1 tsp',n:'Avocado oil'},{a:'¼ tsp',n:'Turmeric'},{a:'1 tsp',n:'Salt'},
 ],
 steps:[
  {t:'Pressure cook toor dal with 250ml water, turmeric — 4 whistles. Until very soft. Whisk smooth. Set aside.',timer:900},
  {t:'In a large pot, bring tamarind paste + 400ml water + tomato to boil. Add drumstick pieces. Add sambar powder + turmeric.',},
  {t:'Cook drumstick in the tamarind water for 12–15 minutes on a rolling boil.',timer:780,flags:['crit'],note:'Drumstick needs more cooking time than you think. The flesh inside should be completely tender — press the side and the flesh should yield and come away from the fibrous outer core easily.'},
  {t:'Test drumstick: press a piece. The inner flesh should slide out of the fibrous skin cleanly.',flags:['crit']},
  {t:'Add whisked toor dal. Stir well. Bring back to boil.',},
  {t:'Taste. Adjust salt and tamarind. Cook 5 more minutes.',timer:300},
  {t:'Tempering: heat small pan until very hot.',},
  {t:F.omam+'Dry pan first. Omam — 10 seconds max.',timer:10,flags:['crit']},
  {t:'Add avocado oil. Mustard + cumin seeds + dried red chilli + curry leaves. Full pop.',timer:20},
  {t:'Pour tempering into sambar. Cover immediately. 2 minutes.',timer:120},
  {t:'Turn off heat. 30 seconds.',timer:30},
  {t:F.amla+'Add amla powder off heat. Stir.',flags:['amla']},
 ],
 goesWith:[
  {n:'Toor Dal & Carrot Kootu',cat:'kootu',why:'Drumstick and carrot are both high in beta-carotene — double provitamin A on the same plate. Drumstick vitamin C maximises iron absorption from toor dal. Moringa folate stacks with toors folate (highest among dals) for homocysteine protection.',tags:['Beta-car↑↑','Iron↑','Folate²']},
  {n:'Vendakkai (Okra) Fry',cat:'curry',why:'Drumstick vitamin C (7× oranges) + okra iron + okra folate = three major micronutrients maximised simultaneously. Moringa isothiocyanates + okra flavonoids (quercetin, kaempferol) = complementary antioxidant protection. Double anti-inflammatory vegetable day.',tags:['VitC max','Iron↑','Folate+','Inflam↓²']},
  {n:'Avarakkai (Broad Beans) Fry',cat:'curry',why:'Moringa vitamin C + avarakkai iron = maximum iron absorption — the second-best iron pairing in this plan after VK+spinach. Moringa + broad bean = double leguminous anti-inflammatory combination. Combined folate content of this meal is among the highest of any pairing.',tags:['Iron↑↑','Folate max','Double legume']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Drumstick vitamin C enhances moong iron. Moringa calcium + pumpkin beta-carotene = double complementary micronutrients. Flavor: the light moong-pumpkin kootu complements the tomato-based sambar without flavor clash.',tags:['Iron↑','VitC','Calcium+Beta-car']},
 ],
 avoidWith:[{n:'Thyroid medication (levothyroxine) at the same meal',why:'Moringa (drumstick) contains isothiocyanates that may affect thyroid hormone levels. Levothyroxine must be taken on an empty stomach well separated from all food — but especially from moringa-containing dishes. Take thyroid medication at least 4 hours from this sambar.',sev:'high'},{n:'Concentrated moringa powder supplements on the same day',why:'Moringa drumstick in sambar form is safe at normal quantities. However, adding moringa powder supplements on top creates excessive isothiocyanate and vitamin K load. Food-form moringa is sufficient.',sev:'med'}],
 science:'Drumstick (moringa) contains 7× more vitamin C than oranges, 4× more calcium than milk, and 3× more potassium than bananas per 100g. The most nutritionally dense vegetable in this plan. Drumstick leaves contain isothiocyanates that directly inhibit LDL oxidation.',
 begNotes:{'How to eat drumstick':'Hold the piece vertically over your bowl, bite the end, and drag your teeth along the length — the soft flesh and seeds come out. Leave the fibrous husk.'}
},
{id:'gravy-pepper-sambar',cat:'gravy',en:'Milagu (Pepper) Sambar',ta:'மிளகு சாம்பார்',
 time:'30 min',serves:'4',
 appears:['W1 Wed','W2 Wed','W3 Wed','W4 Wed'],
 nut:{c:11,p:6,f:2,kcal:82,fibre:3},
 fat:{total:2,sat:0.3,mufa:1.1,pufa:0.3},chop40:false,
 ing:[
  {a:'100g',n:'Toor dal'},
  {a:'1 tbsp',n:'Black peppercorns, whole',note:'Dry roast separately — critical step'},
  {a:'1 tsp',n:'Cumin seeds, whole',note:'Dry roast with the pepper'},
  {a:'2 tbsp',n:'Tamarind paste (medium)'},{a:'500ml',n:'Water'},
  {a:'1 tsp',n:'Sambar powder'},{a:'¼ tsp',n:'Omam',flag:'omam'},
  {a:'½ tsp',n:'Amla powder',flag:'amla'},
  {a:'½ tsp',n:'Mustard seeds'},{a:'10',n:'Curry leaves'},
  {a:'1 tsp',n:'Avocado oil'},{a:'¼ tsp',n:'Turmeric'},{a:'1 tsp',n:'Salt'},
 ],
 steps:[
  {t:'In a small DRY pan, roast peppercorns and cumin seeds TOGETHER on medium heat for 3 minutes, stirring constantly. Ready when you smell a deep toasty aroma.',timer:180,flags:['crit'],note:'Pre-roasting before grinding creates an entirely different flavour profile. Heat caramelises their surface oils and transforms them from sharp to rounded, complex, and deeply fragrant.'},
  {t:'Allow to cool 2 minutes. Coarsely crack in a mortar. Some fine, some larger.',timer:120},
  {t:'Pressure cook toor dal with 250ml water, turmeric — 4 whistles. Whisk smooth.',timer:900},
  {t:'Boil tamarind + 350ml water. Add the cracked pepper-cumin and sambar powder. Boil 8 minutes.',timer:480},
  {t:'Add whisked dal. Stir. Bring to simmer.',},
  {t:'Taste — real pepper heat, earthy cumin base, bright tamarind. Adjust salt.',},
  {t:'Cook 5 more minutes together.',timer:300},
  {t:'Tempering: dry pan, very hot.',},
  {t:F.omam+'Omam dry, 10 seconds.',timer:10},
  {t:'Oil, mustard, curry leaves. Pour over sambar. Cover 2 min.',timer:120},
  {t:'Off heat 30 sec.',timer:30},
  {t:F.amla+'Amla off heat.',flags:['amla']},
 ],
 goesWith:[
  {n:'Cauliflower Curry',cat:'curry',why:'The single most important meal pairing in this entire plan from a nutritional chemistry standpoint. Piperine in Milagu sambar is the #1 enhancer of sulforaphane production from cauliflower glucosinolates — it works by inhibiting enzymes that compete for the same substrate as myrosinase. Do not make cauliflower curry without this sambar.',tags:['Sulforaphane↑↑','Piperine crit','NRF2 max']},
  {n:'Sweet Potato Curry',cat:'curry',why:'Piperine doubles beta-carotene absorption from sweet potato — the highest provitamin A curry in this plan. Piperine inhibits P-glycoprotein efflux in intestinal cells, keeping beta-carotene inside the cell long enough for conversion to retinol. This meal produces the highest vitamin A yield of any combination in the plan.',tags:['Beta-car↑↑','VitA max','Piperine+']},
  {n:'Toor Dal & Carrot Kootu',cat:'kootu',why:'Triple beta-carotene day: carrots + piperine enhancement = maximum carotenoid absorption. Toor folate + piperine-enhanced curcumin from sambar powder = double anti-inflammatory nutritional hit. Piperine alone increases curcumin bioavailability by 2000%.',tags:['Beta-car max','Curcumin↑','Folate+']},
  {n:'Kathrikkai (Brinjal) Fry',cat:'curry',why:'Piperine enhances chlorogenic acid absorption from brinjal by approximately 2×, keeping this powerful LDL oxidation inhibitor in systemic circulation longer. Milagu sambar + brinjal is the pairing for maximum LDL oxidation prevention in the plan.',tags:['Chlorogenic↑','LDL-ox↓','Piperine+']},
 ],
 avoidWith:[{n:'Medications with narrow therapeutic windows',why:'Piperine inhibits CYP3A4 liver enzymes and P-glycoprotein transporters — the same pathways used to metabolise many medications. This can increase drug blood levels. If on cyclosporine, certain statins, or other narrow-window drugs, discuss piperine-rich meals with your doctor.',sev:'caution'},{n:'Eating without a nutrient you want to maximise',why:'Piperine increases absorption of everything in the meal. Eating Milagu Sambar with nutritionally sparse accompaniments wastes its absorption-enhancing potential. Always pair it with beta-carotene, sulforaphane, or curcumin-rich dishes.',sev:'med'}],
 science:'Piperine in black pepper increases bioavailability of turmeric curcumin by 2000%. Piperine also independently activates thermogenesis and inhibits adipogenesis. Cumin contains cuminaldehyde — a demonstrated cholesterol-lowering agent in RCTs.',
 begNotes:{'How hot should this be?':'Quite hot — the pepper is the star. If too hot for the family, reduce peppercorns to 1½ tsp.'}
},

{id:'kids-oat-dosai',cat:'kids',en:'Oat-Wheat Dosai (Overnight Batter)',ta:'ஓட்ஸ் கோதுமை தோசை',
 time:'Batter 12–16hr · Cook 20 min',serves:'4 (10–12 dosai)',
 appears:['Kids dinner — Tue, Thu, Sat'],
 nut:{c:22,p:5,f:1,kcal:116,fibre:2},
 fat:{total:1,sat:0.2,mufa:0.4,pufa:0.2},chop40:false,
 ing:[
  {a:'200g',n:'Whole wheat flour (atta)',note:'Not maida. The fibre is important.'},
  {a:'100g',n:'Rolled oats',note:'Blended to fine powder before measuring'},
  {a:'½ tsp',n:'Salt'},{a:'Water',n:'Enough to make batter thin as pouring cream'},
 ],
 steps:[
  {t:'THE NIGHT BEFORE (8–9pm): Blend rolled oats to fine powder in a dry blender.',timer:60},
  {t:'Mix oat powder + wheat flour + salt. Add water gradually, whisking, until smooth — consistency of thin pouring cream.',note:'Too thick = thick cakey dosai. Too thin = dosai tears when you flip.'},
  {t:'Cover with a clean cloth (not airtight). Leave at room temperature 12–16 hours.',timer:43200,flags:['crit'],note:'Room temperature fermentation creates mild lactic acid — the slight sourness, small bubbles, and ability to crisp on the edges. Refrigerating kills this process.'},
  {t:'NEXT MORNING: Check batter — slightly bubbly, mild sour smell, slightly expanded. Stir from the bottom.',flags:['crit'],note:'Flat with no bubbles = room was too cold, leave 2 more hours. Smells alcoholic = over-fermented, thin with water and cook immediately.'},
  {t:'COOKING: Heat iron tawa on medium-high for 2 full minutes.',timer:120,flags:['crit']},
  {t:'Reduce to medium. Pour one ladle onto center. Using back of ladle, spiral outward to spread into a thin circle.',flags:['crit'],note:'Spiral pour from center outward. Do NOT pour all batter then spread with pressure — this compresses it and prevents crisping.'},
  {t:'Watch the edges — when they turn from white to golden and begin to lift naturally, the dosai is 90% done.',timer:90,flags:['crit']},
  {t:'Flip gently. Cook 30 seconds on the second side.',timer:30},
  {t:'Remove. Re-heat tawa between each dosai.',},
 ],
 avoidWith:[{n:'Serving with sweet chutney only — no dal component',why:'The oat-wheat dosai has good fibre from oats but the protein needs a dal-based chutney or sambar alongside. Without protein and fibre counterbalance, the glycaemic response from the batter is steeper.',sev:'med'}],
 science:'Oat flour adds beta-glucan — the soluble fibre with the strongest clinical evidence for LDL reduction (reduces LDL by 5–10% with 3g/day). Combined with whole wheat phytosterols and B vitamins, significantly more nutritious than traditional rice-urad dal batter.',
 begNotes:{'My dosai is tearing when I flip it':'Tawa not hot enough or dosai not ready. Wait until edges lift on their own.','The batter is lumpy':'Soak oats in water for 10 minutes before blending.'}
},

 fat:{total:1,sat:0.2,mufa:0.3,pufa:0.3},chop40:false,
 ing:[

  {a:'1 tsp',n:'Wheat germ',note:'Add to the flour — vitamin E, folate, zinc'},

 steps:[

  {t:'Add warm water gradually, mixing with fingers from center outward. Soft, pliable dough — not sticky, not stiff.',flags:['crit'],note:'Start with 130ml. If the dough cracks when you fold it, add more water 1 tbsp at a time.'},
  {t:'Knead for 5 full minutes — push forward with heel of palm, fold back, rotate.',timer:300,flags:['crit'],note:'Proper kneading develops gluten. Under-kneaded dough tears when rolled and never puffs.'},

  {t:'Divide into 8 equal balls. Keep covered while working.',},

  {t:'Heat iron tawa on high until very hot. Place roti. Cook 30–40 seconds until bubbles form on top.',timer:35,flags:['crit']},
  {t:'Flip. Cook 20 seconds. Flip again — hold directly over gas flame with tongs to puff.',timer:20,flags:['crit'],note:'A fully puffed roti means evenly cooked and light. If it doesn\'t puff, heat was not high enough.'},
 ],
 avoidWith:[{n:'Pairing with only dry curries — no dal',why:'Roti alone with a dry curry has an incomplete amino acid profile. Whole wheat provides adequate methionine but needs lysine from a dal-based gravy or kootu for a complete protein.',sev:'med'}],
 science:'Whole wheat roti retains bran and germ — including fibre, B vitamins, iron, zinc, and vitamin E removed by white flour processing. Adding wheat germ specifically increases folate content. The combination of fibre and protein (4g/roti) provides slower gastric emptying, reducing post-meal glucose spike.',
 begNotes:{'How do I know the tawa is ready?':'Hold palm 10cm above — if you need to pull away within 2 seconds, it\'s ready.','My roti is hard':'Dough was too stiff, rolled too thick, or tawa not hot enough.'}
},

{id:'special-biryani-kids',cat:'special',en:"Kids' Saffron Brown Rice Biryani",ta:'குழந்தைகள் குங்குமப்பூ பிரியாணி',
 time:'50 min',serves:'4 (kids portions)',
 appears:['Friday dinner — kids','Weekly saffron dose'],
 nut:{c:42,p:8,f:4,kcal:232,fibre:3},
 fat:{total:4,sat:0.5,mufa:2.8,pufa:0.5},chop40:false,
 ing:[
  {a:'300g dry',n:'Brown rice (basmati style)',note:'Rinse 5 times. Soak 30 minutes.'},
  {a:'1 pinch',n:'Saffron (about 15–20 threads)',note:'The weekly dose. Bloom in warm water only.'},
  {a:'3 tbsp',n:'Warm water',note:'For blooming saffron — NOT hot, not cold'},
  {a:'1',n:'Onion medium',note:'Thinly sliced'},{a:'1',n:'Tomato medium',note:'Chopped'},
  {a:'1 cup',n:'Mixed vegetables',note:'Peas + carrot + beans'},
  {a:'1 tbsp',n:'Avocado oil'},{a:'2',n:'Bay leaves'},{a:'4',n:'Cloves'},
  {a:'4',n:'Green cardamom pods',note:'Lightly crushed'},{a:'1 stick',n:'Cinnamon (5cm)'},
  {a:'1 tsp',n:'Cumin seeds'},{a:'1 tsp',n:'Ginger-garlic paste'},
  {a:'½ tsp',n:'Turmeric'},{a:'1 tsp',n:'Biryani masala or garam masala'},
  {a:'Handful',n:'Fresh mint leaves'},{a:'Handful',n:'Fresh coriander'},
  {a:'1½ tsp',n:'Salt'},
 ],
 steps:[
  {t:'BLOOM THE SAFFRON: Place saffron threads in a small bowl. Add 3 tbsp warm water. Stir once. Leave undisturbed 15 minutes minimum.',timer:900,flags:['crit'],note:'Saffron blooming is chemistry, not speed. Cold water extracts poorly. Boiling water destroys safranal compounds. Warm water (40–50°C) is correct. After 15 minutes the water will be deep amber-gold.'},
  {t:'Drain and rinse soaked brown rice 2 more times.',},
  {t:'Heat avocado oil in a heavy pot on medium heat.',},
  {t:'Add whole spices: bay leaves, cloves, cardamom, cinnamon, cumin. Stir 30 seconds.',timer:30},
  {t:'Add sliced onion. Cook 8–10 minutes, stirring regularly, until deep golden-brown.',timer:540,flags:['crit'],note:'The caramelised onion is the flavour base. Under-caramelised = flat vegetable-water flavour. Patience: 8 minutes minimum.'},
  {t:'Add ginger-garlic paste. Stir 2 minutes.',timer:120},
  {t:'Add tomato + turmeric + biryani masala. Cook until tomato breaks down — 4 minutes.',timer:240},
  {t:'Add vegetables. Toss. Cook 2 minutes.',timer:120},
  {t:'Add drained brown rice. Stir to coat with the masala for 2 minutes.',timer:120,flags:['crit'],note:'Toasting the rice briefly in masala creates a protective coating on each grain, preventing clumping.'},
  {t:'Add 600ml water + salt. Bring to a rolling boil.',},
  {t:'Pour bloomed saffron water in a spiral pattern over the rice.',flags:['crit'],note:'The spiral pour distributes saffron visually — pale rice interspersed with gold patches.'},
  {t:'Add mint and coriander on top. Cover with a tight lid. Reduce to lowest heat.',},
  {t:'Cook on lowest heat for 25 minutes. Do not open the lid.',timer:1500,flags:['crit']},
  {t:'Turn off heat. Rest covered 10 minutes.',timer:600,note:'The resting period is as important as the cooking. Opening early releases steam and results in uneven cooking.'},
  {t:'Open. Fluff gently with a fork — lift from the bottom. Serve.',},
 ],
 avoidWith:[{n:'Serving with potato, vazhakkai, or senai on the same night',why:'Brown rice biryani at 42g net carbs is already the highest-carb dinner. Adding another high-starch side dish creates a triple-starch plate for the kids.',sev:'high'},{n:'Saffron supplementation or saffron tea on the same day',why:'This biryani contains the weekly saffron dose (15-20 threads). Do not add saffron supplements or saffron tea on the same day — the total dose should remain in the therapeutic range of 30mg per day maximum.',sev:'caution'}],
 science:'Saffron contains safranal, crocin, and crocetin — compounds shown in multiple RCTs to improve mood, reduce anxiety, and improve memory recall, with effects comparable to low-dose SSRIs in mild depression. Brown rice provides resistant starch and 3× the fibre of white rice.',
 begNotes:{'How do I know the biryani is cooked?':'Press a single grain against the roof of your mouth. Should yield completely with no hard centre.','The rice at the bottom is slightly stuck':'That\'s the socarrat — a thin layer of caramelised rice. Not burnt, flavourful.'}
},
{id:'special-av-sambar',cat:'special',en:'Arachu Vitta (AV) Sambar',ta:'அரைத்து விட்ட சாம்பார்',
 time:'60 min (+ podi if from scratch)',serves:'4 (quart)',
 appears:['Occasional family dish — not in weekly rotation','Sunday special or guest meals'],
 nut:{c:18,p:7,f:8,kcal:168,fibre:5},
 fat:{total:8,sat:5.2,mufa:2,pufa:0.6},chop40:false,
 ing:[
  {a:'— VEGETABLES —',n:'',note:''},{a:'1½ cups',n:'Ash gourd (pooshnikkai)',note:'2cm cubes'},
  {a:'1 cup',n:'Pumpkin (parangikkai)',note:'2cm cubes'},
  {a:'½ cup',n:'Capsicum',note:'Chopped — chop 40 min before cooking'},

  {a:'1½ cups',n:'Tomato (3 medium)',note:'Chopped'},{a:'½ cup',n:'Onion (optional)',note:'Chopped'},

  {a:'3',n:'Whole red chilli (Byadgi)',note:'Roast until fragrant, not dark'},
  {a:'3 tbsp',n:'Coriander seeds (dhania)',note:'Roast until golden and aromatic'},
  {a:'3 tbsp',n:'Chana dal',note:'Roast until golden — takes longest'},
  {a:'1 tsp',n:'Methi seeds (vendhyam)',note:'Add to center of pan with tiny oil — goes golden fast'},
  {a:'¼ tsp',n:'Black mustard seeds (pinch)'},{a:'2 sprigs',n:'Curry leaves',note:'Add last, dry-roast briefly'},

  {a:'½ cup',n:'Toor dal'},{a:'1¾ cups',n:'Water'},

  {a:'1–2 tbsp',n:'Cilantro stems',note:'Chopped'},
