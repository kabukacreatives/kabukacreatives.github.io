{id:'curry-potato',cat:'curry',en:'Potato Fry',ta:'உருளைக்கிழங்கு வறுவல்',
 time:'30 min',serves:'4',
 appears:['Kids favourite','Occasional treat curry','Pairs with any sambar'],
 nut:{c:18,p:2,f:4,kcal:115,fibre:2},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'Waxy potatoes (small)',note:'Boil whole with skin until just cooked — a knife should slide in with slight resistance. Cool completely before cutting.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 tsp',n:'Cumin seeds'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'½ tsp',n:'Red chilli powder'},
  {a:'½ tsp',n:'Coriander powder'},
  {a:'¼ tsp',n:'Black pepper, cracked'},
  {a:'¾ tsp',n:'Salt'},
  {a:'½ tsp',n:'Amla powder',flag:'amla',note:'Off heat only — see step'},
 ],
 steps:[
  {t:'Boil potatoes whole with skin in salted water until just cooked — a knife enters with slight resistance. Do NOT fully soften.',timer:900,flags:['crit'],note:'Cooking with the skin on preserves potassium and resistant starch. Undercooking slightly means the potato will hold its shape during the high-heat fry finish rather than becoming mashed. A potato that is too soft will crumble in the pan.'},
  {t:'Cool completely — ideally refrigerate overnight. At minimum 30 minutes.',timer:1800,flags:['crit'],note:'Cooling converts regular starch to resistant starch (RS3). Overnight refrigerated potato has 3× more resistant starch than freshly cooked potato. Resistant starch feeds Bifidobacterium and does not spike blood glucose. This is the most important step for the glycaemic profile of this dish.'},
  {t:'Peel and cut into 2cm cubes. Or halve small potatoes — irregular edges caramelise better.',},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Add avocado oil. Mustard seeds — full pop. Add cumin, curry leaves.',timer:20},
  {t:'Add potato cubes. Spread in a single layer. HIGH heat. Do not touch for 2 minutes.',timer:120,flags:['crit'],note:'Leaving the potato undisturbed on high heat creates golden crusts on the cut faces. This is the technique. Stirring too early tears the crust and gives you pale, steamed potato instead of fried.'},
  {t:'Add turmeric, chilli powder, coriander powder, pepper. Toss to coat.',},
  {t:'Cook on medium-high heat 6–8 minutes, tossing every 2 minutes, until edges are golden-brown.',timer:420,flags:['crit'],note:'Patience. The sugars in potato need time to caramelise. Pale potato fry is sad. Deep golden potato fry with slightly dark edges is what you are aiming for.'},
  {t:'Add salt. Toss. Taste and adjust.',},
  {t:'Turn off heat. Wait 30 seconds.',timer:30,flags:['crit']},
  {t:F.amla+'Add amla powder. Toss gently.',flags:['amla'],note:'Amla adds vitamin C which improves iron absorption and brightens all the spice flavours.'},
 ],
 goesWith:[
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'Horse gram soluble fiber is clinically demonstrated to reduce post-meal glucose by up to 40% when consumed with starchy foods. Potato has a moderate glycaemic impact — horse gram rasam is the single best protective pairing for potato on a brunch plate.',tags:['GI↓ 40%','Insulin stable','Resistant starch+']},
  {n:'Murungakkai Sambar',cat:'gravy',why:'Drumstick vitamin C + amla in the potato fry = double vitamin C that maximises iron absorption from the dal in the sambar. The potassium in potato and the anti-inflammatory moringa compounds are complementary for cardiovascular protection.',tags:['Iron↑','VitC+','K+ potassium']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Light moong kootu provides soluble fiber and protein that blunt potato glucose response. Moong lysine complements the resistant starch in the cooled potato — together they form a more complete nutritional meal than either alone.',tags:['GI buffer','Protein+','Sat fiber']},
 ],
 avoidWith:[{n:'Freshly cooked (not cooled) potato',why:'Freshly cooked potato has only 1.3g resistant starch per 100g. Overnight refrigerated potato has 4.3g — 3 times more. The entire nutritional strategy of this dish depends on the cooling step. Skipping it makes it a regular high-GI potato dish.',sev:'high'},{n:'Pairing with vazhakkai, sweet potato, senai kilangu, or biryani',why:'Double or triple high-starch on one plate removes all the glycaemic advantage of the resistant starch. One starchy dish per meal — never two.',sev:'high'},{n:'Deep frying or excess oil',why:'Excess oil disrupts the resistant starch coating on the potato surface, and rapid high-temperature cooking partially reverses the retrograded (RS3) starch back to digestible form. Pan fry in 1 tbsp avocado oil only.',sev:'med'}],
 science:'Cooled and reheated potato contains up to 4.3g resistant starch per 100g — compared to 1.3g in freshly cooked potato. RS3 (retrograded resistant starch formed on cooling) is the most selective prebiotic for Bifidobacterium longum, the exact strain most studied for Alzheimer prevention and cardiovascular protection. The reheating does not destroy the resistant starch. Potato is also one of the highest sources of dietary potassium, with 421mg per 100g — potassium directly lowers systolic blood pressure and is critical for heart rhythm stability, relevant given the QTc finding in the lab results.',
 begNotes:{'Why cook and cool the potato first?':'This is the resistant starch trick. Freshly cooked potato is mostly digestible starch that spikes blood glucose. Cooled overnight potato converts that starch to resistant starch — it behaves more like fiber than sugar in the gut.','My potato is falling apart':'It was cooked too long. Next time boil until a knife enters with resistance — not until soft. The potato will finish cooking in the pan.','The spices are sticking and burning':'Your pan was not hot enough when the potato went in. The potato needs to sear immediately on contact, not steam slowly.'}
},

{id:'curry-vazhakkai',cat:'curry',en:'Vazhakkai (Raw Banana) Fry',ta:'வாழைக்காய் வறுவல்',
 time:'25 min',serves:'4',
 appears:['Thursday rotation with Vetha Kuzhambu','Kids rice days','Resistant starch day'],
 nut:{c:22,p:2,f:4,kcal:130,fibre:3},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'2 large',n:'Raw banana (vazhakkai)',note:'Completely green — no yellow. The more underripe, the higher the resistant starch.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 tsp',n:'Urad dal',note:'For crunch in the tadka'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'1',n:'Dried red chilli'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'1 tsp',n:'Sambar powder',note:'Gives depth — do not skip'},
  {a:'¼ tsp',n:'Black pepper, cracked'},
  {a:'¾ tsp',n:'Salt'},
  {a:'1 tsp',n:'Lime juice',note:'At the very end, off heat'},
 ],
 steps:[
  {t:'Do NOT peel the bananas. Boil whole in a pot of water for 10–12 minutes.',timer:660,flags:['crit'],note:'Boiling with the skin on prevents the banana from absorbing water and going mushy. The skin is a perfect cooking vessel. A knife should slide in with moderate resistance — not fully soft, not hard.'},
  {t:'Remove from water. Cool until handleable — 10 minutes.',timer:600,note:'Do not peel while hot. The skin peels effortlessly once slightly cooled. If you try while steaming hot, you lose chunks of banana with the skin.'},
  {t:'Peel and cut into 1.5cm rounds, or halve the rounds for smaller pieces. The starchy surface will oxidise slightly — this is fine.',},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Add avocado oil. Urad dal first — stir until pale gold.',timer:25,flags:['crit'],note:'Urad dal must turn pale gold before anything else goes in. It crisps in the oil and provides texture contrast to the soft banana.'},
  {t:'Mustard seeds, curry leaves, red chilli. Full pop.',timer:20},
  {t:'Add vazhakkai pieces. Add turmeric + sambar powder + pepper. Toss to coat thoroughly.',flags:['crit'],note:'The sambar powder coating on each piece is what builds the flavour crust during frying. Make sure every piece is coated.'},
  {t:'Medium-high heat. Cook uncovered 8–10 minutes, turning pieces every 2–3 minutes, until deep golden-brown on all sides.',timer:540,flags:['crit'],note:'Raw banana absorbs oil readily. The key is to let it sit undisturbed for 2 minutes at a time — this builds the crust. Constant stirring prevents browning and makes it greasy.'},
  {t:'Add salt. Toss. Taste.',},
  {t:'Off heat. Squeeze lime juice over. Toss once.',note:'Lime juice prevents further oxidation and brightens the spice profile.'},
 ],
 goesWith:[
  {n:'Vetha Kuzhambu',cat:'gravy',why:'The classic Thursday pairing in Tamil Brahmin cooking — the sharp, concentrated tamarind of VK cuts through the starchiness of vazhakkai perfectly. Nutritionally, tamarind vitamin C enhances the modest iron content of raw banana. Shallot quercetin in VK + vazhakkai resistant starch = the dual prebiotic-antioxidant Thursday.',tags:['Classic pair','Iron↑','Resistant starch+','VK synergy']},
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'Piperine significantly enhances the bioavailability of sambar powder compounds absorbed from the vazhakkai crust. The resistant starch in raw banana feeds Bifidobacterium overnight — piperine enhances bile acid metabolism that works synergistically with gut microbiome health.',tags:['Piperine+','Bifido+','Bile metab']},
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'The most important glycaemic pairing for vazhakkai. Horse gram soluble fiber slows the digestion of resistant starch breakdown products, maintaining very stable post-meal glucose. This is one of the lowest-glycaemic meal combinations in the 28-day plan.',tags:['GI↓↓','Insulin stable','Glucose low']},
 ],
 avoidWith:[{n:'Any yellow or ripe banana — not green',why:'As banana ripens, RS2 resistant starch converts to simple sugars. A banana with any yellow is no longer high-RS. The glycaemic and prebiotic benefits disappear. Only completely green banana has the therapeutic resistant starch content.',sev:'high'},{n:'Pairing with potato, sweet potato, senai, or biryani',why:'Raw banana at 22g net carbs per serving is already the highest-carb curry in the plan. Adding another starch turns this into a very high glycaemic load meal. One starchy dish at a time.',sev:'high'}],
 science:'Raw green banana is one of the highest sources of resistant starch in any food — 12g RS2 per 100g raw weight, reducing to approximately 8g after cooking but remaining largely resistant to digestion. This is the highest resistant starch content of any vegetable in this plan, surpassing cooled potato (4.3g). RS2 (native granular resistant starch) reaches the colon intact where it selectively feeds Bifidobacterium and Lactobacillus. Raw banana also contains dopamine (2g per 100g peel — though this does not cross the blood-brain barrier, it is a potent antioxidant in the gut lining). The sambar powder coating provides concentrated curcumin and coriander compounds that are fat-soluble and absorbed in the avocado oil used for frying.',
 begNotes:{'How do I know the banana is the right ripeness?':'Completely green with no yellow. Even slight yellowing means starch has already begun converting to sugar — the resistant starch content drops significantly with ripening.','The banana turned purple/grey after cutting':'Normal oxidation — no effect on flavour or nutrition. A squeeze of lemon water on the cut pieces prevents this if it bothers you.','It is sticking to the pan':'The banana releases from the pan naturally once the crust has formed. If it sticks, the pan was not hot enough and the crust has not formed yet. Wait 30 more seconds without touching.'}
},

{id:'curry-cabbage',cat:'curry',en:'Cabbage Poriyal',ta:'முட்டைக்கோஸ் பொரியல்',
 time:'20 min',serves:'4',
 appears:['Quick weekday curry','High glucosinolate day','Chop 40 min ahead'],
 nut:{c:8,p:2,f:4,kcal:74,fibre:3},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:true,
 ing:[
  {a:'500g',n:'Green cabbage',note:'Finely shredded. Chop 40 minutes before cooking.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 tsp',n:'Urad dal'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'1–2',n:'Dried red chilli'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'2 tbsp',n:'Grated fresh/frozen coconut',note:'Optional — adds sweetness and texture. Use almond meal for no-coconut version.'},
  {a:'¾ tsp',n:'Salt'},
  {a:'1 tsp',n:'Lime juice',note:'Off heat, at the end'},
 ],
 steps:[
  {t:'Shred cabbage finely — 3mm strips, uniform. Set timer. 40 minutes at room temperature.',timer:2400,flags:['crit'],note:'Cabbage is cruciferous. Shredding activates myrosinase enzyme which converts glucosinolates to sulforaphane and other isothiocyanates. The 40-minute wait is not optional — it is the difference between cancer-protective cabbage and ordinary cabbage.'},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Add avocado oil. Urad dal first — pale gold.',timer:25},
  {t:'Mustard seeds + curry leaves + red chilli. Full pop.',timer:20},
  {t:'Add shredded cabbage. Add turmeric. Toss immediately to coat.',flags:['crit'],note:'Cabbage will seem like too much — it will fill the pan completely. Do not worry. It reduces by 60% in 3 minutes.'},
  {t:'Toss on high heat 2 minutes — cabbage wilts rapidly.',timer:120},
  {t:'Reduce to medium. Cook uncovered 5–6 minutes, tossing every 90 seconds.',timer:330,note:'You want the cabbage cooked through but with some texture remaining — not completely soft. Some edges should be slightly golden.'},
  {t:'Add salt and lime juice. Toss.',},
  {t:'Add grated coconut (or almond meal) if using. Toss once off heat.',note:'Adding coconut or almond meal off heat preserves the fresh flavour. Adding it during cooking makes it taste stewed.'},
 ],
 goesWith:[
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'The most important pairing for cabbage. Piperine inhibits the competing glucosidase enzymes that degrade isothiocyanate production — it effectively amplifies the sulforaphane yield from the 40-minute-chopped cabbage. Never serve cabbage poriyal without a black pepper element in the meal.',tags:['Sulforaphane↑↑','Piperine crit','NRF2↑']},
  {n:'Toor Dal & Carrot Kootu',cat:'kootu',why:'Cabbage sulforaphane + toor folate = double epigenetic protection. Sulforaphane silences cancer-associated genes via HDAC inhibition while folate supports correct DNA methylation — two complementary mechanisms working on the same gene-regulation system.',tags:['Epigenetic','HDAC inhib','Folate+']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Moong zinc + cabbage glucosinolates together support the thyroid T4-to-T3 conversion pathway — particularly relevant given the Free T3 result. Sulforaphane from cabbage directly reduces the thyroid-suppressing inflammatory cytokines.',tags:['Thyroid↑','T3 convert','Zinc+sulforaph']},
 ],
 avoidWith:[{n:'Skipping the 40-minute chop rest',why:'Without the 40-minute wait after shredding, myrosinase enzyme is destroyed by heat before sulforaphane forms. The dish becomes ordinary braised cabbage with no glucosinolate benefit.',sev:'high'},{n:'Any meal without black pepper or piperine',why:'Piperine inhibits competing glucosidase enzymes, amplifying sulforaphane yield. Without black pepper in the same meal, the sulforaphane benefit is reduced. Always pair with Milagu Sambar or add cracked pepper.',sev:'high'}],
 science:'Green cabbage contains glucosinolates including glucoraphanin and sinigrin. After the 40-minute chop-and-wait, these convert to sulforaphane and allyl isothiocyanate — compounds that activate the NRF2 gene pathway, the body master antioxidant and detoxification switch. Sulforaphane from cabbage has been shown to reduce breast cancer risk in epidemiological studies by 15–30% with regular consumption. Cabbage fermentation (as in your purple cabbage brine) increases glucosinolate bioavailability by 20–40% compared to raw or cooked. The combination of raw fermented (your brine) plus cooked (this poriyal) covers both available forms.',
 begNotes:{'The cabbage smells strong when cooking':'Glucosinolate degradation during cooking releases sulphur compounds — this is normal and not a sign of spoilage. The finished dish should be mild.','Why shred so finely?':'Thin shredding maximises surface area, maximising myrosinase enzyme activity during the 40-minute rest. Thick chunks have less surface area and produce less sulforaphane.','Can I use purple cabbage?':'Yes — and purple cabbage has 8× the anthocyanins of green. Follow the same recipe. You will get both sulforaphane AND anthocyanin benefits.'}
},

{id:'curry-carrot',cat:'curry',en:'Carrot Poriyal',ta:'கேரட் பொரியல்',
 time:'20 min',serves:'4',
 appears:['Quick weekday curry','High beta-carotene day','Always with Milagu Sambar'],
 nut:{c:11,p:1,f:4,kcal:85,fibre:3},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'Carrots',note:'Grated on large holes OR finely diced 5mm — grated cooks faster, diced has more texture'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 tsp',n:'Urad dal'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'1',n:'Dried red chilli'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'2 tbsp',n:'Grated fresh/frozen coconut',note:'Optional — omit for daily use, include for flavour on special days'},
  {a:'¾ tsp',n:'Salt'},
  {a:'1 tsp',n:'Lime juice',note:'Off heat'},
 ],
 steps:[
  {t:'Grate carrots on large holes, or cut into fine 5mm dice. Grated: faster cooking, softer texture. Diced: more bite, slightly more beta-carotene preserved.',note:'Both methods are correct. Grating is the traditional Tamil poriyal method. Dicing is more suited to a side curry texture.'},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Avocado oil. Urad dal — pale gold.',timer:25},
  {t:'Mustard seeds + curry leaves + red chilli. Full pop.',timer:20},
  {t:'Add grated/diced carrot. Turmeric. Toss to coat.',},
  {t:'Cook on medium heat, uncovered, 6–8 minutes for grated (10–12 for diced), tossing every 2 minutes.',timer:480,note:'Grated carrot cooks very quickly — watch it. It should be tender but not mushy. Diced carrot needs more patience but holds its shape better.'},
  {t:'Add salt. Taste.',},
  {t:'Add coconut if using. Toss off heat.',},
  {t:'Squeeze lime juice. Toss once.',},
 ],
 goesWith:[
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'THE non-negotiable pairing for carrot. Piperine in Milagu Sambar specifically inhibits P-glycoprotein efflux pumps in intestinal cells — this keeps beta-carotene inside the cell long enough for conversion to active vitamin A. Without piperine, most dietary beta-carotene is exported before conversion. This meal has the highest vitamin A yield of any combination in the plan.',tags:['Beta-car↑↑↑','VitA max','Piperine crit']},
  {n:'Toor Dal & Carrot Kootu',cat:'kootu',why:'When carrot poriyal and toor-carrot kootu appear together, the combined beta-carotene load is very high. Toor folate supports retinol metabolism (vitamin A conversion from beta-carotene requires folate-dependent enzymes). Double carrot day is the highest beta-carotene day in the plan.',tags:['Beta-car max','VitA↑↑','Folate needed']},
  {n:'Spinach Kootu',cat:'kootu',why:'Carrots and spinach provide complementary carotenoids — alpha-carotene and beta-carotene from carrot, lutein and zeaxanthin from spinach. All fat-soluble, all requiring the avocado oil present in both dishes. Together they cover the full carotenoid spectrum for eye and skin protection.',tags:['Carotenoid full','Eye protect','Lutein+']},
 ],
 avoidWith:[{n:'Any meal without fat',why:'Beta-carotene is entirely fat-soluble. A carrot dish served with no fat present will deliver almost no usable beta-carotene. The avocado oil tadka is not decorative.',sev:'high'},{n:'Any meal without piperine (black pepper)',why:'Piperine from black pepper inhibits P-glycoprotein efflux in intestinal cells — without it, cells export beta-carotene before it can convert to vitamin A. Beta-carotene absorption without piperine is estimated at 20-30% of what it is with piperine.',sev:'high'},{n:'Vitamin A supplements on carrot-heavy days',why:'Beta-carotene from food converts to vitamin A at a regulated rate — you cannot overdose. However, taking preformed vitamin A (retinol) supplements on a high-beta-carotene day creates genuine vitamin A excess, which is hepatotoxic at high doses.',sev:'caution'}],
 science:'Carrots are the highest dietary source of beta-carotene among commonly consumed vegetables at 8285mcg per 100g raw. Beta-carotene is the precursor to vitamin A (retinol), which is essential for immune function, night vision, skin integrity, and thyroid hormone conversion. Critically for this plan, vitamin A is required for the conversion of T4 to active T3 — deficiency in retinol impairs the deiodinase enzymes. Given the Free T3 result of 2.8, maximising beta-carotene absorption is directly relevant to thyroid function. Avocado oil (MUFA) increases beta-carotene absorption by 3–5× compared to eating carrots without fat.',
 begNotes:{'Grated or diced — which is better nutritionally?':'Grating increases surface area and thus beta-carotene availability. But dicing preserves more physical cell structure and releases beta-carotene more slowly, which may improve sustained absorption. Both are excellent — choose based on the texture you prefer.','The carrot is too sweet for a curry':'Balance with more black pepper and a generous squeeze of lime at the end. The sweetness of carrot is a feature, not a flaw — it complements the sour gravies beautifully.'}
},

{id:'curry-beans',cat:'curry',en:'Beans Poriyal',ta:'பீன்ஸ் பொரியல்',
 time:'20 min',serves:'4',
 appears:['Quick weekday curry','High folate day','Pairs with any sambar'],
 nut:{c:9,p:2,f:4,kcal:78,fibre:4},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'French beans or string beans',note:'Top and tail. Cut diagonally into 2cm pieces — diagonal cut gives more surface area.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 tsp',n:'Urad dal'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'1',n:'Dried red chilli'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'2 tbsp',n:'Grated coconut',note:'Traditional finish. Use almond meal for no-coconut version.'},
  {a:'¾ tsp',n:'Salt'},
 ],
 steps:[
  {t:'Top and tail the beans. Cut diagonally into 2cm pieces. Uniform size ensures even cooking.',},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Oil. Urad dal first — pale gold. Important: do not skip urad dal here — it provides the crunch that defines the texture of this poriyal.',timer:25,flags:['crit']},
  {t:'Mustard seeds + curry leaves + red chilli. Full pop.',timer:20},
  {t:'Add beans. Turmeric. Toss to coat.',},
  {t:'Add 2 tbsp water. Cover with lid. Steam-fry on medium heat 5 minutes.',timer:300,flags:['crit'],note:'The covered steam-fry step is what cooks the beans all the way through without burning the outside. This technique — cover to steam then uncover to fry — is used for all firm vegetables in Tamil cooking.'},
  {t:'Remove lid. High heat. Add salt. Cook uncovered 4–5 minutes, tossing every 90 seconds, until all water evaporates and edges begin to blister.',timer:270,flags:['crit'],note:'The blistered edges are the goal. French beans have a natural sweetness that concentrates beautifully when slightly charred.'},
  {t:'Off heat. Add coconut or almond meal. Toss gently.',},
 ],
 goesWith:[
  {n:'Vetha Kuzhambu',cat:'gravy',why:'Tamarind in VK provides vitamin C and tartaric acid — both significantly enhance non-heme iron absorption from beans. French beans have meaningful iron content (1mg per 100g) but like all plant sources it needs acid and vitamin C to absorb efficiently. This is the highest-iron meal pairing for beans.',tags:['Iron↑↑','VitC+','Tamarind+']},
  {n:'Murungakkai Sambar',cat:'gravy',why:'Drumstick vitamin C (7× that of oranges) maximises iron and folate absorption from beans. French beans are one of the highest folate vegetables — moringa folate stacks with it for the most complete folate meal in the plan. Double folate day reduces homocysteine significantly.',tags:['Iron↑','Folate max','VitC+']},
  {n:'Chana Dal & Ridge Gourd Kootu',cat:'kootu',why:'Beans folate + chana dal soluble fiber = complementary cardiovascular protection. Chana GI 8 blunts any glycaemic response from the meal. The fiber combination (beans soluble + chana soluble) creates strong bile acid binding.',tags:['Folate+','GI↓','Bile bind']},
 ],
 avoidWith:[{n:'Dairy or calcium-rich foods at the same meal',why:'Calcium competes with folate and iron from French beans for intestinal absorption. French beans are the highest-folate poriyal in this collection — dairy at the same meal reduces the folate benefit.',sev:'high'},{n:'Coffee or chai within 1 hour',why:'Tannins bind folate — French beans are a primary folate source. Tea consumed within 1 hour significantly reduces folate absorption. Given the importance of folate for homocysteine management, this timing matters.',sev:'high'}],
 science:'French beans are exceptionally high in folate at 33mcg per 100g — a single serving of this poriyal provides approximately 41mcg folate, contributing meaningfully to the 400mcg daily target. Folate is the B vitamin that works alongside B12 in the homocysteine remethylation cycle — the pathway directly connected to cardiovascular disease risk and cognitive protection. French beans also contain lutein and zeaxanthin (6mg per 100g combined), the carotenoids specifically concentrated in the retina and macula. Their soluble fibre binds bile acids in the gut, reducing LDL reabsorption via the same mechanism as oat beta-glucan.',
 begNotes:{'The beans are stringy after cooking':'You did not remove the string along both sides of the pod. Run your thumb firmly along both edges of each bean before cutting — the string peels away.','How do I know they are done?':'Bite one — it should yield with mild resistance. Slight crunch is correct. Fully soft beans are overcooked and lose all their folate to the cooking water.'}
},

{id:'curry-kothavarangai',cat:'curry',en:'Kothavarangai (Cluster Beans) Fry',ta:'கொத்தவரங்காய் பொரியல்',
 time:'25 min',serves:'4',
 appears:['Blood sugar management day','Pairs with any gravy'],
 nut:{c:9,p:4,f:4,kcal:78,fibre:5},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'Kothavarangai (cluster beans / guar beans)',note:'String both sides. Cut into 2cm pieces. They are more fibrous than French beans — cook longer.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 tsp',n:'Urad dal'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'1–2',n:'Dried red chilli'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'½ tsp',n:'Red chilli powder'},
  {a:'¾ tsp',n:'Salt'},
  {a:'2 tsp',n:'Sambar powder',note:'Kothavarangai takes sambar powder well — more than French beans'},
 ],
 steps:[
  {t:'String kothavarangai carefully on both sides — the strings are tougher than in French beans. Cut into 2cm pieces.',flags:['crit'],note:'Cluster beans have a more fibrous texture than French beans. Removing both strings is essential — the remaining strings become unpleasant to chew.'},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Oil. Urad dal — pale gold.',timer:25},
  {t:'Mustard seeds + curry leaves + red chilli. Full pop.',timer:20},
  {t:'Add cluster beans. Turmeric + sambar powder. Toss to coat.',},
  {t:'Add 3 tbsp water. Cover. Medium heat. Cook 8 minutes.',timer:480,flags:['crit'],note:'Kothavarangai needs more steam time than French beans due to its fibrous structure. The covered step is not optional — uncovered high heat at this stage produces undercooked, chewy beans.'},
  {t:'Remove lid. High heat. Add chilli powder + salt. Cook uncovered 5–6 minutes, tossing regularly, until dry and slightly caramelised.',timer:330,flags:['crit'],note:'Watch for a slight colour change on the edges. Fully cooked kothavarangai develops a deeper green with slightly darker tips — this is when the characteristic flavour fully develops.'},
  {t:'Taste. Adjust salt. The beans should be tender throughout with no hard centre.',flags:['crit']},
 ],
 goesWith:[
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'Kothavarangai galactomannan + pepper piperine = the best blood sugar management combination in this plan. Galactomannan (the soluble fibre in cluster beans) already reduces post-meal glucose by forming a viscous gel in the gut — piperine further improves the bile acid metabolism that processes dietary glucose. Clinical trials show galactomannan + black pepper combinations reduce HbA1c meaningfully.',tags:['GI↓↓','Galactoman+','HbA1c↓']},
  {n:'Vetha Kuzhambu',cat:'gravy',why:'Tamarind provides vitamin C that enhances iron absorption from cluster beans (1.4mg iron per 100g). Kothavarangai is slightly bitter and the sharp sourness of VK is a classic counter-flavour. The Thursday VK + kothavarangai combination is a traditional Tamil pairing for good reason.',tags:['Iron↑','Classic Tamil','VitC+']},
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'Horse gram saponins + cluster bean galactomannan = double soluble fibre with complementary mechanisms. Both independently lower blood glucose — together they represent one of the strongest plant-based anti-diabetic meal combinations possible within this cuisine.',tags:['Glucose↓↓','Saponin+','Galactoman+','DM protect']},
 ],
 avoidWith:[{n:'Diabetes medications without glucose monitoring',why:'Galactomannan from cluster beans can reduce post-meal glucose by 20-50%. If combined with metformin or insulin without monitoring, cumulative glucose-lowering effects can cause hypoglycaemia. This is not a concern for non-medicated individuals.',sev:'caution'},{n:'Another galactomannan-heavy dish at the same meal',why:'Very high galactomannan intake at once can cause digestive discomfort — the extremely viscous gel can slow gastric emptying too aggressively, causing bloating. One galactomannan-rich dish per meal.',sev:'caution'}],
 science:'Cluster beans contain galactomannan — a soluble fibre with the strongest evidence base of any plant fibre for blood glucose management. In RCTs, galactomannan reduces post-meal blood glucose by 20–50% and reduces fasting glucose over 8 weeks of regular consumption. This is particularly relevant given the South Asian phenotype vulnerability to insulin resistance even at normal BMI and normal fasting glucose. Galactomannan from guar (cluster beans) is also the source of guar gum used in pharmaceutical preparations for diabetes management — eating the whole vegetable provides the same compound in its food matrix, which has better pharmacokinetics than the extract. Kothavarangai is also used in Siddha medicine for liver protection and is one of the most commonly prescribed vegetables in traditional South Indian therapeutic diets.',
 begNotes:{'The beans taste bitter':'Slight bitterness is natural to kothavarangai — it reduces significantly with cooking. If very bitter, your beans may be older. Choose bright green, firm pods.','They are still tough after the covered cooking':'Add another 2 tbsp water and cook covered for 3 more minutes. Older or thicker pods take longer.','Where do I buy these?':'Indian grocery stores reliably carry kothavarangai, often labelled "guar beans" or "cluster beans." Available fresh or frozen.'}
},

{id:'curry-kovakkai',cat:'curry',en:'Kovakkai (Ivy Gourd) Fry',ta:'கோவைக்காய் வறுவல்',
 time:'20 min',serves:'4',
 appears:['Blood sugar management day','Quick weekday curry'],
 nut:{c:5,p:2,f:4,kcal:65,fibre:2},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'Kovakkai (ivy gourd / tindora)',note:'Wash and slice into 3mm rounds OR halve lengthwise — rounds cook faster, halved gives more surface for crisping.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'½ tsp',n:'Red chilli powder'},
  {a:'¼ tsp',n:'Cumin powder'},
  {a:'¾ tsp',n:'Salt'},
  {a:'½ tsp',n:'Amla powder',flag:'amla',note:'Off heat'},
 ],
 steps:[
  {t:'Slice kovakkai into 3mm rounds — very thin slices caramelise and crisp in a way thick slices cannot.',flags:['crit'],note:'The thin slice is the secret to this dish. Thick kovakkai stays soft and pale. Thin kovakkai develops the slightly crispy, almost nutty-sweet edges that make it irresistible.'},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Add avocado oil. Mustard seeds + curry leaves. Full pop.',timer:20},
  {t:'Add kovakkai slices. Spread in as thin a layer as possible.',flags:['crit'],note:'Do not pile the kovakkai. A crowded pan steams instead of frying. If your pan is small, work in two batches.'},
  {t:'HIGH heat. Do NOT stir for 2 minutes. Let the slices colour on the bottom.',timer:120,flags:['crit'],note:'Patience here is everything. Resist the urge to stir. The bottom faces of the kovakkai are caramelising — interrupting this makes the dish pale and soft instead of golden and textured.'},
  {t:'Add turmeric, chilli powder, cumin powder. Toss everything. Spread again.',timer:0},
  {t:'Continue on high heat 8–10 minutes total, tossing every 2 minutes, until most slices are golden to deep golden.',timer:480,flags:['crit'],note:'The finished kovakkai should look significantly smaller than when you started — it loses 40–50% of its moisture. Some slices will be dark at the edges — these are the best ones.'},
  {t:'Add salt. Taste.',},
  {t:'Turn off heat. 30 seconds.',timer:30},
  {t:F.amla+'Add amla powder. Toss gently.',flags:['amla']},
 ],
 goesWith:[
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'The most important pairing for kovakkai. Both horse gram and ivy gourd contain insulin-sensitising compounds — kovakkai glucosides and horse gram saponins work on complementary receptor pathways. Studies show ivy gourd extract improves fasting glucose by 15–20%. The Saturday combination of kovakkai curry + kollu rasam is the highest blood glucose management meal in the plan.',tags:['Insulin↑↑','Glucose↓↓','Dual pathway','DM protect']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Light moong provides protein that stabilises blood glucose independently of the insulin-sensitising effects. Moong zinc supports the glucose transporter GLUT4 expression — the same transporter that kovakkai compounds activate. A well-studied synergy between zinc and insulin sensitisers.',tags:['GLUT4+','Zinc synergy','Glucose stable']},
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'Piperine enhances the bioavailability of kovakkai glucosides — the insulin-mimetic compounds in ivy gourd are better absorbed in the presence of piperine. The combination also improves bile acid recycling which influences insulin sensitivity indirectly.',tags:['Glucoside↑','Piperine+','Insulin sense']},
 ],
 avoidWith:[{n:'Blood glucose medication without monitoring',why:'Ivy gourd is an insulin mimetic — it activates GLUT4 glucose transporters independently of insulin. Combined with hypoglycaemic medication, the additive glucose-lowering effect can be excessive. Non-medicated individuals have no concern.',sev:'caution'},{n:'Pairing kovakkai and kothavarangai on the same day',why:'Both are potent blood glucose-lowering vegetables via different mechanisms. On the same day they create a very strong combined glucose-lowering effect. For someone with normal glucose (fasting glucose 86, HbA1c 5.5) this is beneficial — but be aware this is a high-therapeutic day.',sev:'caution'}],
 science:'Ivy gourd (Coccinia grandis) is one of the most well-documented antidiabetic vegetables in Ayurvedic and Siddha pharmacopoeia. The active compounds are cucurbitacin-type glucosides that mimic insulin action — they activate GLUT4 glucose transporters in skeletal muscle and fat tissue, improving glucose uptake independent of insulin secretion. In a 90-day RCT in prediabetic adults, 300mg ivy gourd extract reduced fasting blood glucose by 16% and HbA1c by 0.7%. The insulin-mimetic effect means kovakkai is beneficial even when fasting glucose is normal — it supports peripheral glucose disposal which is exactly the mechanism impaired in South Asian phenotype insulin resistance. Regular consumption (3–4 times per week) is associated with maintained HbA1c below 5.7% in at-risk populations.',
 begNotes:{'What does kovakkai look like?':'Small oval green gourds, about 4–5cm long and 2cm wide, smooth skin with faint white streaks. Available fresh at Indian grocery stores and sometimes frozen as "tindora" or "ivy gourd."','The kovakkai is very juicy and releasing water':'Pat it dry with a kitchen towel before putting it in the pan. Excess surface moisture prevents caramelisation.','Mine turned out soft and pale':'The slices were too thick, the pan was too crowded, or you stirred too often. Thin slices, spread out, undisturbed for 2 minutes at a time.'}
},

{id:'curry-broccoli',cat:'curry',en:'Broccoli Fry',ta:'ப்ரோக்கோலி வறுவல்',
 time:'20 min',serves:'4',
 appears:['W1 Sun kids','Highest sulforaphane curry','Chop 40 min ahead'],
 nut:{c:9,p:3,f:4,kcal:84,fibre:3},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:true,
 ing:[
  {a:'500g',n:'Broccoli',note:'Cut into small florets max 3cm. Chop 40 minutes before cooking.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Cumin seeds'},
  {a:'1 tsp',n:'Coriander powder'},
  {a:'½ tsp',n:'Cumin powder'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'½ tsp',n:'Red chilli powder'},
  {a:'½ tsp',n:'Black pepper, cracked'},
  {a:'¾ tsp',n:'Salt'},
  {a:'1 tbsp',n:'Lemon juice',note:'Squeezed at the very end, off heat'},
 ],
 steps:[
  {t:'Cut broccoli into florets no larger than 3cm. Set timer. 40 minutes at room temperature before cooking.',timer:2400,flags:['crit'],note:'Broccoli is the highest-glucosinolate food available. After chopping, myrosinase enzyme activates and converts glucoraphanin to sulforaphane. Heat destroys the enzyme — but once sulforaphane has formed, it survives cooking. The 40-minute wait before any heat is the most important step in this recipe. It determines whether you eat ordinary broccoli or a cancer-protective food.'},
  {t:'Dry iron kadai on HIGH heat. 60 seconds before anything goes in.',timer:60,flags:['crit']},
  {t:'Add broccoli florets to the HOT DRY pan. No oil yet. Toss constantly for 2 minutes.',timer:120,flags:['crit'],note:'Dry-searing broccoli evaporates surface moisture and initiates browning before oil is introduced. The result is caramelised edges rather than steamed-then-oiled florets. This is the technique that transforms broccoli from institutional to excellent.'},
  {t:F.kalonji+'Push florets aside. Add kalonji to the cleared dry space. 30 seconds.',timer:30},
  {t:'Add avocado oil to the kalonji space. Cumin seeds. Sizzle.',timer:15},
  {t:'Toss everything. Add all dry spices at once. Toss thoroughly to coat every floret.',},
  {t:'Cover with lid. Medium heat. 3 minutes — the florets steam-fry.',timer:180,flags:['crit']},
  {t:'Remove lid. HIGH heat. Add salt. Cook uncovered 5–7 minutes until edges turn deep golden.',timer:420,flags:['crit'],note:'The uncovered high-heat finish is where the magic happens. The tips of the florets caramelise and turn dark gold — almost crispy. This caramelised broccoli flavour is completely different from the pale green steamed version. The char creates a slight bitterness that contrasts beautifully with the spices.'},
  {t:'Off heat. Squeeze lemon juice over. Toss once.',note:'Lemon juice at the end brightens everything and adds a small amount of vitamin C that further protects the remaining glucosinolates.'},
 ],
 goesWith:[
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'THE most important pairing in this entire collection. Piperine inhibits the glucosidase enzymes that compete with myrosinase for the glucosinolate substrate in broccoli — this directly increases sulforaphane yield. Never serve broccoli without black pepper in the same meal. This pairing also covers the full NRF2 pathway activation: sulforaphane triggers NRF2 and piperine enhances curcumin that further sustains it.',tags:['Sulforaphane↑↑↑','Piperine crit','NRF2 max','Anti-cancer']},
  {n:'Horse Gram & White Pumpkin Kootu',cat:'kootu',why:'Sulforaphane from broccoli + horse gram isoflavones = synergistic Phase II enzyme induction — the most powerful anti-cancer meal combination in the 28-day plan. These two compounds activate different receptor sites on the same NRF2 gene, creating an amplified effect that is significantly greater than either alone.',tags:['Phase II↑','NRF2 synerg','Anti-cancer max']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Moong zinc + broccoli sulforaphane specifically supports the thyroid T4-to-T3 conversion pathway. Sulforaphane reduces the thyroid-suppressing inflammatory cytokines (IL-6, TNF-alpha) that are elevated when hs-CRP is high. Given the Free T3 result and the hs-CRP of 4.7, this is one of the most therapeutically relevant pairings in the plan.',tags:['Thyroid↑','T3 convert','CRP↓','Inflam↓']},
 ],
 avoidWith:[{n:'Skipping the 40-minute chop rest',why:'Broccoli has the highest myrosinase enzyme content of any food. Without the 40-minute pre-chop, ALL the sulforaphane benefit disappears — heat destroys myrosinase instantly. This is the most consequential step in the entire curry collection.',sev:'high'},{n:'Any meal without black pepper or piperine source',why:'Piperine is the single most important sulforaphane amplifier. A broccoli dish without black pepper in the same meal wastes significant potential. Always pair broccoli with Milagu Sambar or ensure piperine is present.',sev:'high'},{n:'Thyroid medication (levothyroxine) at the same meal',why:'Cruciferous vegetables contain compounds that can transiently affect thyroid hormone levels. Levothyroxine should be taken well separated from any food — but especially from a broccoli-heavy meal. Take it at least 4 hours from this dish.',sev:'caution'}],
 science:'Broccoli contains the highest concentration of glucoraphanin of any commonly consumed food — 10–100mg per 100g fresh weight, converting to sulforaphane after the 40-minute chop-and-wait. Sulforaphane activates NRF2, the body master regulator of antioxidant and detoxification genes. In clinical trials, sulforaphane has been shown to reduce DNA oxidation markers by 40%, reduce hs-CRP by 20% in overweight individuals, inhibit H. pylori, and show direct anti-cancer activity in multiple cancer cell lines. For the cardiovascular picture specifically: sulforaphane reduces VCAM-1 and ICAM-1 expression on arterial endothelium — these are the adhesion molecules that allow oxidised LDL to stick to arterial walls and initiate plaque formation. Lower hs-CRP 4.7 is one of the primary goals; broccoli 4+ times per week is one of the most evidence-backed dietary interventions for this.',
 begNotes:{'Why is the 40-minute rule so important for broccoli specifically?':'Broccoli has the highest myrosinase enzyme content of any cruciferous vegetable — the enzyme that makes the sulforaphane. Cutting activates it. Heat destroys it. The 40-minute window is when all the sulforaphane forms. If you chop and immediately cook, you destroy the enzyme before it can work.','My broccoli is burnt':'The florets were too small or the heat was too high. 3cm florets on medium-high heat will not burn in 7 minutes. Smaller florets on high heat will.','Can I use frozen broccoli?':'Frozen broccoli has been blanched before freezing, which destroys myrosinase. To restore sulforaphane from frozen broccoli, add raw mustard seeds to the dish — they contain myrosinase from a different source that can activate the remaining glucoraphanin.'}
},

{id:'curry-senai',cat:'curry',en:'Senai Kilangu (Elephant Yam) Fry',ta:'சேனை கிழங்கு வறுவல்',
 time:'35 min',serves:'4',
 appears:['Special occasion curry','Resistant starch day','Pongal special'],
 nut:{c:28,p:2,f:4,kcal:156,fibre:4},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'Senai kilangu (elephant yam / suran)',note:'Peel with a thick cut — the outer layer irritates skin. Wear gloves or oil your hands first.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'1',n:'Dried red chilli'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'1 tsp',n:'Coriander powder'},
  {a:'½ tsp',n:'Red chilli powder'},
  {a:'¼ tsp',n:'Black pepper, cracked'},
  {a:'¾ tsp',n:'Salt'},
  {a:'1 tbsp',n:'Lemon juice',note:'Added during cooking — reduces the itchiness caused by calcium oxalate crystals'},
 ],
 steps:[
  {t:'Peel senai kilangu with a thick cut, removing at least 5mm of the outer layer. OIL YOUR HANDS or wear gloves — the outer surface contains calcium oxalate crystals that cause intense itching on contact with skin.',flags:['crit'],note:'This is not optional. Dry contact with raw senai causes immediate skin irritation. Oiling hands before peeling creates a barrier. The itchiness is from calcium oxalate raphides — they dissolve completely during cooking and are harmless to eat.'},
  {t:'Cut into 1.5cm cubes. Soak in water with 1 tsp salt and 1 tsp lemon juice for 10 minutes.',timer:600,note:'Soaking in acidic water reduces calcium oxalate content and prevents the cubes from browning.'},
  {t:'Drain and boil in salted water with a splash of lemon juice for 10–12 minutes until just cooked through.',timer:660,flags:['crit'],note:'Adding lemon juice to the cooking water neutralises calcium oxalate, completely eliminating any throat-irritation risk. Boil until a knife enters with mild resistance — not fully soft.'},
  {t:'Drain. Pat dry thoroughly.',flags:['crit'],note:'Completely dry senai cubes will crisp and caramelise. Wet cubes will steam-hiss in the pan and stay pale.'},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Add avocado oil. Mustard seeds + curry leaves + red chilli. Full pop.',timer:20},
  {t:'Add senai cubes. Spread in single layer. HIGH heat. Do not touch for 3 minutes.',timer:180,flags:['crit'],note:'The surface of cooked senai caramelises slowly. Three undisturbed minutes on high heat creates the golden crust that defines this dish.'},
  {t:'Add all dry spices. Toss. Spread again.',},
  {t:'Cook on medium-high heat 8–10 minutes, tossing every 2 minutes, until deeply golden and slightly crisp at edges.',timer:540,flags:['crit']},
  {t:'Add salt and lemon juice. Toss. Taste.',},
 ],
 goesWith:[
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'Senai is moderately high glycaemic (GI ~52) — horse gram soluble fibre and saponins reduce post-meal glucose by up to 40% when consumed with starchy foods. The Saturday combination of senai + kollu rasam makes a glycaemically safe higher-starch day.',tags:['GI↓↓','Glucose safe','Resistant starch']},
  {n:'Murungakkai Sambar',cat:'gravy',why:'Drumstick vitamin C helps neutralise any residual calcium oxalate and enhances the absorption of the trace minerals in senai. Elephant yam contains diosgenin — a steroidal saponin with cholesterol-lowering properties — and moringa isothiocyanates complement this mechanism.',tags:['Diosgenin+','Cholest↓','VitC+']},
  {n:'Milagu (Pepper) Sambar',cat:'gravy',why:'Piperine enhances the absorption of diosgenin and other steroidal saponins from senai — fat-soluble compounds that benefit from the emulsifying effect of piperine in the gut. Also improves bile acid turnover that processes the higher starch load of senai.',tags:['Diosgenin↑','Bile metab','Piperine+']},
 ],
 avoidWith:[{n:'Pairing with potato, vazhakkai, or biryani at the same meal',why:'Senai has 28g net carbs per serving — the highest of any curry in this plan. Adding another starch creates a very high glycaemic load. One high-starch dish per meal only.',sev:'high'},{n:'Eating if not fully cooked',why:'Undercooked senai retains calcium oxalate crystals that can cause intense throat irritation. Fully cooking with lemon juice neutralises them completely. Never eat senai that has not been boiled with acid first.',sev:'high'},{n:'Blood thinning medications (warfarin)',why:'Diosgenin in elephant yam has mild antiplatelet activity. While this is generally beneficial, it may interact additively with anticoagulant medications. Consult a doctor if on warfarin.',sev:'caution'}],
 science:'Elephant yam (Amorphophallus paeoniifolius) contains diosgenin, a steroidal saponin that inhibits cholesterol synthesis through the mevalonate pathway — the same pathway that statin drugs target, though by a different mechanism. In animal studies, diosgenin reduces total cholesterol and LDL by 15–20% with regular consumption. Senai is also rich in konjac-type glucomannan, a very high molecular weight soluble fibre that forms an exceptionally viscous gel in the gut, slowing glucose absorption dramatically. The fibre content (4g per serving) is among the highest of any dry curry vegetable. In traditional Tamil medicine, senai kilangu is prescribed specifically for haemorrhoid treatment and liver protection — the diosgenin is the likely active compound for both.',
 begNotes:{'My throat feels itchy after eating it':'The cooking with lemon juice should have eliminated this. Try soaking longer next time and ensuring the boiling water has adequate lemon juice. Fully cooked senai should not cause any irritation.','The skin peeling is causing my hands to itch':'Oil your hands before starting. If already itchy, rinse with cold water and apply a few drops of lemon juice — the acid dissolves the calcium oxalate crystals on the skin.','Where to buy?':'Indian grocery stores carry senai kilangu, often labelled "elephant yam," "suran," or "yam" in the root vegetable section. Also available frozen in some stores.'}
},

{id:'curry-surakkai',cat:'curry',en:'Surakkai (Bottle Gourd) Fry',ta:'சுரைக்காய் வறுவல்',
 time:'20 min',serves:'4',
 appears:['Light calorie day','Cooling vegetable','Low-carb option'],
 nut:{c:5,p:1,f:4,kcal:60,fibre:2},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'500g',n:'Surakkai (bottle gourd / lauki)',note:'Peel. Remove seeds if mature and large. Cut into 2cm cubes or half-moons.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'1',n:'Dried red chilli'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'½ tsp',n:'Coriander powder'},
  {a:'¼ tsp',n:'Cumin powder'},
  {a:'¾ tsp',n:'Salt'},
  {a:'½ tsp',n:'Amla powder',flag:'amla',note:'Off heat only'},
 ],
 steps:[
  {t:'Peel surakkai. Halve lengthwise. Scrape out seeds if the gourd is mature (large, hard white seeds). Young surakkai needs no seeding.',note:'Young tender bottle gourd is ideal — the skin is thin and the seeds are barely formed. If buying large, check by pressing the skin — it should dent easily.'},
  {t:'Cut into 2cm cubes or 1cm half-moons. Uniform size for even cooking.',},
  {t:'Dry kadai, medium-high heat, 45 seconds.',timer:45,note:'Surakkai is delicate — it does not require the aggressive high heat of harder vegetables. Medium-high is correct here.'},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Add avocado oil. Mustard seeds + curry leaves + red chilli. Full pop.',timer:20},
  {t:'Add surakkai. Turmeric + coriander + cumin. Toss to coat.',},
  {t:'Cover with lid. Medium heat. Cook 5–6 minutes.',timer:330,note:'Surakkai releases a lot of moisture as it cooks — the covered step uses this moisture to steam-cook the gourd from the inside.'},
  {t:'Remove lid. Add salt. Medium-high heat. Cook uncovered 3–4 minutes until most moisture evaporates.',timer:210,flags:['crit'],note:'The goal is surakkai that is cooked through but not waterlogged. The uncovered finish evaporates the released moisture. Stop when the pieces are tender and the pan is mostly dry.'},
  {t:'Turn off heat. 30 seconds.',timer:30},
  {t:F.amla+'Add amla powder. Toss gently.',flags:['amla']},
 ],
 goesWith:[
  {n:'Murungakkai Sambar',cat:'gravy',why:'Surakkai is the lightest calorie curry in the plan at 60 kcal per serving — drumstick sambar provides the protein and micronutrient density to make this a complete meal. Moringa vitamin C enhances the trace iron in surakkai. This is the lowest-calorie complete brunch plate in the 28-day plan.',tags:['Low cal complete','Iron↑','VitC+','Light day']},
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'Horse gram provides the protein and cholesterol-fighting polyphenols that surakkai lacks. Surakkai is 96% water and provides mainly cooling compounds and minimal nutrition — horse gram rasam makes the meal nutritionally complete while preserving the light, refreshing character of the surakkai.',tags:['Protein+','LDL↓','Complete meal']},
  {n:'Chana Dal & Ridge Gourd Kootu',cat:'kootu',why:'Surakkai and ridge gourd are both light, cooling, high-water vegetables that traditionally appear together in summer Tamil cooking. Chana dal provides the protein and fiber density that both vegetables lack, creating a balanced meal. Both vegetables provide cucurbitacin-type compounds that are anti-inflammatory.',tags:['Summer pairing','Protein+','Cooling+']},
 ],
 avoidWith:[{n:'Consuming raw (as juice or raw preparation)',why:'This is a food safety warning. Raw bottle gourd occasionally contains toxic cucurbitacins that cause severe vomiting, diarrhoea, and GI haemorrhage. Always cook before consuming. Never drink raw surakkai juice.',sev:'high'},{n:'Using a bitter-tasting bottle gourd',why:'Unusual bitterness in bottle gourd is a sign of high cucurbitacin content. If a raw piece tastes intensely bitter, discard the entire gourd. Normal surakkai is very mildly flavoured — any bitterness is a warning sign.',sev:'high'}],
 science:'Bottle gourd has one of the lowest calorie densities of any food at 14 kcal per 100g. It is 96.1% water, making it an exceptional choice for hydration and caloric management without reducing meal volume or satisfaction. Surakkai contains choline (an important B-vitamin for liver function and cognitive health) and cucurbitacin B — an anti-inflammatory compound. In traditional Indian medicine, bottle gourd juice is used for liver protection and the vegetable is prescribed for managing hypertension due to its high water content and potassium. The very low glycaemic load (GL ~2 per serving) makes it one of the safest vegetables for blood sugar management.',
 begNotes:{'The surakkai released so much water the tadka lost all its flavour':'This is why the uncovered finish is important. Cook uncovered on medium-high heat until most moisture has evaporated — this concentrates the spice flavours back into the vegetable.','How do I know it is the right tenderness?':'Press a piece — it should yield without effort. Think of a ripe avocado consistency. Surakkai should never be al dente the way beans should be.','Warning — do not drink raw bottle gourd juice':'Raw surakkai juice can occasionally contain toxic cucurbitacins that cause severe gastrointestinal distress. Always cook surakkai before consuming. This does not apply to the cooked curry.'}
},

{id:'curry-vazhai-thandu',cat:'curry',en:'Vazhai Thandu (Plantain Stem) Poriyal',ta:'வாழைத் தண்டு பொரியல்',
 time:'30 min',serves:'4',
 appears:['Kidney support day','Urinary health','Weekly therapeutic'],
 nut:{c:6,p:1,f:4,kcal:64,fibre:4},
 fat:{total:4,sat:0.5,mufa:2.9,pufa:0.4},chop40:false,
 ing:[
  {a:'1 medium',n:'Plantain stem (vazhai thandu)',note:'About 500g usable after removing outer layers. Keep a bowl of buttermilk or diluted yogurt water nearby while cutting.'},
  {a:'1 tbsp',n:'Avocado oil'},
  {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji'},
  {a:'½ tsp',n:'Mustard seeds'},
  {a:'1 tsp',n:'Urad dal'},
  {a:'1 sprig',n:'Curry leaves'},
  {a:'1',n:'Dried red chilli'},
  {a:'¼ tsp',n:'Turmeric'},
  {a:'½ tsp',n:'Green chilli',note:'Slit — for heat. Optional but traditional.'},
  {a:'¾ tsp',n:'Salt'},
  {a:'2 tbsp',n:'Fresh grated coconut or almond meal',note:'Traditional finish. Almond meal for no-coconut version.'},
  {a:'1 tsp',n:'Lime juice',note:'Off heat'},
  {a:'1 bowl',n:'Buttermilk or diluted yogurt water',note:'For soaking cut pieces — prevents browning and removes residual sap'},
 ],
 steps:[
  {t:'Prepare the buttermilk soaking bowl first: mix 2 tbsp yogurt or 1 tbsp lime juice in 500ml water. This is where cut pieces go immediately.',flags:['crit'],note:'Plantain stem oxidises and darkens within seconds of cutting. The acidic soaking water prevents this. Have it ready before you start cutting.'},
  {t:'Remove the outer purple-green fibrous layers of the plantain stem until you reach the pale ivory inner core. The usable inner portion is tender and slightly translucent.',flags:['crit'],note:'Peel aggressively — the outer layers are tough and fibrous. Keep peeling until the surface is completely smooth and ivory-white. The inner core is what you want.'},
  {t:'Cut crosswise into thin rounds — 3–4mm thick. As you cut each round, there will be long fibres threading through the centre. Pull these out and discard.',flags:['crit'],note:'The fibres are the most important step. Run your finger through the centre of each round and pull out the thread-like fibre before it goes into the dish. Remaining fibres are unpleasant to eat and do not cook down.'},
  {t:'Drop each defibred round immediately into the buttermilk water. When all rounds are cut, drain and finely chop into small pieces.',},
  {t:'Dry kadai, high heat, 60 seconds.',timer:60},
  {t:F.kalonji+'Kalonji to dry pan. 30 seconds.',timer:30,flags:['crit']},
  {t:'Add avocado oil. Urad dal first — pale gold.',timer:25},
  {t:'Mustard seeds + curry leaves + red chilli + green chilli. Full pop.',timer:20},
  {t:'Add drained plantain stem pieces. Turmeric. Toss to coat.',},
  {t:'Add 2 tbsp water. Cover. Medium heat. Cook 8 minutes.',timer:480,note:'Plantain stem needs steam to cook through. The covered step is essential — without it the outside chars before the inside softens.'},
  {t:'Remove lid. Add salt. Medium-high heat. Cook uncovered 3–4 minutes until dry.',timer:240,flags:['crit']},
  {t:'Add coconut or almond meal. Toss off heat.',},
  {t:'Squeeze lime juice over. Toss once.',},
 ],
 goesWith:[
  {n:'Kollu (Horse Gram) Rasam',cat:'gravy',why:'The most important pairing for vazhai thandu. Horse gram tannins + plantain stem fibre together provide the strongest urinary oxalate-binding combination in this plan. Both independently prevent kidney stone formation and urinary calculi — horse gram by reducing urinary calcium excretion, plantain stem by binding oxalate before absorption. The traditional prescription in Tamil medicine for kidney stones is exactly this combination.',tags:['Kidney protect','Oxalate↓','Stone prevent','Traditional Rx']},
  {n:'Moong Dal & Yellow Pumpkin Kootu',cat:'kootu',why:'Light moong provides complete protein to complement the therapeutic vazhai thandu. Moong zinc enhances the diuretic and anti-inflammatory effects of plantain stem fibre. This combination is the most kidney-protective brunch plate in the plan.',tags:['Kidney+','Protein complete','Diuretic+']},
  {n:'Vetha Kuzhambu',cat:'gravy',why:'Tamarind vitamin C enhances iron absorption from the plantain stem. The sourness of VK also cuts through the slight bitterness of vazhai thandu beautifully. A classic Tamil pairing for both flavour and the traditional use of these two together in therapeutic diets.',tags:['Iron↑','Classic pair','Flavour balance']},
 ],
 avoidWith:[{n:'Calcium-rich dairy at the same meal',why:'Plantain stem oxalic acid binding compounds in the presence of high dietary calcium can form calcium-oxalate complexes in the gut — reducing the therapeutic kidney-protective benefit. The protective effect against kidney stones is partially reversed when calcium is high.',sev:'med'},{n:'Raw consumption',why:'Raw plantain stem has strong fibres that are indigestible and the sap can cause skin irritation. The calcium oxalate content is also higher in raw form. Always cook before eating.',sev:'high'},{n:'Blood thinning medications',why:'Plantain stem has mild diuretic and blood-thinning properties in some studies. If on anticoagulant medication, consult a doctor about frequency of consumption.',sev:'caution'}],
 science:'Plantain stem is the most therapeutically specific vegetable in this collection — its primary evidence base is for kidney and urinary tract health. It contains high concentrations of oxalic acid binders and diuretic compounds that increase urine output, reduce urinary calcium, and prevent the crystal formation that leads to kidney stones. In traditional Tamil medicine (Siddha), vazhai thandu is the first-line therapeutic food prescribed for urinary calculi and is given as juice or poriyal daily until stones dissolve. The urinalysis in your February labs showed trace protein — regular consumption of plantain stem is one of the most evidence-backed dietary interventions for mild proteinuria in traditional medicine, though this should be discussed with Dr. Alexander. Plantain stem is also exceptionally high in potassium at approximately 401mg per 100g, supporting blood pressure regulation. The fibrous inner core contains both soluble and insoluble fibre that reduces LDL and supports gut motility.',
 begNotes:{'Where do I buy plantain stem?':'Indian and Sri Lankan grocery stores carry them. Banana stem looks like a pale green cylinder, sold by the section. Choose firm, heavy sections. Some stores carry it pre-cut and packed.','The fibre removal is taking too long':'Use this technique: after cutting each round, hold the round up to the light — the fibres will be visible as threads. Poke your finger through the centre hole and rotate — the fibres wrap around your finger and come out as a bundle.','It turned brown despite soaking':'The soaking water was not acidic enough. Use more lime juice or yogurt. Already browned pieces are safe to eat — the browning is cosmetic oxidation, not spoilage.','My poriyal is very bitter':'You included too much of the outer fibrous layer. Peel more aggressively next time until the surface is smooth ivory-white with no green or purple remaining.'}
},

{id:'curry-mixed-veg',cat:'curry',en:'Poriyal-style Mixed Vegetable Fry',ta:'கலந்த காய்கறி பொரியல்',

// ═══════════════════════════════════════════════════════════
// FILTERS — added 'special' category
// ═══════════════════════════════════════════════════════════
const FILTERS = [
  {id:'all',label:'All',cls:'all'},
  {id:'base',label:'🔧 Base Techniques',cls:'base'},
  {id:'kootu',label:'🫘 Kootu',cls:'kootu'},
  {id:'curry',label:'🥘 Dry Curries',cls:'curry'},
  {id:'gravy',label:'🍲 Gravy',cls:'gravy'},
  {id:'kids',label:'🎒 Kids',cls:'kids'},
  {id:'special',label:'✨ Special',cls:'special'},
    {id:'family',label:'🏠 Family',cls:'family'},
  {id:'salad',label:'🥗 Salads',cls:'salad'},
];

// ═══════════════════════════════════════════════════════════
// RENDER — updated to include chop alert and saffron notes
// ═══════════════════════════════════════════════════════════
const CAT_LABELS={base:'Base Technique',kootu:'Kootu',curry:'Dry Curry',gravy:'Gravy',kids:'Kids',special:'Special',family:'Family Recipe',salad:'Guest Salad'};

let currentRecipeId=null,beginnerMode=false,filterCat='all';
let cmCurrentStep=0,cmSteps=[];
let timerInterval=null,timerSeconds=0,timerTotal=0,timerRunning=false;
let wakeLock=null;

function buildFilterRow(){
  const c=document.getElementById('filterRow');
  c.innerHTML=FILTERS.map(f=>`<button class="filter-pill ${filterCat===f.id?'active '+f.cls:''}" id="fp-${f.id}" onclick="setFilter('${f.id}')">${f.label}</button>`).join('');
}
function setFilter(cat){
  filterCat=cat;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active','all','kootu','curry','gravy','kids','base','special','family','salad'));
  const btn=document.getElementById('fp-'+cat);
  if(btn){btn.classList.add('active');btn.classList.add(cat);}
  filterRecipes();
}
function filterRecipes(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const results=RECIPES.filter(r=>{
    const matchCat=filterCat==='all'||r.cat===filterCat;
    const matchQ=!q||(r.en||"").toLowerCase().includes(q)||(r.ta||"").includes(q)||(r.cat||"").includes(q);
    return matchCat&&matchQ;
  });
  renderGrid(results);
}
function renderGrid(recipes){
  const grid=document.getElementById('recipeGrid');
  const empty=document.getElementById('emptyState');
  if(!recipes.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=recipes.map(r=>`
    <div class="recipe-thumb" onclick="openRecipe('${r.id}')">
      <div class="rt-header">
        <div class="rt-cat ${r.cat}">${CAT_LABELS[r.cat]||r.cat}</div>
        <div class="rt-en">${r.en}</div>
        <div class="rt-ta">${r.ta}</div>
      </div>
      <div class="rt-footer">
        <span class="rt-time">⏱ ${r.time}</span>
        <div class="rt-macros">
          <span class="macro-chip c">${r.nut.c}g C</span>
          <span class="macro-chip p">${r.nut.p}g P</span>
          <span class="macro-chip f">${r.fat.total}g F</span>
        </div>
      </div>
    </div>`).join('');
}
function openRecipe(id){
  const r=RECIPES.find(x=>x.id===id);
  if(!r)return;
  currentRecipeId=id;beginnerMode=false;
  const det=document.getElementById('pageDetail');
  det.innerHTML=`
    <div class="detail-hero">
      <div class="dh-cat"><span class="rt-cat ${r.cat}">${CAT_LABELS[r.cat]}</span></div>
      <div class="dh-ta">${r.ta}</div>
      <div class="dh-en">${r.en}</div>
      <div class="dh-meta">
        <div class="dh-meta-item">⏱ <strong>${r.time}</strong></div>
        <div class="dh-meta-item">👨‍👩‍👧‍👦 Serves <strong>${r.serves}</strong></div>
      </div>
    </div>
    <div class="appears-in">
      <div class="ai-lbl">When to make this</div>
      ${r.appears.map(a=>`<span class="ai-chip">${a}</span>`).join('')}
    </div>
    ${r.goesWith&&r.goesWith.length?`<div class="pairs-section">
      <div class="pairs-title">🤝 Pairs Well With — Nutritional Synergies</div>
      ${r.goesWith.map(p=>`<div class="pair-item">
        <span class="pair-badge ${p.cat}">${p.cat}</span>
        <div class="pair-body">
          <div class="pair-name">${p.n}</div>
          <div class="pair-why">${p.why}</div>
          <div class="pair-icons">${p.tags.map(t=>`<span class="pair-icon">${t}</span>`).join('')}</div>
        </div>
      </div>`).join('')}
    </div>`:''}
    <div class="nut-panel">
      <div class="np-title">Nutrition per serving</div>
      <div class="np-main" style="grid-template-columns:repeat(5,1fr)">
        <div class="npm-item"><div class="npm-val">${r.nut.c}</div><div class="npm-unit">g</div><div class="npm-lbl">Net carbs</div></div>
        <div class="npm-item"><div class="npm-val">${r.nut.p}</div><div class="npm-unit">g</div><div class="npm-lbl">Protein</div></div>
        <div class="npm-item"><div class="npm-val">${r.fat.total}</div><div class="npm-unit">g</div><div class="npm-lbl">Fat</div></div>
        <div class="npm-item"><div class="npm-val">${r.nut.fibre}</div><div class="npm-unit">g</div><div class="npm-lbl">Fibre</div></div>
        <div class="npm-item"><div class="npm-val">${r.nut.kcal}</div><div class="npm-unit">kcal</div><div class="npm-lbl">Calories</div></div>
      </div>
      <div class="np-fat">
        <div class="np-fat-lbl">Fat breakdown (${r.fat.total}g total)</div>
        <div class="np-fat-row"><span>Saturated fat</span><span>${r.fat.sat}g</span></div>
        <div class="np-fat-row"><span>Monounsaturated (MUFA)</span><span>${r.fat.mufa}g</span></div>
        <div class="np-fat-row"><span>Polyunsaturated (PUFA)</span><span>${r.fat.pufa}g</span></div>
      </div>
    </div>
    ${renderAvoid(r)}
    <div class="det-section">
      <div class="det-section-title gold">🧪 Ingredients</div>
      ${r.cat==='family'?`<div class="family-note"><div class="family-note-lbl">Family Recipe</div><div class="family-note-txt">Original family recipe preserved as written. Health additions (amla off heat, kalonji in tadka, flaxseed off heat) have been added. Core technique and flavour profile unchanged.</div></div>`:''}
      ${r.keyTips&&r.keyTips.length?`<div class="key-tips"><div class="key-tips-lbl">⭐ Do Not Skip These</div>${r.keyTips.map(t=>`<div class="key-tip-row"><span style="flex-shrink:0">→</span><span>${t}</span></div>`).join('')}</div>`:''}
      ${r.chop40?CHOP_ALERT:''}
      <table class="ing-table">
        ${r.ing.map(i=>i.a.includes('—')?`<tr><td colspan="2" style="padding:12px 0 4px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mu)">${i.a}</td></tr>`:`
          <tr class="ing-row">
            <td class="ing-amount">${i.a}</td>
            <td><div class="ing-name">${i.n}</div>${i.note&&!i.a.includes('—')?`<div class="ing-note">${i.note}</div>`:''}</td>
          </tr>`).join('')}
      </table>
      ${r.goesWith&&r.goesWith.length?`<div style="margin-top:12px"><div style="font-size:10px;color:var(--mu);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">Goes well with</div><div class="goes-well">${r.goesWith.map(g=>`<span class="gw-chip">${g}</span>`).join('')}</div></div>`:''}
    </div>
    <div class="det-section">
      <div class="det-section-title green">👨‍🍳 Method</div>
      ${r.chop40?CHOP_ALERT:''}
      ${r.steps.map((s,i)=>`
        <div class="step-item">
          <div class="step-num ${s.flags&&s.flags.includes('crit')?'critical':''}">${i+1}</div>
          <div class="step-body">
            <div class="step-text">${s.t}</div>
            ${s.timer?`<button class="step-timer-btn" onclick="quickTimer(${s.timer},event)">⏱ Set ${fmtTime(s.timer)} timer</button>`:''}
            ${s.note?`<div class="chef-note"><div class="chef-note-lbl">Chef's note</div><div class="chef-note-txt">${s.note}</div></div>`:''}
          </div>
        </div>`).join('')}
      ${Object.keys(r.begNotes||{}).length?`
        <div class="beginner-note" id="beginnerSection">
          <div class="bn-lbl">👩‍🍳 Beginner Notes</div>
          ${Object.entries(r.begNotes).map(([k,v])=>`<div style="margin-bottom:8px"><strong style="font-size:12px;color:var(--pu)">${k}:</strong><div class="bn-txt" style="margin-top:2px">${v}</div></div>`).join('')}
        </div>`:''}
    </div>
    <div class="det-section" style="border-bottom:none;padding-bottom:100px">
      <div class="det-section-title" style="color:var(--greenl)">🔬 Why We Eat This</div>
      <div class="science-card"><div class="sc-lbl">Evidence</div><div class="sc-txt">${r.science}</div></div>
    </div>
    <div class="action-bar">
      ${Object.keys(r.begNotes||{}).length?`<button class="beginner-toggle" id="beginnerBtn" onclick="toggleBeginner()">👩‍🍳 Beginner</button>`:''}
      <button class="cook-btn" onclick="startCookMode()">▶ Start Cooking</button>
    </div>`;
  document.getElementById('pageIndex').style.display='none';
  det.style.display='block';
  document.getElementById('backBtn').style.display='flex';
  document.getElementById('topTitle').innerHTML=`<em>${r.en}</em>`;
  window.scrollTo({top:0});
}
function goBack(){
  document.getElementById('pageDetail').style.display='none';
  document.getElementById('pageIndex').style.display='block';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('topTitle').innerHTML='Recipe <em>Cards</em>';
  currentRecipeId=null;
}
function toggleBeginner(){
  beginnerMode=!beginnerMode;
  const sec=document.getElementById('beginnerSection');
  const btn=document.getElementById('beginnerBtn');
  if(sec)sec.classList.toggle('show',beginnerMode);
  if(btn)btn.classList.toggle('on',beginnerMode);
}
function startCookMode(){
  const r=RECIPES.find(x=>x.id===currentRecipeId);
  if(!r)return;
  cmSteps=r.steps;cmCurrentStep=0;
  document.getElementById('cmName').textContent=r.en;
  document.getElementById('cookMode').classList.add('active');
  renderCmStep();requestWakeLock();
}
function renderCmStep(){
  const s=cmSteps[cmCurrentStep];const total=cmSteps.length;
  let dots='';for(let i=0;i<total;i++)dots+=`<div class="cm-prog-dot ${i<cmCurrentStep?'done':i===cmCurrentStep?'current':''}"></div>`;
  document.getElementById('cmProgress').innerHTML=dots;
  document.getElementById('cmStepNum').textContent=`Step ${cmCurrentStep+1} of ${total}`;
  let txt=s.t.replace(/<span[^>]*>.*?<\/span>/g,'').replace(/<[^>]*>/g,'').trim();
  const flagLabels=[];
  if(s.flags&&s.flags.includes('crit'))flagLabels.push('⭐ Key Step');
  if(s.t.toLowerCase().includes('kalonji'))flagLabels.push('🖤 Kalonji Moment');
  if(s.t.toLowerCase().includes('omam'))flagLabels.push('⚪ Omam');
  if(s.t.toLowerCase().includes('amla'))flagLabels.push('🟢 Amla — off heat only');
  if(s.t.toLowerCase().includes('flaxseed'))flagLabels.push('🌾 Flaxseed — off heat only');
  if(s.t.toLowerCase().includes('saffron'))flagLabels.push('🟡 Saffron — warm water only');
  document.getElementById('cmFlags').innerHTML=[...new Set(flagLabels)].map(l=>`<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.25)">${l}</span>`).join('');
  document.getElementById('cmStepText').textContent=txt;
  const noteEl=document.getElementById('cmNote');const noteTxt=document.getElementById('cmNoteText');
  if(s.note){noteTxt.textContent=s.note;noteEl.style.display='block';}else noteEl.style.display='none';
  const timerEl=document.getElementById('cmTimer');
  clearInterval(timerInterval);timerRunning=false;document.getElementById('timerStartBtn').textContent='Start';
  if(s.timer&&s.timer>0){timerSeconds=s.timer;timerTotal=s.timer;timerEl.classList.add('show');updateTimerDisplay();}else timerEl.classList.remove('show');
  document.getElementById('cmPrev').disabled=cmCurrentStep===0;
  const nb=document.getElementById('cmNext');
  if(cmCurrentStep===total-1){nb.textContent='✓ Done!';nb.classList.add('finish');}else{nb.innerHTML='Next →';nb.classList.remove('finish');}
}
function cmStep(dir){
  if(dir>0&&cmCurrentStep===cmSteps.length-1){closeCookMode();return;}
  cmCurrentStep=Math.max(0,Math.min(cmSteps.length-1,cmCurrentStep+dir));
  clearInterval(timerInterval);timerRunning=false;renderCmStep();
}
function closeCookMode(){clearInterval(timerInterval);document.getElementById('cookMode').classList.remove('active');releaseWakeLock();}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return m>0?`${m}:${sec.toString().padStart(2,'0')}`:`${sec}s`;}
function updateTimerDisplay(){
  document.getElementById('timerDisplay').textContent=fmtTime(timerSeconds);
  const circ=2*Math.PI*38;const pct=timerTotal>0?timerSeconds/timerTotal:1;
  const arc=document.getElementById('timerArc');
  arc.style.strokeDasharray=circ;arc.style.strokeDashoffset=circ*(1-pct);
  arc.style.stroke=pct>0.5?'var(--gold)':pct>0.25?'var(--terra)':'var(--red)';
}
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerStartBtn').textContent='Resume';}
  else{timerRunning=true;document.getElementById('timerStartBtn').textContent='Pause';
    timerInterval=setInterval(()=>{timerSeconds--;updateTimerDisplay();
      if(timerSeconds<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerStartBtn').textContent='Done';
        try{navigator.vibrate&&navigator.vibrate([400,100,400]);}catch(e){}}},1000);}
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerSeconds=timerTotal;document.getElementById('timerStartBtn').textContent='Start';updateTimerDisplay();}
function quickTimer(secs,evt){
  evt.stopPropagation();timerSeconds=secs;timerTotal=secs;
  const d=document.createElement('div');
  d.style.cssText='position:fixed;bottom:80px;right:16px;background:#1a2a18;border:1px solid var(--green);border-radius:12px;padding:10px 16px;color:var(--gold);font-family:DM Mono,monospace;font-size:16px;z-index:250;min-width:80px;text-align:center';
  d.id='qTimer';document.body.appendChild(d);
  let s=secs;const update=()=>{const el=document.getElementById('qTimer');if(el)el.textContent='⏱ '+fmtTime(s);};update();
  const iv=setInterval(()=>{s--;update();if(s<=0){clearInterval(iv);try{navigator.vibrate&&navigator.vibrate([400,100,400]);}catch(e){}setTimeout(()=>{const el=document.getElementById('qTimer');if(el)el.remove();},2000);}},1000);
  d.onclick=()=>{clearInterval(iv);d.remove();};
}
async function requestWakeLock(){try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
async function releaseWakeLock(){try{if(wakeLock){await wakeLock.release();wakeLock=null;}}catch(e){}}

function renderAvoid(r){
  if(!r.avoidWith||!r.avoidWith.length)return '';
  var items=r.avoidWith.map(function(a){
    var sevLabel=a.sev==='high'?'Avoid':a.sev==='med'?'Reduces benefit':'Caution';
    return '<div class="avoid-item"><span class="avoid-sev '+a.sev+'">'+sevLabel+'</span><div class="avoid-body"><div class="avoid-name">'+a.n+'</div><div class="avoid-why">'+a.why+'</div></div></div>';
  }).join('');
  return '<div class="avoid-section"><div class="avoid-title">&#9888;&#65039; Do Not Pair With</div>'+items+'</div>';
}
function renderPairs(r){
  if(!r.goesWith||!r.goesWith.length)return '';
  var items=r.goesWith.map(function(p){
    var tags=p.tags.map(function(t){return '<span class="pair-icon">'+t+'</span>';}).join('');
    return '<div class="pair-item"><span class="pair-badge '+p.cat+'">'+p.cat+'</span><div class="pair-body"><div class="pair-name">'+p.n+'</div><div class="pair-why">'+p.why+'</div><div class="pair-icons">'+tags+'</div></div></div>';
  }).join('');
  return '<div class="pairs-section"><div class="pairs-title">&#129309; Pairs Well With — Nutritional Synergies</div>'+items+'</div>';
}
buildFilterRow();filterRecipes();
</script>
