<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f1a0e">
<title>Recipes · Our Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── PASTE THIS ENTIRE <style> block into your recipes.html replacing the existing one ── */
:root{
  --bg:#0f1a0e;--bg2:#162018;--bg3:#1e2e1c;
  --card:#1a2a18;--card2:#223020;
  --gold:#d4a843;--gold2:#f0c860;--goldp:#2a2010;
  --terra:#c4622d;--terrap:#2a1208;
  --cream:#f5ede0;--cream2:#fdf8f0;
  --green:#4a9a5a;--greenl:#7ab878;--greenp:#0e200c;
  --ink:#e8e0d4;--mu:#8a9a88;--border:#2a3828;
  --pu:#9d6fe8;--pup:#1a0e2a;
  --nv:#5a8ad4;--nvp:#0a1428;
  --red:#e05040;--redp:#2a0e0a;
  --saffron:#e8a020;--saffronp:#2a1800;
  --nav-h:64px;--top-h:52px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6;padding-top:var(--top-h);padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px);min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--top-h);background:rgba(15,26,14,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px}
.back-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--ink);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.topbar-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--cream);flex:1}
.topbar-title em{color:var(--gold);font-style:italic}
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(15,26,14,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);display:flex}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--mu);font-family:'Lato',sans-serif;font-size:10px;font-weight:700;letter-spacing:.04em;padding:8px 4px 4px;text-decoration:none;text-transform:uppercase}
.nav-item.active{color:var(--green)}
.nav-item .ni{font-size:20px;line-height:1}
#pageIndex{padding:16px 14px 0}
.search-wrap{position:relative;margin-bottom:14px}
.search-input{width:100%;padding:12px 16px 12px 42px;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--ink);font-family:'Lato',sans-serif;font-size:14px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--green)}
.search-input::placeholder{color:var(--mu)}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;margin-bottom:16px}
.filter-row::-webkit-scrollbar{display:none}
.filter-pill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--mu);font-family:'Lato',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.filter-pill.active{color:var(--bg);border-color:transparent}
.filter-pill.active.all,.filter-pill.active.kootu{background:var(--gold)}
.filter-pill.active.curry{background:var(--terra)}
.filter-pill.active.gravy{background:var(--green)}
.filter-pill.active.kids{background:var(--pu)}
.filter-pill.active.base{background:var(--nv)}
.filter-pill.active.special{background:var(--saffron)}
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:8px}
.recipe-thumb{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.recipe-thumb:active{transform:scale(.97)}
.recipe-thumb:hover{border-color:var(--green)}
.rt-header{padding:14px 13px 10px;border-bottom:1px solid var(--border);min-height:80px;display:flex;flex-direction:column;justify-content:space-between}
.rt-cat{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border-radius:6px;margin-bottom:6px}
.rt-cat.kootu{background:var(--goldp);color:var(--gold)}
.rt-cat.curry{background:var(--terrap);color:var(--terra)}
.rt-cat.gravy{background:var(--greenp);color:var(--greenl)}
.rt-cat.kids{background:var(--pup);color:var(--pu)}
.rt-cat.base{background:var(--nvp);color:var(--nv)}
.rt-cat.special{background:var(--saffronp);color:var(--saffron)}
.rt-en{font-family:'Playfair Display',serif;font-size:13px;color:var(--cream);line-height:1.3;margin-bottom:3px}
.rt-ta{font-size:10px;color:var(--mu)}
.rt-footer{padding:8px 13px;display:flex;justify-content:space-between;align-items:center}
.rt-time{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.rt-macros{display:flex;gap:5px}
.macro-chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
.macro-chip.c{background:rgba(212,168,67,.15);color:var(--gold)}
.macro-chip.p{background:rgba(74,154,90,.15);color:var(--greenl)}
#pageDetail{display:none;padding:0}
.detail-hero{padding:22px 18px 18px;background:linear-gradient(160deg,var(--bg3) 0%,var(--bg) 100%);border-bottom:1px solid var(--border)}
.dh-cat{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px}
.dh-ta{font-size:12px;color:var(--mu);margin-bottom:8px;font-style:italic}
.dh-en{font-family:'Playfair Display',serif;font-size:26px;color:var(--cream);line-height:1.2;margin-bottom:4px}
.dh-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.dh-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu)}
.dh-meta-item strong{color:var(--ink);font-weight:700}
.appears-in{display:flex;gap:6px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg2)}
.ai-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);width:100%;margin-bottom:2px}
.ai-chip{font-size:11px;background:var(--card);border:1px solid var(--border);color:var(--mu);padding:3px 9px;border-radius:8px}
.nut-panel{padding:16px 18px;border-bottom:1px solid var(--border);background:var(--bg2)}
.np-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:12px}
.np-main{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.npm-item{text-align:center}
.npm-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--cream);line-height:1}
.npm-unit{font-size:9px;color:var(--mu);margin-top:1px}
.npm-lbl{font-size:9px;color:var(--mu);margin-top:3px;letter-spacing:.04em;text-transform:uppercase}
.np-fat{background:var(--card);border-radius:10px;padding:10px 12px}
.np-fat-row{display:flex;justify-content:space-between;font-size:12px;color:var(--mu);padding:2px 0}
.np-fat-row span:last-child{color:var(--ink);font-weight:700;font-family:'DM Mono',monospace}
.np-fat-lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.det-section{padding:16px 18px;border-bottom:1px solid var(--border)}
.det-section-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.det-section-title.gold{color:var(--gold)}
.det-section-title.green{color:var(--greenl)}
.det-section-title.terra{color:var(--terra)}
.ing-table{width:100%;border-collapse:collapse}
.ing-row{border-bottom:1px solid rgba(255,255,255,.04)}
.ing-row:last-child{border-bottom:none}
.ing-row td{padding:8px 0;vertical-align:top}
.ing-amount{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);font-weight:500;width:80px;padding-right:12px}
.ing-name{font-size:13px;color:var(--cream);font-weight:400}
.ing-note{font-size:11px;color:var(--mu);margin-top:1px}
.chef-note{background:var(--goldp);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:10px 13px;margin:10px 0}
.chef-note-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.chef-note-txt{font-size:12px;color:#d4c090;line-height:1.5}
/* 40-MIN CHOP ALERT */
.chop-alert{background:rgba(74,154,90,.12);border:1px solid rgba(74,154,90,.35);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.chop-alert .ca-ico{font-size:22px;flex-shrink:0}
.chop-alert .ca-title{font-size:11px;font-weight:700;color:var(--greenl);letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.chop-alert .ca-txt{font-size:12px;color:#90c890;line-height:1.5}
/* SAFFRON BADGE */
.saffron-note{background:var(--saffronp);border-left:3px solid var(--saffron);border-radius:0 10px 10px 0;padding:9px 12px;margin:8px 0}
.saffron-note-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--saffron);margin-bottom:3px}
.saffron-note-txt{font-size:12px;color:#e8c080;line-height:1.5}
.beginner-note{background:rgba(155,110,232,.12);border-left:3px solid var(--pu);border-radius:0 10px 10px 0;padding:9px 12px;margin:8px 0;display:none}
.beginner-note.show{display:block}
.bn-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pu);margin-bottom:3px}
.bn-txt{font-size:12px;color:#c4b0e8;line-height:1.5}
.step-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:flex-start}
.step-item:last-child{border-bottom:none}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;flex-shrink:0;margin-top:1px;background:var(--card2);color:var(--mu);border:1px solid var(--border)}
.step-num.critical{background:rgba(212,168,67,.2);color:var(--gold);border-color:rgba(212,168,67,.4)}
.step-body{flex:1}
.step-text{font-size:13px;color:var(--ink);line-height:1.6}
.step-flag{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;margin-right:5px;margin-bottom:3px;vertical-align:middle}
.step-flag.kalonji{background:rgba(0,0,0,.4);color:#e0d0ff;border:1px solid rgba(200,180,255,.2)}
.step-flag.omam{background:rgba(255,255,220,.08);color:#e8e4c0;border:1px solid rgba(220,210,160,.2)}
.step-flag.amla{background:rgba(60,160,40,.15);color:#a0e890;border:1px solid rgba(80,180,60,.2)}
.step-flag.flax{background:rgba(100,60,20,.3);color:#d4b080;border:1px solid rgba(160,100,40,.2)}
.step-flag.critical{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}
.step-timer-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:5px 11px;border-radius:8px;border:none;background:rgba(74,154,90,.2);color:var(--greenl);font-family:'Lato',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.04em}
.science-card{background:var(--greenp);border:1px solid rgba(74,154,90,.25);border-radius:12px;padding:13px 15px}
.sc-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--greenl);margin-bottom:6px}
.sc-txt{font-size:12px;color:#a0c8a0;line-height:1.6}
.action-bar{position:sticky;bottom:calc(var(--nav-h) + var(--safe-b));left:0;right:0;z-index:200;padding:10px 14px;background:rgba(15,26,14,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;gap:10px}
.cook-btn{flex:1;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),var(--greenl));color:#fff;font-family:'Lato',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.03em}
.beginner-toggle{padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--pu);font-family:'Lato',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.beginner-toggle.on{background:rgba(155,110,232,.15);border-color:rgba(155,110,232,.4)}
#cookMode{display:none;position:fixed;inset:0;z-index:500;background:var(--bg);flex-direction:column}
#cookMode.active{display:flex}
.cm-top{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top))}
.cm-close{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--ink);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cm-recipe-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--cream);flex:1;text-align:center;padding:0 8px}
.cm-body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:20px 20px 8px}
.cm-progress{display:flex;gap:4px;margin-bottom:20px;flex-shrink:0}
.cm-prog-dot{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .3s}
.cm-prog-dot.done{background:var(--green)}
.cm-prog-dot.current{background:var(--gold)}
.cm-step-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--mu);text-align:center;margin-bottom:8px;flex-shrink:0;letter-spacing:.1em;text-transform:uppercase}
.cm-step-main{flex:1;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
.cm-step-flags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cm-step-text{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,28px);color:var(--cream);line-height:1.45;flex:1}
.cm-step-bignote{background:var(--goldp);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:12px 14px;margin-top:14px;font-size:13px;color:#d4c090;line-height:1.5}
.cm-step-bignote .cn-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.cm-timer{flex-shrink:0;display:none;align-items:center;justify-content:center;flex-direction:column;margin:16px 0}
.cm-timer.show{display:flex}
.timer-ring{position:relative;width:90px;height:90px}
.timer-ring svg{width:90px;height:90px;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:4;stroke-linecap:round}
.tr-bg{stroke:var(--border)}
.tr-fill{stroke:var(--gold);transition:stroke-dashoffset .9s linear}
.timer-display{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--gold)}
.timer-btns{display:flex;gap:8px;margin-top:8px}
.tbtn{padding:7px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--mu);font-family:'Lato',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.04em}
.tbtn.start-t{background:rgba(74,154,90,.2);color:var(--greenl);border-color:rgba(74,154,90,.3)}
.cm-nav{flex-shrink:0;display:flex;gap:10px;padding:12px 0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.cm-prev{width:56px;height:56px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--ink);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cm-prev:disabled{opacity:.3}
.cm-next{flex:1;height:56px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--green),var(--greenl));color:#fff;font-family:'Lato',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.cm-next.finish{background:linear-gradient(135deg,var(--gold),#f0c060);color:var(--bg)}
.cm-screen-on{font-size:10px;color:var(--mu);text-align:center;padding:6px 0 0;flex-shrink:0;letter-spacing:.06em;text-transform:uppercase}
.empty-state{text-align:center;padding:50px 20px;color:var(--mu)}
.empty-state .es-ico{font-size:44px;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.6}
@media(min-width:480px){.recipe-grid{grid-template-columns:repeat(3,1fr)}#pageIndex{max-width:520px;margin:0 auto}}
</style>
</head>

<div class="topbar" id="topbar">
  <div class="back-btn" onclick="goBack()" style="display:none" id="backBtn">←</div>

</div>

<div id="pageIndex">
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-input" type="search" placeholder="Search recipes…" oninput="filterRecipes()" id="searchInput" autocomplete="off">
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div class="recipe-grid" id="recipeGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">

</div>

    <div style="width:36px"></div>

  <div class="cm-screen-on">Keep screen on while cooking</div>
</div>

<script>
const F = {
  kalonji:'<span class="step-flag kalonji">🖤 Kalonji</span>',
  omam:'<span class="step-flag omam">⚪ Omam</span>',
  amla:'<span class="step-flag amla">🟢 Amla</span>',
  flax:'<span class="step-flag flax">🌾 Flaxseed</span>',
  crit:'<span class="step-flag critical">⭐ Key Step</span>',
};

// ── 40-MIN CHOP ALERT HTML ──
const CHOP_ALERT = `<div class="chop-alert">
  <div class="ca-ico">⏰</div>
  <div><div class="ca-title">40-Minute Rule — Chop First</div>
  <div class="ca-txt">Chop this cruciferous vegetable 40 minutes before cooking. Chopping activates myrosinase enzyme, which converts glucosinolates into sulforaphane — the most potent anti-cancer compound in food. Heat destroys the enzyme, but if sulforaphane has already formed, it survives cooking. 40 minutes at room temperature = maximum sulforaphane.</div></div>
</div>`;

const RECIPES = [
// ════════════════════════════════════════════════════════
// ── PASTE ALL YOUR EXISTING RECIPES FROM recipes.html HERE ──
// (base-sesame, kootu-moong-pumpkin, etc.)
  // ─── 1. VENGAYA MANATHAKKALI VETHA KUZHAMBU ──────────
{id:'gravy-manathakkali-vetha', cat:'family',
 en:'Vengaya Manathakkali Vetha Kuzhambu',
 ta:'வெங்காய மணத்தக்காளி வேத குழம்பு',
 time:'45 min', serves:'4–5',
 appears:['Occasional family special','Pairs with beans curry, beetroot, cabbage, keerai'],
 nut:{c:9,p:4,f:7,kcal:112,fibre:3},
 fat:{total:7,sat:1.4,mufa:3.8,pufa:1.5},
 chop40:false,
 keyTips:[
   'Do NOT skip the roasted vendayam (methi) powder — it is the soul of this kuzhambu',
   'Do NOT skip the jaggery — it rounds the tamarind and tells you the dish is ready',
   'Do NOT swap sesame oil for coconut oil in the tempering — they behave differently at low heat and sesame oil carries the manathakkali better',
 ],
 goesWith:['Beans curry','Beetroot fry','Cabbage poriyal','Keerai (greens)'],
 ing:[
   {a:'2 medium',n:'Onions',note:'Sliced thin solai solai — long vertical strips, not rings or half-moons. The long cut caramelises more evenly.'},
   {a:'1 tbsp',n:'Coconut oil',note:'For the base — authentic and needed here'},
   {a:'4 cups',n:'Water'},
   {a:'2 tbsp',n:'Puli (tamarind) paste, thick'},
   {a:'2 heaped tsp',n:'Sambar powder'},
   {a:'½ tsp',n:'Deghi mirch (Kashmiri red chilli powder)',note:'For colour more than heat'},
   {a:'½ tsp',n:'Turmeric'},
   {a:'1½ tsp',n:'Salt'},
   {a:'¼ tsp',n:'Vendayam (methi/fenugreek) powder',note:'Do NOT skip — non-negotiable'},
   {a:'1 pinch',n:'Asafoetida (perungayam / hing)'},
   {a:'½ tsp',n:'Amla powder',note:'Added strictly off heat at the very end — family recipe addition'},
   {a:'— ROAST & GRIND —',n:'',note:''},
   {a:'2 tbsp',n:'Toor dal'},
   {a:'½ tbsp',n:'Ulutham paruppu (urad dal)'},
   {a:'2 tbsp',n:'Dhaniya (coriander seeds)'},
   {a:'1 bunch',n:'Curry leaves',note:'A generous handful — they add deep flavour when dry-roasted'},
   {a:'1',n:'Deghi mirch (whole dried)'},
   {a:'— TEMPERING —',n:'',note:''},
   {a:'2 tbsp',n:'Sesame oil (nalla ennai)',note:'Use sesame oil here — NOT coconut oil. Non-negotiable.'},
   {a:'1 tsp',n:'Kadugu (mustard seeds)'},
   {a:'3 tbsp',n:'Manathakkali (black nightshade berries)',note:'Fresh or dried. The puffed-up look is your signal they are done.'},
   {a:'1 tbsp',n:'Jaggery',note:'Do not skip — it tells you the kuzhambu is ready when the aroma shifts'},
 ],
 steps:[
   {t:'In a wide, heavy saucepan, heat 1 tbsp coconut oil on medium heat.',},
   {t:'Add the thinly sliced onions — long vertical strips. Roast, stirring every 2 minutes, until deep golden-brown throughout. This takes 12–15 minutes. Do not rush on high heat.',timer:840,flags:['crit'],note:'Long-cut vertical onions caramelise more uniformly than chopped onions — more surface area contact with the pan. The caramelised onion is the flavour backbone of this kuzhambu. Under-cooked onions create a raw, sharp taste. You want deep golden, fragrant, and jammy.'},
   {t:'Add 4 cups water. Bring to a boil.',},
   {t:'Add puli paste, sambar powder, deghi mirch, turmeric, salt, vendayam powder, and asafoetida. Stir well.',},
   {t:'Reduce heat to low. Let it simmer.',timer:0,},
   {t:'While it simmers, make the roasted powder: In a dry saucepan on medium heat, dry-roast toor dal first — it takes the longest. Stir constantly.',timer:180,flags:['crit']},
   {t:'Add urad dal. Stir until both dals turn golden.',timer:90},
   {t:'Add dhaniya (coriander seeds). Stir until aromatic and one shade darker.',timer:60},
   {t:'Add curry leaves and whole deghi mirch. Stir 30 seconds until curry leaves are crisp.',timer:30,note:'The curry leaves must fully dry and crisp in this step — they contribute a concentrated, slightly smoky flavour to the powder that you cannot get from fresh curry leaves added to liquid.'},
   {t:'Remove from heat. Cool completely — do not rush. Grinding warm spices steams in the mixie and creates a wet paste instead of a dry powder.',timer:600,flags:['crit']},
   {t:'Grind the cooled roasted ingredients to a smooth powder in a dry mixie.',note:'Dry grind only — no water at all. This powder thickens the kuzhambu and gives it body. If you add water you get paste and the kuzhambu will go gluey.'},
   {t:'Slowly add the ground powder to the simmering kuzhambu in a thin steady stream, stirring continuously so it does not become clumpy.',flags:['crit'],note:'The stirring while adding is essential. Stop stirring even for 5 seconds and you will get lumps. Thin stream + constant stirring = silky smooth integration.'},
   {t:'Simmer on low for 15 minutes, stirring every 3–4 minutes, until the kuzhambu darkens and thickens.',timer:900,flags:['crit']},
   {t:'When a lovely, deep, complex aroma rises and the oil begins to show at the edges — add 1 tbsp jaggery. Stir to dissolve.',flags:['crit'],note:'The jaggery is your timing signal as much as it is a flavour addition. The aroma shift — from sharp and raw to deep, slightly sweet, and rounded — is how you know the kuzhambu has cooked enough. If you add jaggery too early the aroma hasn\'t developed yet.'},
   {t:'Taste. Adjust salt and tamarind if needed.',},
   {t:'For the tempering: In the same dry-roasting pan, heat 2 tbsp sesame oil on LOW heat — sesame oil burns easily.',note:'Low heat is essential for sesame oil tempering. High heat turns sesame oil bitter and black.'},
   {t:'Add mustard seeds. Let them pop.',timer:20},
   {t:'Add manathakkali berries. Stir slowly on low heat for 2 minutes. Watch carefully — you will see them puff up, expand slightly, and turn a darker colour. That puffed appearance is your signal they are perfectly fried.',timer:120,flags:['crit'],note:'Manathakkali that has not puffed is under-fried — it will taste raw and slightly bitter. Over-fried (black) manathakkali turns intensely bitter and medicinal. Puffed and darkened — but not black — is exactly right. The whole cooking window is about 90 seconds.'},
   {t:'Pour the tempering over the kuzhambu. Simmer together 2 more minutes on low.',timer:120},
   {t:'Turn off heat. Wait 30 seconds.',timer:30},
   {t:F.amla+'Add amla ½ tsp off heat. Stir gently. This is an addition to the original recipe — it does not alter the taste at the resting temperature.',flags:['amla']},
   {t:'Rest 5 minutes before serving. The flavour deepens as it stands.',timer:300},
 ],
 science:'Manathakkali (black nightshade / Solanum nigrum) is one of the most medicinally documented plants in Siddha medicine. The ripe dried berries contain solanine glycosides and solasonine — compounds with demonstrated hepatoprotective (liver-protecting) properties in clinical studies. They are used specifically for ulcers, liver inflammation, and intestinal health. Fenugreek (vendayam) powder contains trigonelline — shown in RCTs to reduce post-meal blood glucose by 25–50% and lower LDL cholesterol. The jaggery addition provides trace minerals (iron, zinc, potassium) absent from white sugar. Tamarind contains hydroxycitric acid, an inhibitor of the enzyme ATP-citrate lyase involved in fat synthesis.',
 begNotes:{
   'What is manathakkali?':'Small dark purple-black berries, slightly larger than mustard seeds. Commonly called black nightshade or turkey berry. Find them in Indian grocery stores, dried or in brine. The dried version is what you want for this recipe.',
   'How do I know when the onions are golden enough?':'They should have shrunk to about 40% of their original volume, turned a deep amber-brown, and smell sweet and rich. If they still smell sharp and raw, keep cooking.',
   'The kuzhambu is too sour':'Add a little more jaggery — up to an extra ½ tbsp. The jaggery-tamarind balance is personal.',
 }
},
 
// ─── 2. RAMYA'S SPINACH KOOTU (INSTANT POT) ─────────
{id:'kootu-ramya-spinach', cat:'family',
 en:"Ramya's Spinach Kootu",
 ta:'ரம்யாவின் கீரை கூட்டு',
 time:'20 min (Instant Pot)', serves:'4',
 appears:['Any day as kootu variation','Great weeknight shortcut'],
 nut:{c:12,p:10,f:3,kcal:115,fibre:4},
 fat:{total:3,sat:0.4,mufa:1.8,pufa:0.6},
 chop40:false,
 ing:[
   {a:'1 cup',n:'Moong dal or toor dal',note:'Your choice — moong is lighter and faster, toor is richer'},
   {a:'300g',n:'Fresh spinach (about 3 packed cups)',note:'Washed. Baby spinach works perfectly. Regular spinach works equally well.'},
   {a:'2',n:'Tomatoes, roughly chopped',note:'They melt into the kootu completely — adds body and acidity'},
   {a:'2',n:'Green chillies',note:'Whole or slit — adjust to family heat preference'},
   {a:'3–4 cloves',n:'Garlic',note:'Left whole — they soften and blend in'},
   {a:'¼ tsp',n:'Turmeric'},
   {a:'1 tsp',n:'Salt',note:'Add to pot, adjust after cooking'},
   {a:'1 tbsp',n:'Ground flaxseed',note:'Stirred in after cooking, off heat',flag:'flax'},
   {a:'— TADKA —',n:'',note:''},
   {a:'1 tsp',n:'Avocado oil or sesame oil'},
   {a:'¼ tsp',n:'Kalonji seeds',flag:'kalonji',note:'Dry pan first — 30 seconds'},
   {a:'½ tsp',n:'Mustard seeds'},
   {a:'½ tsp',n:'Cumin seeds'},
   {a:'1 sprig',n:'Curry leaves'},
   {a:'½ tsp',n:'Amla powder',flag:'amla',note:'Off heat strictly'},
 ],
 steps:[
   {t:'Add everything to the Instant Pot in one go: dal, spinach, tomatoes, green chillies, garlic, turmeric, salt, and 1 cup water.',note:'This is the beauty of this recipe — everything goes in together. The tomatoes will soften and melt into the dal. The garlic will turn sweet. The spinach will wilt and integrate. No pre-cooking, no separate steps.'},
   {t:'Close the lid. Set to HIGH PRESSURE, Normal, 6 minutes. Natural release.',timer:360,flags:['crit'],note:'6 minutes on high pressure gives you fully cooked dal and spinach that has melted into it. Natural release prevents the liquid from spurting through the valve. If you quick-release a dal-based dish, you will spend 10 minutes cleaning.'},
   {t:'Open. The inside will look like a very wet, somewhat alarming green soup. This is correct.',note:'Do not panic at the appearance. This is about to become a beautiful kootu.'},
   {t:'Mash everything together firmly with a potato masher or the back of a large spoon. You want a rough mash — some texture remaining, not a smooth puree.',flags:['crit'],note:'The mashing is where the dish transforms. The dal, spinach, tomatoes, and garlic all merge into a thick, unified texture. Mash until there are no separate visible pieces but the texture still has body. Think rough hummus consistency.'},
   {t:'If too thick, add water and stir — up to ½ cup. It should be a thick pourable consistency, not stiff.',},
   {t:'Make the tadka: Heat a small pan. Add kalonji to dry pan first — 30 seconds.',timer:30,flags:['crit']},
   {t:'Add oil, mustard seeds, cumin seeds, curry leaves. Full pop.',timer:20},
   {t:'Pour tadka over the kootu. Stir through.',},
   {t:'Taste. Adjust salt.',},
   {t:'Turn off heat. Wait 30 seconds.',timer:30},
   {t:F.flax+'Add ground flaxseed. Stir.',flags:['flax']},
   {t:F.amla+'Add amla powder. Stir.',flags:['amla']},
 ],
 science:'This simple kootu delivers more absorbable iron than almost any other preparation in this plan. Spinach iron (non-haem iron) is poorly absorbed on its own — typically only 2–7%. Combined with the vitamin C in tomatoes and the acids from tamarind-adjacent cooking, absorption increases to 15–20%. The garlic contains allicin and ajoene — compounds shown to reduce LDL by 9–12% in meta-analyses. Moong dal is the highest-lysine dal — the amino acid most associated with cholesterol reduction. At only 12g net carbs per serving, this is one of the lowest-carb, highest-protein kootus in the plan.',
 begNotes:{
   'My spinach has disappeared':'Yes. Spinach shrinks dramatically under pressure. 3 cups of raw spinach becomes about ½ cup cooked. This is normal — the nutrition is concentrated, not lost.',
   'Can I make this without an Instant Pot?':'Yes. Pressure cook dal separately for 3 whistles, then add spinach, tomatoes, garlic, chilli, and simmer 15 minutes until everything softens. Mash and proceed with tadka.',
   'The kootu is too thin':'Put it on medium heat, uncovered, for 5 minutes. The moisture will evaporate quickly.',
 }
},
 
// ─── 3. APPA'S SIMPLE KOOTU ──────────────────────────
{id:'kootu-appa-simple', cat:'family',
 en:"Appa's Simple Kootu (Family Technique)",
 ta:'அப்பாவின் எளிய கூட்டு',
 time:'30 min', serves:'4–6',
 appears:['Weekly family kootu — any day','Template recipe for all vegetable kootus'],
 nut:{c:14,p:7,f:5,kcal:128,fibre:4},
 fat:{total:5,sat:1.8,mufa:1.8,pufa:1.1},
 chop40:false,
 ing:[
   {a:'1 cup',n:'Moong dal or toor dal'},
   {a:'3 cups',n:'Chopped vegetables',note:"Appa's usual: 5 carrots OR 5 turnips OR 1 bottle gourd — whatever fills the pan. Any mix works."},
   {a:'¼ tsp',n:'Turmeric'},
   {a:'1½ tsp',n:'Salt',note:'Adjust to taste at the end'},
   {a:'2 cups',n:'Water for cooking + 1 cup extra for consistency'},
   {a:'1 tbsp',n:'Ground flaxseed',note:'Off heat only',flag:'flax'},
   {a:'— COCONUT SPICE PASTE —',n:'',note:''},
   {a:'½ cup',n:'Grated coconut',note:'Thaw for just under a minute if frozen. ⅔ cup if you want richer. Roasting vs not roasting = two different flavour profiles — both are correct.'},
   {a:'1½ tsp',n:'Jeera (cumin seeds)'},
   {a:'1',n:'Green chilli',note:'Optional — adjust to preference'},
   {a:'— OPTIONAL ROASTED ADD-INS —',n:'',note:'These transform a simple kootu into something complex'},
   {a:'2 tbsp',n:'Chana dal'},
   {a:'1 tbsp',n:'Dhaniya (coriander seeds)'},
   {a:'1 tbsp',n:'Urad dal'},
   {a:'1 tsp',n:'Jeera (cumin seeds)'},
   {a:'few',n:'Curry leaves'},
   {a:'1',n:'Dried red chilli (deghi mirch)'},
   {a:'— TEMPERING —',n:'',note:''},
   {a:'1 tsp',n:'Coconut oil'},
   {a:'½ tsp',n:'Mustard seeds'},
   {a:'1 tsp',n:'Urad dal (optional)'},
   {a:'few',n:'Curry leaves'},
 ],
 steps:[
   {t:'COOK THE VEGETABLES: In a pressure pan, add 3 cups chopped vegetables, turmeric, 1 tsp salt, and 2 cups water. Close the lid and pressure cook on medium heat until cooked — for carrots or turnips, 2 whistles is enough. For bottle gourd, 1 whistle.',timer:300,note:'The vegetable should be fully soft — a knife should go through with no resistance. Under-cooked vegetables will never fully integrate with the dal and paste, giving the kootu a two-texture problem.'},
   {t:'Cook the dal separately in another pan or cooker with water until very soft. Set aside with its cooking water.',},
   {t:'MAKE THE COCONUT PASTE — THE KEY DECISION: Decide whether you want roasted or un-roasted coconut paste. Both are right. Roasted = deeper, nuttier, more complex. Un-roasted = lighter, fresher, purer coconut flavour.',flags:['crit'],note:"Appa's note: roasting and not roasting coconut are your options and they give you different flavors. This is a real fork in the recipe — not a mistake."},
   {t:'IF USING ROASTED METHOD: In a dry pan on medium heat, roast chana dal first — it takes longest, stir until golden. Add dhaniya, stir until aromatic. Add urad dal, jeera, curry leaves, dried chilli — stir until everything is fragrant. Finally add grated coconut, stir just until you get a warm aroma and some coconut turns golden at the edges. Remove.',timer:360,flags:['crit'],note:'The order matters: hardest-to-roast goes first. Chana dal can take 3–4 minutes. Coconut goes in last and only for 60–90 seconds. Over-roasted coconut turns bitter and oily.'},
   {t:'Cool roasted ingredients completely before grinding.',timer:300,flags:['crit']},
   {t:'Grind cooled ingredients (or un-roasted coconut + jeera + chilli) in a mixie. Add 2–3 tbsp water. Grind to a paste.',note:"Hold the mixie jar tight — everything will try to fly out. After the first grind, open the lid and scrape everything back down from the sides with a spatula. Then grind again. It should become a beautiful creamy paste. Warning: do not over-grind the coconut — if oil starts separating and pooling, you have gone too far."},
   {t:'Mix cooked vegetables, coconut paste, and dal together in a large pot.',},
   {t:'Add ½ to 1½ cups water to adjust consistency — it should be thick and coat a spoon heavily but not be stiff.',},
   {t:'Simmer on low heat 5–7 minutes for the flavours to marry.',timer:360},
   {t:'Taste. Adjust salt.',},
   {t:'TEMPERING (optional but recommended): Heat 1 tsp coconut oil in a small pan. Add mustard seeds — full pop. Add urad dal (turns golden quickly), then curry leaves. Pour over kootu.',},
   {t:'Off heat. 30 seconds.',timer:30},
   {t:F.flax+'Add 1 tbsp ground flaxseed. Stir.',flags:['flax']},
 ],
 science:'This is the family template kootu — the foundation that every other kootu in this plan builds on. The coconut in this recipe provides medium-chain triglycerides (MCTs) that are metabolised differently from long-chain saturated fats — they go directly to the liver for energy rather than circulating in the blood. This is an occasional family recipe and the coconut quantity per serving (approx 1–2 tbsp split across 4–6 portions) is modest. The cumin in the coconut paste contains cuminaldehyde — a compound shown to inhibit HMG-CoA reductase (the same enzyme targeted by statin drugs). Combined with the legumes\' soluble fibre and the turmeric, this kootu is genuinely functional medicine.',
 begNotes:{
   'The paste went oily when I ground it':'You over-ground the coconut. The fat cells in coconut rupture after prolonged blending and release oil. Stop grinding the moment it looks like a smooth creamy paste. If it\'s already oily, use it anyway — it just won\'t be as silky.',
   'How thick should it be?':'Thick enough that when you drag a spoon through the kootu, the channel stays open for 3–4 seconds before slowly closing. If it closes instantly, it is too thin (cook uncovered 5 minutes). If the channel stays open permanently, it is too thick (add water).'},
},
 
// ─── 4. TURNIP KOOTU ─────────────────────────────────
{id:'kootu-turnip', cat:'family',
 en:'Turnip Kootu',
 ta:'டர்னிப் கூட்டு',
 time:'30 min', serves:'8 cups (6–8 portions)',
 appears:['Appa\'s recipe — batch cook version','Low-calorie, low-carb week days'],
 nut:{c:6,p:3,f:2,kcal:62,fibre:3},
 fat:{total:2,sat:0.7,mufa:0.8,pufa:0.4},
 chop40:false,
 ing:[
   {a:'5 medium',n:'Turnips (about 600g)',note:'Peeled and cubed 2cm. Appa\'s usual: one full pan = about 5 turnips.'},
   {a:'1 cup',n:'Moong dal'},
   {a:'¼ tsp',n:'Turmeric'},
   {a:'1½ tsp',n:'Salt'},
   {a:'2 cups',n:'Water for cooking'},
   {a:'1 tbsp',n:'Ground flaxseed',note:'Off heat only',flag:'flax'},
   {a:'— COCONUT PASTE —',n:'',note:''},
   {a:'⅔ cup',n:'Grated coconut, thawed',note:'Slightly richer version — ⅔ cup gives a creamier result'},
   {a:'1½ tsp',n:'Jeera (cumin seeds)'},
   {a:'1',n:'Green chilli (optional)'},
   {a:'2 tbsp',n:'Chana dal (roasted)',},
   {a:'1 tbsp',n:'Dhaniya, roasted'},
   {a:'— TEMPERING —',n:'',note:''},
   {a:'1 tsp',n:'Coconut oil'},
   {a:'½ tsp',n:'Mustard seeds'},
   {a:'few',n:'Curry leaves'},
 ],
 steps:[
   {t:'Pressure cook turnips with turmeric, 1 tsp salt, and 2 cups water — 2 whistles on medium heat.',timer:360,note:'Turnip is denser than it looks — it needs full pressure cooking to become soft enough to integrate with the dal. Test by pressing a piece: it should squash completely between your fingers.'},
   {t:'Pressure cook moong dal with 1.5 cups water — 2 whistles. Mash well.',timer:360},
   {t:'Dry roast chana dal until golden. Add dhaniya and roast until aromatic. Add jeera and curry leaves. Cool completely.',timer:300,flags:['crit']},
   {t:'Grind roasted ingredients with thawed coconut and green chilli and 2–3 tbsp water to a smooth paste.',note:'⅔ cup of coconut in this recipe gives a noticeably creamier, richer result than ½ cup. Worth it for turnip specifically, which has a slightly sharp flavour that benefits from the fat buffer.'},
   {t:'Combine cooked turnip, mashed moong dal, and coconut paste in a pot. Stir.',},
   {t:'Add water to adjust consistency — turnip releases less moisture than bottle gourd, so you may need ½–1 cup extra.',},
   {t:'Simmer on low 5 minutes.',timer:300},
   {t:'Taste. Adjust remaining ½ tsp salt.',},
   {t:'Tempering: coconut oil → mustard seeds pop → curry leaves. Pour over.',},
   {t:'Off heat. 30 seconds.',timer:30},
   {t:F.flax+'Ground flaxseed in. Stir.',flags:['flax']},
 ],
 science:'Turnip is one of the most nutritionally underrated vegetables in Indian cooking. At only 6g net carbs per cup (lower than carrot at 9g, much lower than potato at 15g), it is an excellent bulk vegetable for low-carb cooking. Turnip contains glucosinolates — including gluconapin, which the body converts to the same class of sulforaphane precursors found in broccoli. It is a mild cruciferous vegetable that benefits from the 40-minute chop rule even though it is typically pressure-cooked (chop, leave 40 min, then cook). Turnip is rich in vitamin C (21mg per 100g) and provides meaningful amounts of calcium, potassium, and folate. Per batch nutritional yield: 494 kcal, 20g protein, 70g total carbs, 14.5g fat across the full 8-cup batch.',
 begNotes:{
   'Turnip tastes sharp raw':'Yes — raw turnip has a distinctive peppery bite. This completely disappears under pressure cooking. The cooked turnip becomes mild, slightly sweet, and very willing to take on whatever flavour the coconut paste and spices bring.',
   'Can I substitute turnip with other vegetables?':'Yes — this recipe works with chow chow (chayote), raw banana, ash gourd (white pumpkin), or any firm white vegetable. The technique and coconut paste remain identical.'},
},
];

// ─── NEW: BASE TECHNIQUES ───────────────────────────────
{id:'base-purple-cabbage', cat:'base', en:'Purple Cabbage Brine', ta:'கடும்சிவப்பு முட்டைக்கோஸ் உவர் நீர்',
 time:'20 min active · 3–5 days ferment', serves:'1 jar · lasts 3 weeks refrigerated',
 appears:['Make every 3 weeks','Add 2 tbsp to dinner salad daily','Use as fermented item'],
 nut:{c:2,p:1,f:0,kcal:12,fibre:1},
 fat:{total:0,sat:0,mufa:0,pufa:0},
 chop40:false,
 ing:[
   {a:'500g',n:'Purple cabbage',note:'About ½ a medium head — more purple = more anthocyanins'},
   {a:'1 tbsp',n:'Non-iodized salt',note:'Iodized salt kills the beneficial bacteria. Sea salt or kosher salt only.'},
   {a:'1 tsp',n:'Black peppercorns',note:'Optional but adds depth'},
   {a:'1',n:'Bay leaf',note:'Optional'},
   {a:'1 clean',n:'1-litre mason jar with lid'},
 ],
 steps:[
   {t:'Remove the outer 2 leaves of the cabbage. Set aside — you will use one as a weight later.',flags:['crit']},
   {t:'Shred the cabbage thinly — ideally 2–3mm strips. A mandoline is ideal; a sharp knife works well. Uniform thickness means uniform fermentation.',flags:['crit'],note:'The thinner the shred, the faster it ferments and the more surface area for the beneficial bacteria. Irregular thick chunks ferment unevenly — some parts will be soft and sour before others.'},
   {t:'Place shredded cabbage in a large mixing bowl. Add salt. Massage firmly with both hands for 8–10 minutes without stopping.',timer:540,flags:['crit'],note:'This is not mixing — this is aggressive squeezing and pressing. You are breaking down the cell walls to release water. After 8 minutes you will see a significant pool of purple liquid in the bowl. This is the brine the cabbage makes from its own water. It is stunning in colour and is what makes this ferment work without added vinegar.'},
   {t:'Add peppercorns and bay leaf if using. Toss through.',},
   {t:'Pack the cabbage very tightly into your clean 1-litre mason jar. Press it down firmly with your fist or a wooden spoon after each handful. The brine should rise above the cabbage level.',flags:['crit'],note:'The cabbage must be submerged below the brine. Any cabbage above the brine will be exposed to oxygen and may develop mould. Pack it so tightly it almost does not fit.'},
   {t:'Roll one of the reserved outer leaves into a tight cylinder and push it into the jar opening as a plug — it holds the shredded cabbage below the brine.',flags:['crit']},
   {t:'If the brine doesn\'t fully cover the cabbage, mix ¼ tsp non-iodized salt in 100ml water and add enough to submerge everything.',},
   {t:'Close the lid loosely — not airtight. Carbon dioxide from fermentation needs to escape. Place the jar on a small plate (it will bubble over slightly).',timer:0,note:'A loose lid, a folded cloth with a rubber band, or a dedicated fermentation lid — all work. An airtight lid will create pressure and could cause the jar to crack or lid to pop.'},
   {t:'Leave at room temperature, away from direct sunlight. Check daily — press down the cabbage plug to keep everything submerged. Taste from Day 3.',timer:0,flags:['crit'],note:'Day 1–2: No change visible. Day 3: Slightly sour, still crunchy — this is the ideal moment. Day 4–5: More sour, more complex. Day 5+: Very tangy, deeply fermented. Use your taste to decide when to refrigerate. There is no wrong answer.'},
   {t:'When the flavour suits you, seal the jar tightly and refrigerate. Fermentation slows dramatically in the fridge. The brine stays good 3 weeks.',note:'The purple brine is as valuable as the cabbage itself. Use it in salad dressings, add a splash to your rasam, or drink a small glass as a probiotic shot.'},
 ],
 science:'Purple cabbage contains anthocyanins — particularly cyanidin-3-glucoside — at concentrations 8× higher than green cabbage. Anthocyanins cross the blood-brain barrier and have been shown to improve memory and reduce cognitive decline in long-term studies. Lacto-fermented cabbage produces Lactobacillus strains that produce GABA, directly reducing cortisol. The fermentation process increases bioavailability of all nutrients by 20–30% compared to raw cabbage.',
 begNotes:{
   'What if it smells too sour?':'That is correct. Fermented vegetables smell sour — that is the lactic acid. If it smells putrid, rotten, or strongly unpleasant (as opposed to sharply sour), discard and restart.',
   'White film on top?':'A thin white film (kahm yeast) is harmless — just skim it off. Fuzzy mould in pink, black, or green means the cabbage was exposed to air — discard the top layer and check if the cabbage below is still good.',
   'The purple colour bleeds into everything':'Yes. This is the anthocyanin. Your hands will be purple for a day. Your cutting board will be stained. Embrace it — it is the most powerful brain food in this recipe.',
 }
},

// ─── NEW: SPECIAL RECIPES ───────────────────────────────
{id:'special-biryani-kids', cat:'special', en:'Kids\' Saffron Brown Rice Biryani', ta:'குழந்தைகள் குங்குமப்பூ பிரியாணி',
 time:'50 min', serves:'4 (kids portions)',
 appears:['Friday dinner — kids','Weekly saffron dose'],
 nut:{c:42,p:8,f:4,kcal:232,fibre:3},
 fat:{total:4,sat:0.5,mufa:2.8,pufa:0.5},
 chop40:false,
 ing:[

   {t:'Add the bloomed saffron water — pour it in a spiral pattern over the rice.',flags:['crit'],note:'The spiral pour distributes the saffron visually and aromatically throughout the biryani without you needing to stir it in. The colour gradient from the pour creates the characteristic biryani look — pale rice interspersed with saffron-gold patches.'},

   {t:'Open. Fluff gently with a fork — lift from the bottom. Serve.',},

function buildFilterRow(){
  const c=document.getElementById('filterRow');
  c.innerHTML=FILTERS.map(f=>`<button class="filter-pill ${filterCat===f.id?'active '+f.cls:''}" id="fp-${f.id}" onclick="setFilter('${f.id}')">${f.label}</button>`).join('');
}
function setFilter(cat){
  filterCat=cat;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active','all','kootu','curry','gravy','kids','base','special'));
  const btn=document.getElementById('fp-'+cat);
  if(btn){btn.classList.add('active');btn.classList.add(cat);}
  filterRecipes();
}
function filterRecipes(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const results=RECIPES.filter(r=>{
    const matchCat=filterCat==='all'||r.cat===filterCat;
    const matchQ=!q||r.en.toLowerCase().includes(q)||r.ta.includes(q)||r.cat.includes(q);
    return matchCat&&matchQ;
  });
  renderGrid(results);
}
function renderGrid(recipes){
  const grid=document.getElementById('recipeGrid');
  const empty=document.getElementById('emptyState');
  if(!recipes.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=recipes.map(r=>`
    <div class="recipe-thumb" onclick="openRecipe('${r.id}')">
      <div class="rt-header">
        <div class="rt-cat ${r.cat}">${CAT_LABELS[r.cat]||r.cat}</div>
        <div class="rt-en">${r.en}</div>
        <div class="rt-ta">${r.ta}</div>
      </div>
      <div class="rt-footer">
        <span class="rt-time">⏱ ${r.time}</span>
        <div class="rt-macros">
          <span class="macro-chip c">${r.nut.c}g C</span>
          <span class="macro-chip p">${r.nut.p}g P</span>
        </div>
      </div>
    </div>`).join('');
}

function goBack(){
  document.getElementById('pageDetail').style.display='none';
  document.getElementById('pageIndex').style.display='block';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('topTitle').innerHTML='Recipe <em>Cards</em>';
  currentRecipeId=null;
}
function toggleBeginner(){
  beginnerMode=!beginnerMode;
  const sec=document.getElementById('beginnerSection');
  const btn=document.getElementById('beginnerBtn');
  if(sec)sec.classList.toggle('show',beginnerMode);
  if(btn)btn.classList.toggle('on',beginnerMode);
}
function startCookMode(){
  const r=RECIPES.find(x=>x.id===currentRecipeId);
  if(!r)return;
  cmSteps=r.steps;cmCurrentStep=0;
  document.getElementById('cmName').textContent=r.en;
  document.getElementById('cookMode').classList.add('active');
  renderCmStep();requestWakeLock();
}
function renderCmStep(){
  const s=cmSteps[cmCurrentStep];const total=cmSteps.length;
  let dots='';for(let i=0;i<total;i++)dots+=`<div class="cm-prog-dot ${i<cmCurrentStep?'done':i===cmCurrentStep?'current':''}"></div>`;
  document.getElementById('cmProgress').innerHTML=dots;
  document.getElementById('cmStepNum').textContent=`Step ${cmCurrentStep+1} of ${total}`;
  let txt=s.t.replace(/<span[^>]*>.*?<\/span>/g,'').replace(/<[^>]*>/g,'').trim();
  const flagLabels=[];
  if(s.flags&&s.flags.includes('crit'))flagLabels.push('⭐ Key Step');
  if(s.t.toLowerCase().includes('kalonji'))flagLabels.push('🖤 Kalonji Moment');
  if(s.t.toLowerCase().includes('omam'))flagLabels.push('⚪ Omam');
  if(s.t.toLowerCase().includes('amla'))flagLabels.push('🟢 Amla — off heat only');
  if(s.t.toLowerCase().includes('flaxseed'))flagLabels.push('🌾 Flaxseed — off heat only');
  if(s.t.toLowerCase().includes('saffron'))flagLabels.push('🟡 Saffron — warm water only');
  document.getElementById('cmFlags').innerHTML=[...new Set(flagLabels)].map(l=>`<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.25)">${l}</span>`).join('');
  document.getElementById('cmStepText').textContent=txt;
  const noteEl=document.getElementById('cmNote');const noteTxt=document.getElementById('cmNoteText');
  if(s.note){noteTxt.textContent=s.note;noteEl.style.display='block';}else noteEl.style.display='none';
  const timerEl=document.getElementById('cmTimer');
  clearInterval(timerInterval);timerRunning=false;document.getElementById('timerStartBtn').textContent='Start';
  if(s.timer&&s.timer>0){timerSeconds=s.timer;timerTotal=s.timer;timerEl.classList.add('show');updateTimerDisplay();}else timerEl.classList.remove('show');
  document.getElementById('cmPrev').disabled=cmCurrentStep===0;
  const nb=document.getElementById('cmNext');
  if(cmCurrentStep===total-1){nb.textContent='✓ Done!';nb.classList.add('finish');}else{nb.innerHTML='Next →';nb.classList.remove('finish');}
}
function cmStep(dir){
  if(dir>0&&cmCurrentStep===cmSteps.length-1){closeCookMode();return;}
  cmCurrentStep=Math.max(0,Math.min(cmSteps.length-1,cmCurrentStep+dir));
  clearInterval(timerInterval);timerRunning=false;renderCmStep();
}
function closeCookMode(){clearInterval(timerInterval);document.getElementById('cookMode').classList.remove('active');releaseWakeLock();}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return m>0?`${m}:${sec.toString().padStart(2,'0')}`:`${sec}s`;}
function updateTimerDisplay(){
  document.getElementById('timerDisplay').textContent=fmtTime(timerSeconds);
  const circ=2*Math.PI*38;const pct=timerTotal>0?timerSeconds/timerTotal:1;
  const arc=document.getElementById('timerArc');
  arc.style.strokeDasharray=circ;arc.style.strokeDashoffset=circ*(1-pct);
  arc.style.stroke=pct>0.5?'var(--gold)':pct>0.25?'var(--terra)':'var(--red)';
}
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerStartBtn').textContent='Resume';}
  else{timerRunning=true;document.getElementById('timerStartBtn').textContent='Pause';
    timerInterval=setInterval(()=>{timerSeconds--;updateTimerDisplay();
      if(timerSeconds<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerStartBtn').textContent='Done';
        try{navigator.vibrate&&navigator.vibrate([400,100,400]);}catch(e){}}},1000);}
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerSeconds=timerTotal;document.getElementById('timerStartBtn').textContent='Start';updateTimerDisplay();}
function quickTimer(secs,evt){
  evt.stopPropagation();timerSeconds=secs;timerTotal=secs;
  const d=document.createElement('div');
  d.style.cssText='position:fixed;bottom:80px;right:16px;background:#1a2a18;border:1px solid var(--green);border-radius:12px;padding:10px 16px;color:var(--gold);font-family:DM Mono,monospace;font-size:16px;z-index:250;min-width:80px;text-align:center';
  d.id='qTimer';document.body.appendChild(d);
  let s=secs;const update=()=>{const el=document.getElementById('qTimer');if(el)el.textContent='⏱ '+fmtTime(s);};update();
  const iv=setInterval(()=>{s--;update();if(s<=0){clearInterval(iv);try{navigator.vibrate&&navigator.vibrate([400,100,400]);}catch(e){}setTimeout(()=>{const el=document.getElementById('qTimer');if(el)el.remove();},2000);}},1000);
  d.onclick=()=>{clearInterval(iv);d.remove();};
}
async function requestWakeLock(){try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
async function releaseWakeLock(){try{if(wakeLock){await wakeLock.release();wakeLock=null;}}catch(e){}}

buildFilterRow();filterRecipes();
</script>
</body>
